  --dna-status-delta-negative: #DC2626;
}
@media (prefers-color-scheme: light) {
  svg {
    --dna-surface: #F8FAFC;
    --dna-surface-top: #F8FAFC;
    --dna-surface-alt: #F1F5F9;
