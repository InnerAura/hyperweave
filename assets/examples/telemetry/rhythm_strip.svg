/* === HyperWeave Accessibility Layer ===
 * Non-negotiable media queries for motion, color scheme, and forced colors.
 * Included in EVERY artifact.
 *
 * CAMO NOTE: @media (prefers-color-scheme) and @media (forced-colors: active)
 * are INERT when served through GitHub Camo as img tags. The img element
 * creates an isolated browsing context — the parent document's color scheme
 * and forced-colors mode do not propagate into it. Artifacts will always
 * render in their default (dark) theme on GitHub READMEs.
 *
 * These queries DO activate when the SVG is embedded directly (svg inline,
 * object, or opened as a standalone document). This is a known accepted
 * tradeoff: dark-default through Camo, adaptive in direct embed.
 */

/* ── Reduced Motion ── */
@media (prefers-reduced-motion: reduce) {
  .hw-logic-bit { animation: none !important; opacity: .8; }
  .hw-scanner { animation: none; opacity: 0; }
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
  animate, animateTransform, animateMotion, set {
    display: none !important;
  }
}

/* ── Light Mode Override (see CAMO NOTE above — inert through img) ── */
/* Light mode: genome alleles injected by CSS assembler into per-artifact @media block. */

/* ── Forced Colors (Windows High Contrast) ── */
@media (forced-colors: active) {
  text { fill: CanvasText !important; }
  rect, path, circle, ellipse, polygon, polyline, line {
    stroke: CanvasText;
  }
  .hw-frame-bg { fill: Canvas !important; }
  .hw-accent-bar { fill: Highlight !important; }
  .hw-signal { fill: Highlight !important; }
  .hw-logic-bit { fill: Highlight !important; }
}

/* === HyperWeave Telemetry Phase Colors ===
 * Tool categories and cognitive phases for session telemetry.
 */

:root, svg {
  /* Tool categories (tier 1: by operation type) */
  --dna-tool-explore:    #3b9fd4;  /* Read, Glob, Grep, Search */
  --dna-tool-mutate:     #e5a832;  /* Write, Edit */
  --dna-tool-execute:    #34c790;  /* Bash, Run, Task */
  --dna-tool-coordinate: #9b6cd4;  /* Agent, TodoWrite */

  /* Cognitive phases (tier 2: session phase classification) */
  --dna-phase-scaffold:  #6366f1;  /* Initial setup, planning */
  --dna-phase-code:      #3b82f6;  /* Implementation, writing */
  --dna-phase-test:      #10b981;  /* Testing, validation */
  --dna-phase-debug:     #f59e0b;  /* Debugging, investigation */
  --dna-phase-refactor:  #8b5cf6;  /* Refactoring, optimization */
  --dna-phase-idle:      #52525b;  /* Idle, no activity */
  --dna-phase-recon:     #3b9fd4;  /* Reconnaissance, reading */
  --dna-phase-impl:      #10b981;  /* Active implementation */
}

/* === HyperWeave Telemetry Utility Classes ===
 * Specimen: specs/telemetry-artifacts/receipt.svg (lines 126-163)
 * Used by receipt, rhythm-strip, and master-card templates.
 */

/* Typography shorthand */
.m { font-family: var(--dna-font-mono); }
.s { font-family: var(--dna-font-display); }

/* Ink tiers */
.ink1 { fill: var(--dna-ink-primary); }
.ink2 { fill: var(--dna-ink-muted); }
.ink3 { fill: var(--dna-ink-tertiary); }
.ghost { fill: var(--dna-ink-ghost); }
.signal { fill: var(--dna-signal); }

/* Structural */
.div { stroke: var(--dna-border-div); stroke-width: 1; }

/* Treemap cell classes */
.cell-name { font-weight: 600; fill: var(--dna-ink-primary); }
.cell-meta { fill: var(--dna-ink-ghost); }
.cell-error { fill: var(--dna-status-failing-core); opacity: 0.85; }

/* Phase color classes */
.phase-explore { fill: var(--dna-tool-explore); opacity: 0.5; }
.phase-execute { fill: var(--dna-tool-execute); opacity: 0.5; }
.phase-mutate { fill: var(--dna-tool-mutate); opacity: 0.5; }
.phase-coordinate { fill: var(--dna-tool-coordinate); opacity: 0.5; }

/* Heatmap intensity classes */
.heat-0 { fill: var(--dna-border); opacity: 0.3; }
.heat-1 { fill: var(--dna-signal); opacity: 0.2; }
.heat-2 { fill: var(--dna-signal); opacity: 0.4; }
.heat-3 { fill: var(--dna-signal); opacity: 0.6; }
.heat-4 { fill: var(--dna-signal); opacity: 0.85; }
.heat-write { fill: var(--dna-tool-mutate); }

/* Skill state classes */
.skill-mastered { fill: var(--dna-status-passing-core); }
.skill-learning { fill: var(--dna-tool-explore); }
.skill-asking { fill: var(--dna-status-warning-core); }

/* Forced colors / high contrast */
@media (forced-colors: active) {
  text { fill: CanvasText; }
  .div { stroke: CanvasText; }
}
</style>
