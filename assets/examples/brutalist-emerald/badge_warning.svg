  --dna-material-specular: 0.0;
  --dna-material-roughness: 0.8;
  --dna-sep: #2A5A3A;
  --dna-status-delta-positive: #22C55E;
  --dna-status-delta-negative: #DC2626;
}
/* === HyperWeave Bridge Classes ===
 * Maps semantic class names (hw-*) to genome DNA custom properties (--dna-*).
 * Genome-agnostic: works with ANY genome that defines the --dna-* contract.
 */

/* ── Surface fills ── */
.hw-surface      { fill: var(--dna-surface); }
.hw-surface-deep { fill: var(--dna-surface-deep); }
.hw-bg           { fill: var(--dna-bg); }
.hw-bg-alt       { fill: var(--dna-bg-alt); }

/* ── Signal / Accent ── */
.hw-signal       { fill: var(--dna-signal); }
.hw-signal-stroke { stroke: var(--dna-signal); }
.hw-signal-dim   { fill: var(--dna-signal-dim); }

/* ── Ink / Typography ── */
.hw-ink          { fill: var(--dna-ink-primary); }
.hw-ink-muted    { fill: var(--dna-ink-muted); }
.hw-ink-sub      { fill: var(--dna-ink-sub); }
.hw-ink-bright   { fill: var(--dna-ink-bright); }
.hw-ink-on-accent { fill: var(--dna-ink-on-accent); }

/* ── Border / Separator ── */
.hw-border       { stroke: var(--dna-border); }
.hw-sep          { stroke: var(--dna-sep); }

/* ── Status ── */
.hw-status-pass  { fill: var(--dna-status-passing-core); }
.hw-status-warn  { fill: var(--dna-status-warning-core); }
.hw-status-fail  { fill: var(--dna-status-failing-core); }
.hw-delta-pos    { fill: var(--dna-status-delta-positive); }
.hw-delta-neg    { fill: var(--dna-status-delta-negative); }

/* ── Extended ── */
.hw-glow         { flood-color: var(--dna-glow); }
.hw-brand-text   { fill: var(--dna-brand-text); }
.hw-metric-text  { fill: var(--dna-metric-text); }
.hw-border-tint  { stroke: var(--dna-border-tint); }
.hw-glyph-inner  { fill: var(--dna-glyph-inner); }
.hw-seam-gap     { fill: var(--dna-seam-gap); }
.hw-label-txt    { fill: var(--dna-label-text); }

/* === HyperWeave Expression Layer ===
 * CSS state machine driven by data-hw-* attributes.
 * Genome-agnostic: all colors via --dna-* custom properties.
 */

/* ── Typography ── */
.hw-title {
  font-family: var(--dna-font-display, 'Inter', -apple-system, system-ui, sans-serif);
  font-size: 13px; font-weight: 600;
  fill: var(--dna-ink, #E4E4E7);
  letter-spacing: -0.01em;
}
.hw-value {
  font-family: var(--dna-font-display, 'Inter', -apple-system, system-ui, sans-serif);
  font-size: 15px; font-weight: 700;
  fill: var(--dna-ink, #E4E4E7);
  letter-spacing: -0.02em;
}
.hw-label {
  font-family: var(--dna-font-mono, 'SF Mono', 'JetBrains Mono', monospace);
  font-size: 8px; font-weight: 600;
  fill: var(--dna-ink-muted, #A1A1AA);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.hw-delta {
  font-family: var(--dna-font-mono, 'SF Mono', 'JetBrains Mono', monospace);
  font-size: 10px; font-weight: 600;
}
.hw-delta--positive { fill: var(--dna-status-delta-positive, #22C55E); }
.hw-delta--negative { fill: var(--dna-status-delta-negative, #DC2626); }
.hw-delta--neutral  { fill: var(--dna-ink-muted, #A1A1AA); }

/* ── Structural ── */
.hw-frame-bg {
  fill: var(--dna-surface, var(--dna-bg, #1C1C1C));
  rx: var(--dna-corner, 5px);
}
.hw-frame-edge {
  fill: none;
  stroke: rgba(255,255,255,0.07);
  stroke-width: 1;
}
.hw-divider {
  stroke: var(--dna-border, var(--dna-sep, #3F3F46));
  stroke-width: 1;
}
.hw-accent-bar {
  fill: var(--dna-signal, #B31B1B);
}

/* ── Status ── */
.hw-status-ring {
  fill: none;
  stroke: var(--dna-border, var(--dna-sep, #3F3F46));
  stroke-width: 1.2;
}
.hw-status-core {
  fill: var(--dna-status-color, var(--dna-status-passing-core, #22C55E));
  will-change: opacity;
}

/* ── Glyph ── */
.hw-glyph {
  fill: none;
  stroke: var(--dna-signal, #B31B1B);
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* === Status Phenotype === */
[data-hw-status="active"]   { --dna-status-color: var(--dna-status-passing-core, #22C55E); }
[data-hw-status="passing"]  { --dna-status-color: var(--dna-status-passing-core, #22C55E); }
[data-hw-status="building"] { --dna-status-color: var(--dna-signal, #3B82F6); }
[data-hw-status="warning"]  { --dna-status-color: var(--dna-status-warning-core, #F59E0B); }
[data-hw-status="critical"] { --dna-status-color: var(--dna-status-failing-core, #EF4444); }
[data-hw-status="failing"]  { --dna-status-color: var(--dna-status-failing-core, #EF4444); }
[data-hw-status="offline"]  { --dna-status-color: var(--dna-ink-muted, #A1A1AA); }

svg[data-hw-status="warning"]  { filter: drop-shadow(0 0 4px rgba(245,158,11,0.3)); }
svg[data-hw-status="critical"],
svg[data-hw-status="failing"]  { filter: drop-shadow(0 0 5px rgba(220,38,38,0.4)); }
svg[data-hw-status="offline"]  { opacity: .65; filter: grayscale(45%); }

/* === Badge State Machine v2 === */
[data-hw-status="active"], [data-hw-status="passing"] {
  --hw-state-core: var(--dna-badge-pass-core, var(--dna-signal));
  --hw-state-sep: var(--dna-badge-pass-sep, var(--dna-signal));
  --hw-state-ring: var(--dna-badge-pass-sep, var(--dna-signal));
  --hw-state-value: var(--dna-badge-value-text, var(--dna-brand-text));
  --hw-state-signal: var(--dna-signal);
  --hw-state-specular: var(--dna-signal);
  --hw-state-sweep: var(--dna-signal);
}

[data-hw-status="warning"] {
  --hw-state-core: var(--dna-badge-warn-color, var(--dna-status-warning-core));
  --hw-state-sep: var(--dna-badge-warn-color, var(--dna-status-warning-core));
  --hw-state-ring: var(--dna-badge-warn-color, var(--dna-status-warning-core));
  --hw-state-value: #FDE68A;
  --hw-state-signal: var(--dna-badge-warn-color, var(--dna-status-warning-core));
  --hw-state-specular: var(--dna-badge-warn-color, var(--dna-status-warning-core));
  --hw-state-sweep: var(--dna-badge-warn-color, var(--dna-status-warning-core));
}

[data-hw-status="critical"], [data-hw-status="failing"] {
  --hw-state-core: var(--dna-status-failing-core);
  --hw-state-sep: var(--dna-status-failing-core);
  --hw-state-ring: var(--dna-status-failing-core);
  --hw-state-value: #FCA5A5;
  --hw-state-signal: var(--dna-status-failing-core);
  --hw-state-specular: var(--dna-status-failing-core);
  --hw-state-sweep: var(--dna-status-failing-core);
}

/* Default (neutral/offline/building) */
svg:not([data-hw-status="active"]):not([data-hw-status="passing"]):not([data-hw-status="warning"]):not([data-hw-status="critical"]):not([data-hw-status="failing"]) {
  --hw-state-core: var(--dna-signal);
  --hw-state-sep: var(--dna-signal);
  --hw-state-ring: var(--dna-signal);
  --hw-state-value: var(--dna-badge-value-text, var(--dna-brand-text));
  --hw-state-signal: var(--dna-signal);
  --hw-state-specular: var(--dna-signal);
  --hw-state-sweep: var(--dna-signal);
}

/* === Badge Element Classes === */
.hw-label-text {
  fill: var(--dna-metric-text);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
}
.hw-value-text { fill: var(--hw-state-value); }
.hw-sep-signal { fill: var(--hw-state-sep); }
.hw-sep-shadow { fill: var(--dna-sep); }
.hw-indicator-ring {
  stroke: var(--hw-state-ring);
  stroke-width: 1.2;
  fill: none;
}
.hw-logic-bit {
  fill: var(--hw-state-core);
  will-change: opacity;
}
.hw-scanner {
  fill: var(--hw-state-sweep);
  mix-blend-mode: screen;
  opacity: 0;
  transform-origin: center;
  will-change: transform, opacity;
}

/* State tint overlay on right panel */
.hw-state-tint { fill: transparent; opacity: 0; }
[data-hw-status="warning"] .hw-state-tint {
  fill: var(--hw-state-core);
  opacity: 0.06;
}
[data-hw-status="critical"] .hw-state-tint,
[data-hw-status="failing"] .hw-state-tint {
  fill: var(--hw-state-core);
  opacity: 0.08;
}

/* === Living Value: Threshold State Machine === */
[data-hw-value^="9"], [data-hw-value^="8"] {
  --dna-status-color: var(--dna-status-passing-core, #22C55E);
}
[data-hw-value^="7"], [data-hw-value^="6"] {
  --dna-status-color: var(--dna-status-warning-core, #F59E0B);
}
[data-hw-value^="5"], [data-hw-value^="4"],
[data-hw-value^="3"], [data-hw-value^="2"],
[data-hw-value^="1"], [data-hw-value^="0"] {
  --dna-status-color: var(--dna-status-failing-core, #EF4444);
}
[data-hw-value] .hw-living { fill: var(--dna-status-color); }

/* === HyperWeave Status Indicator Animations ===
 * State-dependent animation speeds for .hw-logic-bit
 * Active: slow breathe. Warning: medium pulse. Critical: fast strobe.
 */

/* Active/passing: slow breathe 2s */
[data-hw-status="active"] .hw-logic-bit,
[data-hw-status="passing"] .hw-logic-bit {
  animation: hw-breathe 2s ease-in-out infinite;
  will-change: opacity;
}

/* Warning: medium pulse 0.9s */
[data-hw-status="warning"] .hw-logic-bit {
  animation: hw-pulse 0.9s ease-in-out infinite;
  will-change: opacity;
}

/* Critical/failing: strobe 0.35s */
[data-hw-status="critical"] .hw-logic-bit,
[data-hw-status="failing"] .hw-logic-bit {
  animation: hw-strobe 0.35s steps(1) infinite;
  will-change: opacity;
}

/* Building: faster breathe 1.5s */
[data-hw-status="building"] .hw-logic-bit {
  animation: hw-breathe 1.5s ease-in-out infinite;
  will-change: opacity;
}

/* Offline: no animation */
[data-hw-status="offline"] .hw-logic-bit {
  animation: none;
  opacity: .4;
}

/* === Keyframes === */
@keyframes hw-breathe {
  0%, 100% { opacity: .3; }
  50%      { opacity: 1; }
}
@keyframes hw-pulse {
  0%, 100% { opacity: .25; }
  50%      { opacity: 1; }
}
@keyframes hw-strobe {
  0%, 49%   { opacity: 1; }
  50%, 100% { opacity: .1; }
}
@keyframes hw-sweep {
  0%   { opacity: 0; transform: translateX(-120%) skewX(-15deg); }
  30%  { opacity: 0.06; }
  70%  { opacity: 0.06; }
  100% { opacity: 0; transform: translateX(120%) skewX(-15deg); }
}

/* === HyperWeave Accessibility Layer ===
 * Non-negotiable media queries for motion, color scheme, and forced colors.
 * Included in EVERY artifact.
 *
 * CAMO NOTE: @media (prefers-color-scheme) and @media (forced-colors: active)
 * are INERT when served through GitHub Camo as img tags. The img element
 * creates an isolated browsing context — the parent document's color scheme
 * and forced-colors mode do not propagate into it. Artifacts will always
 * render in their default (dark) theme on GitHub READMEs.
 *
 * These queries DO activate when the SVG is embedded directly (svg inline,
 * object, or opened as a standalone document). This is a known accepted
 * tradeoff: dark-default through Camo, adaptive in direct embed.
 */

/* ── Reduced Motion ── */
@media (prefers-reduced-motion: reduce) {
  .hw-logic-bit { animation: none !important; opacity: .8; }
  .hw-scanner { animation: none; opacity: 0; }
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
  animate, animateTransform, animateMotion, set {
    display: none !important;
  }
}

/* ── Light Mode Override (see CAMO NOTE above — inert through img) ── */
/* Genome-provided light_mode alleles are injected by the CSS assembler
   into a separate @media (prefers-color-scheme: light) block per artifact.
   This placeholder is intentionally empty; it exists as documentation. */

/* ── Forced Colors (Windows High Contrast) ── */
@media (forced-colors: active) {
  text { fill: CanvasText !important; }
  rect, path, circle, ellipse, polygon, polyline, line {
    stroke: CanvasText;
  }
  .hw-frame-bg { fill: Canvas !important; }
  .hw-accent-bar { fill: Highlight !important; }
  .hw-signal { fill: Highlight !important; }
  .hw-logic-bit { fill: Highlight !important; }
}
</style>
