/* === HyperWeave Accessibility Layer ===
 * Non-negotiable media queries for motion, color scheme, and forced colors.
 * Included in EVERY artifact.
 *
 * CAMO NOTE: @media (prefers-color-scheme) and @media (forced-colors: active)
