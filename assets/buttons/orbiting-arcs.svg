<!-- 2) ORBITING ARCS — bright highlights chase the perimeter -->
<svg xmlns="http://www.w3.org/2000/svg" width="180" height="50" viewBox="0 0 180 50" role="img" aria-label="Open">
  <defs>
    <linearGradient id="grad-bm2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF0A54"/><stop offset="50%" stop-color="#0AFFEF"/><stop offset="100%" stop-color="#845EF7"/>
    </linearGradient>
    <filter id="glow-bm2" x="-50%" y="-70%" width="200%" height="240%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="180" height="50" rx="18" fill="#121212" opacity="0.14"/>
  <rect width="180" height="50" rx="18" fill="url(#grad-bm2)" opacity="0.16"/>

  <!-- thin baseline border -->
  <rect x="1" y="1" width="178" height="48" rx="17"
        fill="none" stroke="rgba(255,255,255,.25)" stroke-width="1"/>

  <!-- orbiting arcs using dash + pathLength -->
  <rect x="1" y="1" width="178" height="48" rx="17"
        fill="none" stroke="url(#grad-bm2)" stroke-width="4.5" stroke-linecap="round"
        pathLength="100" stroke-dasharray="10 90" filter="url(#glow-bm2)">
    <animate attributeName="stroke-dashoffset" values="0;-100" dur="2.8s" repeatCount="indefinite"/>
  </rect>
  <rect x="1" y="1" width="178" height="48" rx="17"
        fill="none" stroke="url(#grad-bm2)" stroke-width="3.5" stroke-linecap="round"
        pathLength="100" stroke-dasharray="6 94" opacity="0.7">
    <animate attributeName="stroke-dashoffset" values="0;100" dur="3.4s" repeatCount="indefinite"/>
  </rect>

  <text x="90" y="32" font-family="Inter,ui-sans-serif,system-ui,Arial" font-size="15" font-weight="800" fill="#ffffff" text-anchor="middle">
    Return to Top ⌃
  </text>
</svg>