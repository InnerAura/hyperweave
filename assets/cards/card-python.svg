<!-- ==========================================
       4. PYTHON (3D TUBE) - GREENISH MONOCHROMATIC
       ========================================== -->
<svg id="hw-grid-py" viewBox="0 0 600 600" width="100%" height="100%"
     preserveAspectRatio="xMidYMid slice"
     style="border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);"
     xmlns="http://www.w3.org/2000/svg" xmlns:hw="https://hyperweave.dev/hw/v8.0">
  <metadata>
    <hw:artifact id="urn:uuid:44444444-5555-6666-7777-888888888888" type="composite"
                 series="core" version="0.1.0">
      <hw:provenance>
        <hw:generator>HyperWeave Compositor</hw:generator>
      </hw:provenance>
      <hw:spec size="600x600" performance="composite-only" theme="adaptive"
               a11y="WCAG-AA" />
    </hw:artifact>
    <hw:composition>
      <hw:frame>composite</hw:frame>
      <hw:genome>monochrome-green@0.1</hw:genome>
      <hw:slots>
        <hw:slot zone="badge" value="PYTHON" />
      </hw:slots>
      <hw:environment platform="web" motion="fluid" status="passing" />
    </hw:composition>
    <hw:aesthetic>
      <hw:chromatic system="green" space="oklch" palette="green,mint"
                    contrast-ratio="8.5" />
      <hw:motion vocabulary="orbit,pulse" physics="fluid" timing="linear"
                 duration-base="10s" stagger-regime="contemplative"
                 cim-compliant="true" />
      <hw:geometry form-language="geometric" corner-radius="16px" grid="1x1"
                   proportional-system="phi" mathematical-basis="lemniscate"
                   symmetry="radial" />
    </hw:aesthetic>
    <hw:reasoning>
      <hw:intent>A mathematical 3D infinity loop symbolizing Python's intertwined logo
        and underlying data logic.</hw:intent>
      <hw:approach>Used a stacked-stroke opacity mask applied to a tight 45-degree
        halftone screen to render true volumetric 3D shading, overlaying a high-speed
        data pulse.</hw:approach>
      <hw:tradeoffs>Scrapped the moon concept entirely for a mathematically pure, 60FPS
        3D physics structure.</hw:tradeoffs>
    </hw:reasoning>
  </metadata>
  <defs>
    <style>
      @keyframes py-spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes py-pulse-flow {
        to {
          stroke-dashoffset: -800;
        }
      }

      .py-tube-spin {
        transform-origin: 300px 300px;
        animation: py-spin 40s linear infinite;
      }

      .py-pulse-anim {
        animation: py-pulse-flow 4s linear infinite;
      }
    </style>
    <linearGradient id="py-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020A05" />
      <stop offset="100%" stop-color="#071A0D" />
    </linearGradient>
    <!-- 45-degree dense halftone grid for sharp 3D mapping -->
    <pattern id="py-dot" x="0" y="0" width="10" height="10"
             patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <circle cx="5" cy="5" r="4.5" fill="white" />
    </pattern>
    <!-- The Infinity Loop Path (Lemniscate) -->
    <path id="py-infinity"
          d="M 300 300 C 150 50, 50 150, 50 300 C 50 450, 150 550, 300 300 C 450 50, 550 150, 550 300 C 550 450, 450 550, 300 300"
          fill="none" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Volumetric 3D Shading Mask (Stacked Opacities) -->
    <mask id="py-3d-tube-mask">
      <use href="#py-infinity" stroke="white" stroke-width="120" opacity="0.05" />
      <use href="#py-infinity" stroke="white" stroke-width="100" opacity="0.15" />
      <use href="#py-infinity" stroke="white" stroke-width="80" opacity="0.30" />
      <use href="#py-infinity" stroke="white" stroke-width="60" opacity="0.50" />
      <use href="#py-infinity" stroke="white" stroke-width="40" opacity="0.75" />
      <use href="#py-infinity" stroke="white" stroke-width="20" opacity="1.0" />
    </mask>
    <!-- Final mask tying the 3D shading to the Halftone Dots -->
    <mask id="py-final-halftone-mask">
      <rect width="600" height="600" fill="url(#py-dot)" mask="url(#py-3d-tube-mask)" />
    </mask>
    <!-- Gradient applied across the tube -->
    <linearGradient id="py-tube-color" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#66FF99" />
      <stop offset="100%" stop-color="#00994D" />
    </linearGradient>
    <filter id="py-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="25" flood-color="#000000"
                    flood-opacity="0.95" />
    </filter>
  </defs>
  <rect width="600" height="600" fill="url(#py-bg)" />
  <!-- Spinning 3D Tube Assembly -->
  <g class="py-tube-spin">
    <!-- Halftone Volumetric 3D Loop -->
    <rect width="600" height="600" fill="url(#py-tube-color)"
          mask="url(#py-final-halftone-mask)" />
    <!-- Inner High-Speed Data Pulses riding the tube center -->
    <use href="#py-infinity" stroke="#66FF99" stroke-width="8" stroke-dasharray="40 400"
         class="py-pulse-anim" opacity="0.8" />
    <use href="#py-infinity" stroke="#FFFFFF" stroke-width="3" stroke-dasharray="10 430"
         class="py-pulse-anim" opacity="1" />
  </g>
  <g filter="url(#py-shadow)">
    <rect x="230" y="230" width="140" height="140" rx="32" fill="#0A0D14"
          fill-opacity="0.85" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" />
    <text x="300" y="310" fill="#FFFFFF"
          font-family="system-ui, -apple-system, sans-serif" font-size="24"
          font-weight="900" text-anchor="middle" letter-spacing="1">PYTHON</text>
  </g>
</svg>