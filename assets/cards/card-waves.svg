<!-- 3. API - LIGHT BLUE MONOCHROMATIC -->
<svg id="hw-grid-api" viewBox="0 0 600 600" width="100%" height="100%"
     preserveAspectRatio="xMidYMid slice"
     style="border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);"
     xmlns="http://www.w3.org/2000/svg" xmlns:hw="https://hyperweave.dev/hw/v8.0">
  <metadata>
    <hw:artifact id="urn:uuid:33333333-4444-5555-6666-777777777777" type="composite"
                 series="core" version="0.1.0">
      <hw:provenance>
        <hw:generator>HyperWeave Compositor</hw:generator>
      </hw:provenance>
      <hw:spec size="600x600" performance="composite-only" theme="adaptive"
               a11y="WCAG-AA" />
    </hw:artifact>
    <hw:composition>
      <hw:frame>composite</hw:frame>
      <hw:genome>monochrome-blue@0.1</hw:genome>
      <hw:slots>
        <hw:slot zone="badge" value="API" />
      </hw:slots>
      <hw:environment platform="web" motion="fluid" status="passing" />
    </hw:composition>
    <hw:aesthetic>
      <hw:chromatic system="blue" space="oklch" palette="blue,lightblue"
                    contrast-ratio="8.5" />
      <hw:motion vocabulary="wave" physics="fluid" timing="linear" duration-base="3s"
                 stagger-regime="energetic" cim-compliant="true" />
      <hw:geometry form-language="organic" corner-radius="16px" grid="1x1"
                   proportional-system="thirds" mathematical-basis="sine-wave"
                   symmetry="none" />
      <hw:typography stack="system-ui" hierarchy="label" weight-range="900" />
    </hw:aesthetic>
    <hw:reasoning>
      <hw:intent>Create a fast, mesmerizing data flow representing the API boundary.
      </hw:intent>
      <hw:approach>Utilized pure SVG stroke-dashoffset animation over cubic bezier
        paths.</hw:approach>
      <hw:tradeoffs>Zero DOM node overhead for individual dots, rendering a perfect
        60FPS fluid data stream.</hw:tradeoffs>
      <hw:constraints-applied>10x-performance, monochromatic</hw:constraints-applied>
      <hw:spatial-notes>Horizontal dominant wave alignment across exactly 600px block
        width.</hw:spatial-notes>
    </hw:reasoning>
  </metadata>
  <defs>
    <style>
      .api-w {
        stroke-linecap: round;
        fill: none;
        stroke-dasharray: 0 30;
      }

      @keyframes api-flow {
        from {
          stroke-dashoffset: 300;
        }

        to {
          stroke-dashoffset: 0;
        }
      }

      .flow-anim {
        animation: api-flow 3s linear infinite;
      }
    </style>
    <linearGradient id="api-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#030712" />
      <stop offset="100%" stop-color="#0A152A" />
    </linearGradient>
    <path id="api-wave" class="api-w"
          d="M -100 300 C 100 100, 200 500, 400 300 C 600 100, 700 500, 900 300" />
    <filter id="api-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="25" flood-color="#000000"
                    flood-opacity="0.8" />
    </filter>
  </defs>
  <rect width="600" height="600" fill="url(#api-bg)" />
  <g>
    <use href="#api-wave" y="-200" stroke="#00FFFF" stroke-width="12" opacity="0.1" class="flow-anim" />
    <use href="#api-wave" y="-160" stroke="#00E5FF" stroke-width="14" opacity="0.2" class="flow-anim" />
    <use href="#api-wave" y="-120" stroke="#00BFFF" stroke-width="16" opacity="0.4" class="flow-anim" />
    <use href="#api-wave" y="-80" stroke="#0080FF" stroke-width="18" opacity="0.6" class="flow-anim" />
    <use href="#api-wave" y="-40" stroke="#0040FF" stroke-width="20" opacity="0.8" class="flow-anim" />
    <use href="#api-wave" y="0" stroke="#0000FF" stroke-width="22" opacity="1" class="flow-anim" />
    <use href="#api-wave" y="40" stroke="#4000FF" stroke-width="20" opacity="0.8" class="flow-anim" />
    <use href="#api-wave" y="80" stroke="#8000FF" stroke-width="18" opacity="0.6" class="flow-anim" />
    <use href="#api-wave" y="120" stroke="#BF00FF" stroke-width="16" opacity="0.4" class="flow-anim" />
    <use href="#api-wave" y="160" stroke="#FF00FF" stroke-width="14" opacity="0.2" class="flow-anim" />
    <use href="#api-wave" y="200" stroke="#FF00FF" stroke-width="12" opacity="0.1" class="flow-anim" />
  </g>
  <g filter="url(#api-shadow)">
    <rect x="230" y="230" width="140" height="140" rx="40" fill="#07090c"
          fill-opacity="0.8" stroke="rgba(255,255,255,0.2)" stroke-width="2" />
    <text x="300" y="312" fill="white"
          font-family="system-ui, -apple-system, sans-serif" font-size="36"
          font-weight="900" text-anchor="middle" letter-spacing="-1">API</text>
  </g>
</svg>