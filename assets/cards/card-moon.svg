<!-- 4. PYTHON (MOON) - GREENISH MONOCHROMATIC -->
<svg id="hw-grid-py" viewBox="0 0 600 600" width="100%" height="100%"
     preserveAspectRatio="xMidYMid slice"
     style="border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);"
     xmlns="http://www.w3.org/2000/svg" xmlns:hw="https://hyperweave.dev/hw/v8.0">
    <metadata>
        <hw:artifact id="urn:uuid:44444444-5555-6666-7777-888888888888" type="composite"
                     series="core" version="0.1.0">
            <hw:provenance>
                <hw:generator>HyperWeave Compositor</hw:generator>
            </hw:provenance>
            <hw:spec size="600x600" performance="composite-only" theme="adaptive"
                     a11y="WCAG-AA" />
        </hw:artifact>
        <hw:composition>
            <hw:frame>composite</hw:frame>
            <hw:genome>monochrome-green@0.1</hw:genome>
            <hw:slots>
                <hw:slot zone="badge" value="PYTHON" />
            </hw:slots>
            <hw:environment platform="web" motion="fluid" status="passing" />
        </hw:composition>
        <hw:aesthetic>
            <hw:chromatic system="green" space="oklch" palette="green,mint"
                          contrast-ratio="8.5" />
            <hw:motion vocabulary="orbit,pulse" physics="none" timing="linear"
                       duration-base="10s" stagger-regime="contemplative"
                       cim-compliant="true" />
            <hw:geometry form-language="geometric" corner-radius="16px" grid="1x1"
                         proportional-system="phi"
                         mathematical-basis="boolean-subtraction" symmetry="none" />
        </hw:aesthetic>
        <hw:reasoning>
            <hw:intent>A celestial moon logic component with spinning orbital dust
                rings.</hw:intent>
            <hw:approach>Combined pure 3D CSS rotate transformations with
                stroke-dashoffset on the orbital rings.</hw:approach>
            <hw:tradeoffs>Zero individual DOM particles used for planetary rings to
                ensure flawless rendering constraints.</hw:tradeoffs>
            <hw:constraints-applied>10x-performance,
                monochromatic</hw:constraints-applied>
            <hw:spatial-notes>Right-weighted crescent, orbiting vectors sweeping over
                center Z-index.</hw:spatial-notes>
        </hw:reasoning>
    </metadata>
    <defs>
        <style>
            @keyframes py-orbit-cw {
                to {
                    transform: rotate(360deg);
                }
            }

            @keyframes py-orbit-ccw {
                to {
                    transform: rotate(-360deg);
                }
            }

            @keyframes py-ring-flow {
                to {
                    stroke-dashoffset: -360;
                }
            }

            .ring-cw {
                transform-origin: 300px 300px;
                animation: py-orbit-cw 30s linear infinite;
            }

            .ring-ccw {
                transform-origin: 300px 300px;
                animation: py-orbit-ccw 20s linear infinite;
            }

            .ring-dash {
                animation: py-ring-flow 6s linear infinite;
            }
        </style>
        <linearGradient id="py-bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#020A05" />
            <stop offset="100%" stop-color="#071A0D" />
        </linearGradient>
        <pattern id="py-dot-pattern" x="0" y="0" width="10" height="10"
                 patternUnits="userSpaceOnUse">
            <circle cx="5" cy="5" r="4" fill="white" />
        </pattern>
        <radialGradient id="py-crescent-density" cx="40%" cy="50%" r="50%">
            <stop offset="0%" stop-color="white" stop-opacity="1" />
            <stop offset="60%" stop-color="white" stop-opacity="0.9">
                <animate attributeName="stop-opacity" values="0.9; 0.5; 0.9" dur="8s"
                         repeatCount="indefinite" />
            </stop>
            <stop offset="90%" stop-color="white" stop-opacity="0.2" />
            <stop offset="100%" stop-color="white" stop-opacity="0" />
        </radialGradient>
        <mask id="py-crescent-shape">
            <circle cx="300" cy="300" r="180" fill="url(#py-crescent-density)" />
            <circle cx="360" cy="270" r="170" fill="black" />
        </mask>
        <mask id="py-final-mask">
            <rect width="600" height="600" fill="url(#py-dot-pattern)"
                  mask="url(#py-crescent-shape)" />
        </mask>
        <linearGradient id="py-color-grad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#33FF85" />
            <stop offset="100%" stop-color="#00803B" />
        </linearGradient>
        <filter id="py-shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="20" stdDeviation="25" flood-color="#000000"
                          flood-opacity="0.8" />
        </filter>
    </defs>
    <rect width="600" height="600" fill="url(#py-bg)" />
    <!-- Glowing Background Atmosphere -->
    <circle cx="300" cy="300" r="180" fill="#33FF85" opacity="0.05"
            mask="url(#py-crescent-shape)" />
    <!-- Back Orbital Ring -->
    <g class="ring-cw">
        <ellipse cx="300" cy="300" rx="240" ry="60" stroke="#00803B" fill="none"
                 stroke-dasharray="0 24" stroke-width="12" stroke-linecap="round"
                 class="ring-dash" opacity="0.6" transform="rotate(30 300 300)" />
    </g>
    <!-- Halftone Crescent Moon -->
    <rect width="600" height="600" fill="url(#py-color-grad)"
          mask="url(#py-final-mask)" />
    <!-- Front Orbital Ring -->
    <g class="ring-ccw">
        <ellipse cx="300" cy="300" rx="200" ry="40" stroke="#33FF85" fill="none"
                 stroke-dasharray="0 18" stroke-width="10" stroke-linecap="round"
                 class="ring-dash" opacity="0.9" transform="rotate(-15 300 300)" />
    </g>
    <g filter="url(#py-shadow)">
        <rect x="230" y="230" width="140" height="140" rx="40" fill="#07090c"
              fill-opacity="0.8" stroke="rgba(255,255,255,0.2)" stroke-width="2" />
        <text x="300" y="308" fill="white"
              font-family="system-ui, -apple-system, sans-serif" font-size="24"
              font-weight="900" text-anchor="middle" letter-spacing="1">PYTHON</text>
    </g>
</svg>