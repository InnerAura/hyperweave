<!-- ==========================================
     5. NEXUS (⟁) - AMETHYST MONOCHROMATIC
     (10x Perf GPU-Masking Volumetric 3D)
     ========================================== -->
<svg id="hw-grid-nexus" viewBox="0 0 600 600" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" style="border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 400px; display: block; margin: 0 auto;" xmlns="http://www.w3.org/2000/svg" xmlns:hw="https://hyperweave.dev/hw/v8.0">
  <metadata>
    <hw:artifact id="urn:uuid:55555555-6666-7777-8888-999999999999" type="composite" series="core" version="0.1.0">
      <hw:provenance><hw:generator>HyperWeave Compositor</hw:generator></hw:provenance>
      <hw:spec size="600x600" performance="composite-only" theme="adaptive" a11y="WCAG-AA"/>
    </hw:artifact>
    <hw:composition>
      <hw:frame>composite</hw:frame>
      <hw:genome>monochrome-amethyst@0.1</hw:genome>
      <hw:slots><hw:slot zone="badge" value="NEXUS"/></hw:slots>
      <hw:environment platform="web" motion="fluid" status="passing"/>
    </hw:composition>
    <hw:aesthetic>
      <hw:chromatic system="amethyst" space="oklch" palette="purple,violet,magenta" contrast-ratio="8.5"/>
      <hw:motion vocabulary="flow,pulse" physics="fluid" timing="linear" duration-base="4s" stagger-regime="energetic" cim-compliant="true"/>
      <hw:geometry form-language="geometric" corner-radius="16px" grid="1x1" proportional-system="phi" mathematical-basis="equilateral-triangle" symmetry="bilateral"/>
    </hw:aesthetic>
    <hw:reasoning>
      <hw:intent>A computational, mystical representation of the ⟁ (Triangle with Dot) motif.</hw:intent>
      <hw:approach>Utilized stacked-stroke opacities within a 45-degree halftone mask to generate true 3D volumetric shading on a static geometry.</hw:approach>
      <hw:tradeoffs>Kept the primary geometry static to preserve the symbol's iconic upright readability, using racing perimeter lasers to provide high-energy motion.</hw:tradeoffs>
    </hw:reasoning>
  </metadata>
  
  <defs>
    <style>
      @keyframes nexus-laser-flow { to { stroke-dashoffset: 0; } }
      @keyframes nexus-pulse { 0%, 100% { opacity: 0.8; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }
      
      .laser-outer { animation: nexus-laser-flow 6s linear infinite; }
      .laser-inner { animation: nexus-laser-flow 4s linear infinite reverse; }
      .center-pulse { transform-origin: 300px 300px; animation: nexus-pulse 4s ease-in-out infinite; }
    </style>
    
    <linearGradient id="nexus-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#07020D"/>
      <stop offset="100%" stop-color="#19062E"/>
    </linearGradient>
    
    <!-- 45-degree dense halftone grid -->
    <pattern id="nexus-dot" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <circle cx="5" cy="5" r="4.5" fill="white"/>
    </pattern>
    
    <!-- Exact Equilateral Triangles -->
    <!-- Outer: R=220. Top: (300, 80), Bot: (109.5, 410) & (490.5, 410) -->
    <path id="tri-outer" d="M 300 80 L 490.5 410 L 109.5 410 Z" fill="none" stroke-linejoin="round"/>
    <!-- Inner: R=140. Top: (300, 160), Bot: (178.8, 370) & (421.2, 370) -->
    <path id="tri-inner" d="M 300 160 L 421.2 370 L 178.8 370 Z" fill="none" stroke-linejoin="round"/>

    <!-- Volumetric 3D Shading Mask (Stacked Opacities) -->
    <mask id="nexus-3d-shape-mask">
      <!-- Outer Triangle Volume -->
      <use href="#tri-outer" stroke="white" stroke-width="80" opacity="0.05"/>
      <use href="#tri-outer" stroke="white" stroke-width="60" opacity="0.15"/>
      <use href="#tri-outer" stroke="white" stroke-width="40" opacity="0.30"/>
      <use href="#tri-outer" stroke="white" stroke-width="20" opacity="0.60"/>
      <use href="#tri-outer" stroke="white" stroke-width="6"  opacity="1.0"/>
      
      <!-- Inner Triangle Volume -->
      <use href="#tri-inner" stroke="white" stroke-width="40" opacity="0.10"/>
      <use href="#tri-inner" stroke="white" stroke-width="25" opacity="0.25"/>
      <use href="#tri-inner" stroke="white" stroke-width="12" opacity="0.60"/>
      <use href="#tri-inner" stroke="white" stroke-width="3"  opacity="1.0"/>
      
      <!-- Central Core Glow (The Dot in ⟁) -->
      <circle cx="300" cy="300" r="100" fill="white" opacity="0.05"/>
      <circle cx="300" cy="300" r="70"  fill="white" opacity="0.15"/>
      <circle cx="300" cy="300" r="45"  fill="white" opacity="0.40"/>
      <circle cx="300" cy="300" r="25"  fill="white" opacity="1.0"/>
    </mask>
    
    <!-- Final mask tying the 3D shading to the Halftone Dots -->
    <mask id="nexus-final-halftone-mask">
      <rect width="600" height="600" fill="url(#nexus-dot)" mask="url(#nexus-3d-shape-mask)"/>
    </mask>

    <!-- Color Gradient for the geometry -->
    <linearGradient id="nexus-color" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E699FF"/>
      <stop offset="50%" stop-color="#B31AFF"/>
      <stop offset="100%" stop-color="#4D0099"/>
    </linearGradient>

    <!-- Atmosphere Glow Filter -->
    <filter id="nexus-glow-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>

    <filter id="nexus-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="25" flood-color="#000000" flood-opacity="0.95"/>
    </filter>
  </defs>

  <rect width="600" height="600" fill="url(#nexus-bg)"/>

  <!-- Subtle Deep Atmosphere Glow -->
  <circle cx="300" cy="320" r="180" fill="#9900FF" opacity="0.15" filter="url(#nexus-glow-blur)"/>

  <!-- The Halftoned 3D ⟁ Geometry -->
  <rect width="600" height="600" fill="url(#nexus-color)" mask="url(#nexus-final-halftone-mask)"/>
  
  <!-- High-Speed Data Lasers (Drawn sharply outside the mask) -->
  <!-- pathLength="100" standardizes the dasharray calculation across different perimeters -->
  <use href="#tri-outer" stroke="#E699FF" stroke-width="4" stroke-dasharray="15 85" stroke-dashoffset="100" pathLength="100" class="laser-outer" stroke-linecap="round" opacity="0.9"/>
  <use href="#tri-outer" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="2 98" stroke-dashoffset="100" pathLength="100" class="laser-outer" stroke-linecap="round" opacity="1.0"/>
  
  <use href="#tri-inner" stroke="#D966FF" stroke-width="3" stroke-dasharray="20 80" stroke-dashoffset="100" pathLength="100" class="laser-inner" stroke-linecap="round" opacity="0.8"/>
  <use href="#tri-inner" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="4 96" stroke-dashoffset="100" pathLength="100" class="laser-inner" stroke-linecap="round" opacity="1.0"/>

  <!-- Pulsing inner energy dot to sell the ⟁ -->
  <circle cx="300" cy="300" r="18" fill="#E699FF" filter="url(#nexus-glow-blur)" class="center-pulse" opacity="0.8"/>

  <!-- Glass Center Badge -->
  <!-- Note: The badge acts as an architectural housing for the core dot -->
  <g filter="url(#nexus-shadow)">
    <rect x="230" y="230" width="140" height="140" rx="32" fill="#0A0614" fill-opacity="0.85" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <text x="300" y="310" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="900" text-anchor="middle" letter-spacing="2">NEXUS</text>
  </g>
</svg>