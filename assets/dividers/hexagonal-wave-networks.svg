<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="40" viewBox="0 0 1200 40">
    <defs>
        <linearGradient id="hyperGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#FF0A54" />
            <stop offset="25%" style="stop-color:#FF477E" />
            <stop offset="50%" style="stop-color:#0AFFEF" />
            <stop offset="75%" style="stop-color:#4A90E2" />
            <stop offset="100%" style="stop-color:#B47EF7" />
        </linearGradient>
        <filter id="hyperGlow1">
            <feGaussianBlur stdDeviation="1" result="coloredBlur" />
            <feMerge>
                <feMergeNode in="coloredBlur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    <!-- Hexagonal pattern base -->
    <g opacity="0.3">
        <polygon points="100,20 110,15 120,20 110,25" fill="none"
                 stroke="url(#hyperGrad1)" stroke-width="0.5" />
        <polygon points="300,20 310,15 320,20 310,25" fill="none"
                 stroke="url(#hyperGrad1)" stroke-width="0.5" />
        <polygon points="500,20 510,15 520,20 510,25" fill="none"
                 stroke="url(#hyperGrad1)" stroke-width="0.5" />
        <polygon points="700,20 710,15 720,20 710,25" fill="none"
                 stroke="url(#hyperGrad1)" stroke-width="0.5" />
        <polygon points="900,20 910,15 920,20 910,25" fill="none"
                 stroke="url(#hyperGrad1)" stroke-width="0.5" />
        <polygon points="1100,20 1110,15 1120,20 1110,25" fill="none"
                 stroke="url(#hyperGrad1)" stroke-width="0.5" />
    </g>
    <!-- Flowing data stream -->
    <path d="M0,20 Q300,15 600,20 T1200,20" stroke="url(#hyperGrad1)" stroke-width="2"
          fill="none" filter="url(#hyperGlow1)" opacity="0.8">
        <animate attributeName="d" values="M0,20 Q300,15 600,20 T1200,20;
                             M0,20 Q300,25 600,20 T1200,20;
                             M0,20 Q300,15 600,20 T1200,20" dur="4s"
                 repeatCount="indefinite" />
    </path>
    <!-- Data nodes -->
    <g filter="url(#hyperGlow1)">
        <circle r="3" fill="#0AFFEF">
            <animateMotion dur="6s" repeatCount="indefinite"
                           path="M0,20 Q300,15 600,20 T1200,20" />
            <animate attributeName="r" values="3;5;3" dur="1s"
                     repeatCount="indefinite" />
        </circle>
        <circle r="3" fill="#FF477E">
            <animateMotion dur="6s" begin="2s" repeatCount="indefinite"
                           path="M0,20 Q300,15 600,20 T1200,20" />
            <animate attributeName="r" values="3;5;3" dur="1s"
                     repeatCount="indefinite" />
        </circle>
        <circle r="3" fill="#B47EF7">
            <animateMotion dur="6s" begin="4s" repeatCount="indefinite"
                           path="M0,20 Q300,15 600,20 T1200,20" />
            <animate attributeName="r" values="3;5;3" dur="1s"
                     repeatCount="indefinite" />
        </circle>
    </g>
</svg>