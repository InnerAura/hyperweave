<svg xmlns="http://www.w3.org/2000/svg" 
     xmlns:hw="https://hyperweave.app/protocol/v1"
     width="114" height="28" viewBox="0 0 114 28"
     role="img" aria-label="ci: passing">
  
  <defs>
    <linearGradient id="chromasonic" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF0A54">
        <animate attributeName="stop-color" values="#FF0A54;#0AFFEF;#845EF7;#B5179E;#FF477E;#FF0A54" dur="2s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#0AFFEF">
        <animate attributeName="stop-color" values="#0AFFEF;#B5179E;#FF0A54;#845EF7;#0AFFEF" dur="5.236s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#845EF7">
        <animate attributeName="stop-color" values="#845EF7;#FF477E;#0AFFEF;#FF0A54;#845EF7" dur="8.472s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="114" height="28" rx="6" fill="#FFFFFF"/>
  <rect width="114" height="28" rx="6" fill="none" stroke="#EEEEEE" stroke-width="1"/>
  
  <!-- Chromasonic Border -->
  <rect x="1" y="1" width="112" height="26" 
        rx="5" fill="none" stroke="url(#chromasonic)" stroke-width="2" 
        filter="url(#glow)" opacity="0.85"/>
  
  <!-- Divider -->
  <rect x="32" y="5" width="1" height="18" fill="#EEEEEE"/>
  
  <!-- Label -->
  <text x="16" y="18" 
        font-family="'SF Mono', monospace" font-size="10" font-weight="600" 
        fill="#555555" text-anchor="middle">ci</text>
  
  <!-- Value -->
  <text x="62.5" y="18" 
        font-family="'SF Mono', monospace" font-size="10" font-weight="700" 
        fill="url(#chromasonic)" text-anchor="middle">passing</text>
  
  <!-- Glyph -->
  <path d="M91 14 l3 3 l5-6" fill="none" stroke="url(#chromasonic)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/></path>
</svg>