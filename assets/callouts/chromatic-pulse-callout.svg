<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="600" height="120">
  <defs>
    <!-- QUANTUM FREQUENCY HARMONICS - INTERDIMENSIONAL CONSTANTS -->
    <linearGradient id="vibrantGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF0A54" /> <!-- 455.84621 THz -->
      <stop offset="25%" style="stop-color:#FF477E" /> <!-- 459.33017 THz -->
      <stop offset="50%" style="stop-color:#0AFFEF" /> <!-- 616.47932 THz -->
      <stop offset="75%" style="stop-color:#845EF7" /> <!-- 667.89155 THz -->
      <stop offset="100%" style="stop-color:#B5179E" /> <!-- 553.21783 THz -->
    </linearGradient>
    
    <!-- CHROMATIC PULSE GRADIENT - ROTATING SPECTRUM -->
    <linearGradient id="chromaticGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF0A54">
        <animate attributeName="stop-color" 
                 values="#FF0A54;#0AFFEF;#845EF7;#FF0A54" 
                 dur="4s" 
                 repeatCount="indefinite" />
      </stop>
      <stop offset="50%" style="stop-color:#0AFFEF">
        <animate attributeName="stop-color" 
                 values="#0AFFEF;#845EF7;#FF0A54;#0AFFEF" 
                 dur="4s" 
                 repeatCount="indefinite" />
      </stop>
      <stop offset="100%" style="stop-color:#845EF7">
        <animate attributeName="stop-color" 
                 values="#845EF7;#FF0A54;#0AFFEF;#845EF7" 
                 dur="4s" 
                 repeatCount="indefinite" />
      </stop>
    </linearGradient>
    
    <!-- PHI-OPTIMIZED BACKGROUND -->
    <linearGradient id="noteGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F0F4FF" />
      <stop offset="61.8%" style="stop-color:#F3F4F6" /> <!-- Golden ratio point -->
      <stop offset="100%" style="stop-color:#F8FAFC" />
    </linearGradient>
    
    <!-- ENHANCED GLOW FIELD - THOUGHT AMPLIFICATION -->
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- FRACTAL DIMENSION PATTERN - BACKGROUND TEXTURE -->
    <pattern id="fractalPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="none" />
      <path d="M20,10 L30,10 L30,20 L20,20 Z M10,20 L20,20 L20,30 L10,30 Z M30,20 L35,20 L35,25 L30,25 Z" 
            fill="#EEEEEE" opacity="0.04" />
      <path d="M15,15 L18,15 L18,18 L15,18 Z M25,15 L28,15 L28,18 L25,18 Z M20,25 L23,25 L23,28 L20,28 Z" 
            fill="#EEEEEE" opacity="0.02" />
    </pattern>
  </defs>

  <!-- NOTE CONTAINER - DIMENSIONAL SUBSTRATE -->
  <rect x="10" y="10" width="580" height="100" rx="8" fill="url(#noteGradient)" />
  <rect x="10" y="10" width="580" height="100" rx="8" fill="url(#fractalPattern)" />
  
  <!-- CHROMATIC PULSE BORDER -->
  <rect x="10" y="10" width="580" height="100" rx="8" fill="none" 
        stroke="url(#chromaticGradient)" stroke-width="3"
        filter="url(#softGlow)">
    <animate attributeName="stroke-width" 
             values="2;5;2" 
             dur="2.5s" 
             repeatCount="indefinite"
             calcMode="spline"
             keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
    <animate attributeName="opacity" 
             values="0.7;1;0.7" 
             dur="2.5s" 
             repeatCount="indefinite"
             calcMode="spline"
             keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
  </rect>
  
  <!-- OCTAHEDRAL SIGNATURE - REDUCED SCALE -->
  <g transform="translate(40, 60) scale(0.15)">
    <!-- Main octahedral boundary -->
    <circle cx="0" cy="0" r="85" fill="none" stroke="#EEEEEE" stroke-width="0.5" opacity="0.2" />
    
    <!-- Octahedron edges - QUANTUM STABILITY STRUCTURE -->
    <g stroke="url(#chromaticGradient)" stroke-width="0.5" opacity="0.3">
      <line x1="0" y1="-80" x2="80" y2="0" />
      <line x1="0" y1="-80" x2="0" y2="0" />
      <line x1="0" y1="-80" x2="-80" y2="0" />
      <line x1="0" y1="80" x2="80" y2="0" />
      <line x1="0" y1="80" x2="0" y2="0" />
      <line x1="0" y1="80" x2="-80" y2="0" />
      <line x1="80" y1="0" x2="0" y2="0" />
      <line x1="0" y1="0" x2="-80" y2="0" />
    </g>
    
    <!-- Main transmitter shape -->
    <path d="M -15,-60 
             L -45,-30 
             C -60,-15 -60,15 -45,30 
             L -15,60 
             L 15,60 
             L 45,30 
             C 60,15 60,-15 45,-30 
             L 15,-60 
             Z" 
          fill="none" 
          stroke="url(#chromaticGradient)" 
          stroke-width="4" 
          stroke-linejoin="round" 
          stroke-linecap="round"
          filter="url(#softGlow)">
      <animate attributeName="stroke-width" 
               values="4;5;4" 
               dur="3s" 
               repeatCount="indefinite" 
               calcMode="spline"
               keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
    </path>
    
    <!-- Central nexus with chromatic pulse -->
    <circle cx="0" cy="0" r="3" fill="url(#chromaticGradient)">
      <animate attributeName="r" 
               values="3;5;3" 
               dur="2.5s" 
               repeatCount="indefinite" 
               calcMode="spline"
               keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
    </circle>
  </g>
  
  <!-- NOTE CONTENT - KNOWLEDGE TRANSMISSION -->
  <text x="70" y="45" font-family="'Inter', 'Helvetica Neue', sans-serif" fill="#1E293B" font-size="18" font-weight="600">
    HyperWeave Callout
  </text>
  <text x="70" y="70" font-family="'Inter', 'Helvetica Neue', sans-serif" fill="#4B5563" font-size="14" font-weight="400" letter-spacing="0.01em">
    Chromatic Pulse Edition - Spectrum Shift Animation
  </text>

  <!-- CHROMATIC GLOW PULSE - QUANTUM RESONANCE -->
  <circle cx="40" cy="60" r="20" fill="url(#chromaticGradient)" opacity="0" filter="url(#softGlow)">
    <animate attributeName="opacity" 
             values="0;0.15;0" 
             dur="2.5s" 
             repeatCount="indefinite"
             calcMode="spline"
             keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
    <animate attributeName="r" 
             values="20;30;20" 
             dur="2.5s" 
             repeatCount="indefinite"
             calcMode="spline"
             keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" />
  </circle>
</svg>