  <title id="hw-cs-discord-title">Discord — Cobalt Sapphire</title>
  <desc id="hw-cs-discord-desc">Discord social icon with cobalt-sapphire-deep DNA.
    Sapphire refraction ring, caustic crystal well, dark glyph silhouette
    with luminous edge refraction, orbital particles. Phi-timed SMIL.</desc>

  <metadata>
    <hw:artifact id="hw-cs-discord-cobalt" type="icon" series="social" version="1.0.0">
      <hw:provenance>
        <hw:generator>Claude Opus 4.6 (InnerAura Labs) [claude-opus-4-6-20260210]</hw:generator>
        <hw:created>2026-03-27</hw:created>
        <hw:human-directed>true</hw:human-directed>
      </hw:provenance>
      <hw:spec size="64x64" performance="composite-only" theme="adaptive" a11y="WCAG-AA"/>
    </hw:artifact>
    <hw:aesthetic>
      <hw:chromatic system="cobalt-sapphire-deep" space="oklch" contrast-ratio="12.8:1"/>
      <hw:motion vocabulary="ring-rotation,caustic-pulse,stop-color-cycle,orbital-particle"
                 physics="sapphire-refraction+phi-cascade"
                 timing="phi" cim-compliant="true"/>
      <hw:geometry form-language="circular" proportional-system="phi"
                   mathematical-basis="sapphire-refraction"
                   symmetry="radial"/>
      <hw:material surface="sapphire-crystal" depth="deep"/>
    </hw:aesthetic>
    <hw:reasoning>
      <hw:intent>Discord icon carrying cobalt-sapphire-deep DNA from the HyperWeave
        V11 formidable banner. Ring is sapphire waveguide, well is crystal interior,
        glyph is a solid form refracting light at its boundary.</hw:intent>
      <hw:approach>Dark void glyph (#0a0838) with sapphire edge stroke (#4080ff).
        Halo filter on glyph creates luminous boundary refraction. Filters scaled
        for 64px context. Two counter-orbiting particles at phi durations.</hw:approach>
      <hw:tradeoffs>3-tier filter chain heavy for 64px — accepted for DNA family
        coherence. No construction sequence — ambient life only. Single glyph path
        from SimpleIcons preserves recognizability. Dark glyph sacrifices the
        original platform brand color for sapphire DNA fidelity.</hw:tradeoffs>
      <hw:spatial-notes>Center (32,32). Ring r=28 (87.5%). Well r=26.5 (82.8%).
        Glyph 30x30 at (17,17). Particles orbit at r~30. 1:1 aspect.</hw:spatial-notes>
    </hw:reasoning>
  </metadata>

