<!-- LIQUID GLASS ADAPTIVE — Light/Dark Theme Aware -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 20" role="img" aria-label="glass v2.0.3">
  <style>
    :root {
      /* Default: Dark theme */
      --lg-fill-dark: rgba(255, 255, 255, 0.10);
      --lg-fill-light: rgba(255, 255, 255, 0.14);
      --lg-stroke: rgba(255, 255, 255, 0.25);
      --lg-stroke-light: rgba(255, 255, 255, 0.30);
      --lg-inner-stroke: rgba(255, 255, 255, 0.12);
      --lg-inner-stroke-light: rgba(255, 255, 255, 0.18);
      --lg-text-label: rgba(255, 255, 255, 0.85);
      --lg-text-value: rgba(255, 255, 255, 0.95);
      --lg-glare-opacity: 0.65;
      --lg-refraction-scale: 1.5;
      --lg-backdrop: none;
    }

    @media (prefers-color-scheme: light) {
      :root {
        /* Light theme: Darker, smoky glass */
        --lg-fill-dark: rgba(20, 30, 50, 0.08);
        --lg-fill-light: rgba(40, 60, 90, 0.12);
        --lg-stroke: rgba(60, 80, 120, 0.35);
        --lg-stroke-light: rgba(80, 100, 140, 0.40);
        --lg-inner-stroke: rgba(100, 120, 160, 0.20);
        --lg-inner-stroke-light: rgba(120, 140, 180, 0.25);
        --lg-text-label: rgba(30, 40, 60, 0.90);
        --lg-text-value: rgba(20, 30, 50, 0.95);
        --lg-glare-opacity: 0.35;
        --lg-refraction-scale: 1.2;
        --lg-backdrop: rgba(255, 255, 255, 0.85);
      }
    }

    .lg-backdrop {
      fill: var(--lg-backdrop);
    }
    .lg-body-dark { fill: var(--lg-fill-dark); stroke: var(--lg-stroke); }
    .lg-body-light { fill: var(--lg-fill-light); stroke: var(--lg-stroke-light); }
    .lg-edge-dark { stroke: var(--lg-inner-stroke); }
    .lg-edge-light { stroke: var(--lg-inner-stroke-light); }
    .lg-text-label { fill: var(--lg-text-label); }
    .lg-text-value { fill: var(--lg-text-value); }
  </style>

  <defs>
    <!-- Liquid Glass Filter (with CSS-driven scale) -->
    <filter id="lgfx" x="-12%" y="-20%" width="124%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.024" numOctaves="1" seed="4" result="n">
        <animate attributeName="baseFrequency" values="0.024;0.030;0.024" dur="5s" repeatCount="indefinite"/>
      </feTurbulence>
      <feComponentTransfer in="n" result="d">
        <feFuncA type="discrete" tableValues="0 0.3 0.5 0.7 0.9 1"/>
      </feComponentTransfer>
      <feDisplacementMap in="SourceGraphic" in2="d" xChannelSelector="R" yChannelSelector="G" scale="1.5" result="refr">
        <animate attributeName="scale" values="1.2;2.0;1.2" dur="5s" repeatCount="indefinite"/>
      </feDisplacementMap>

      <!-- Specular sparkle with moving point light -->
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.5" result="sa"/>
      <feSpecularLighting in="sa" surfaceScale="2" specularConstant="1" specularExponent="28" lighting-color="#ffffff" result="spec">
        <fePointLight x="18" y="6" z="40">
          <animate attributeName="x" values="18;72;18" dur="6s" repeatCount="indefinite"/>
          <animate attributeName="y" values="6;10;6" dur="6s" repeatCount="indefinite"/>
        </fePointLight>
      </feSpecularLighting>
      <feComposite in="spec" in2="SourceAlpha" operator="in" result="specClip"/>
      <feComposite in="refr" in2="specClip" operator="arithmetic" k2="1" k3="1"/>
    </filter>

    <!-- Moving top glare (opacity controlled by CSS) -->
    <linearGradient id="lg-shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <mask id="lg-glare-mask">
      <rect x="-140" y="0" width="120" height="20" fill="url(#lg-shine)">
        <animate attributeName="x" values="-140;110;-140" dur="7s" repeatCount="indefinite"/>
      </rect>
    </mask>

    <!-- Rim gradient (works on all themes) -->
    <linearGradient id="lg-rim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0AFFEF"/>
      <stop offset="60%" stop-color="#845EF7"/>
      <stop offset="100%" stop-color="#FF0A54"/>
      <animateTransform attributeName="gradientTransform" type="rotate" from="0 .5 .5" to="360 .5 .5" dur="18s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>

  <!-- Optional backdrop for extreme light backgrounds -->
  <rect class="lg-backdrop" x="0" y="0" width="90" height="20" rx="3"/>

  <!-- Badge body (two halves), with liquid glass filter -->
  <g filter="url(#lgfx)">
    <!-- Left section -->
    <path d="M3 0 H45 V20 H3 Q0 20 0 17 V3 Q0 0 3 0 Z"
          class="lg-body-dark" stroke-width="0.5"/>
    <!-- Right section -->
    <path d="M45 0 H87 Q90 0 90 3 V17 Q90 20 87 20 H45 Z"
          class="lg-body-light" stroke-width="0.5"/>
    <!-- Moving glare on top -->
    <rect x="0" y="0" width="90" height="20" fill="#ffffff" opacity="0.65" mask="url(#lg-glare-mask)"/>
  </g>

  <!-- Inner edge hints -->
  <path d="M3 0.5 H44.5 V19.5 H3 Q0.5 19.5 0.5 17 V3 Q0.5 0.5 3 0.5 Z"
        fill="none" class="lg-edge-dark" stroke-width="0.5"/>
  <path d="M45.5 0.5 H87 Q89.5 0.5 89.5 3 V17 Q89.5 19.5 87 19.5 H45.5 Z"
        fill="none" class="lg-edge-light" stroke-width="0.5"/>

  <!-- Animated rim runners (counter-phase) -->
  <path d="M3 0 H45 V20 H3 Q0 20 0 17 V3 Q0 0 3 0 Z"
        fill="none" stroke="url(#lg-rim)" stroke-width="1.5" stroke-linecap="round"
        pathLength="100" stroke-dasharray="10 90" opacity="0.9">
    <animate attributeName="stroke-dashoffset" values="0;-100" dur="2.6s" repeatCount="indefinite"/>
  </path>
  <path d="M45 0 H87 Q90 0 90 3 V17 Q90 20 87 20 H45 Z"
        fill="none" stroke="url(#lg-rim)" stroke-width="1.4" stroke-linecap="round"
        pathLength="100" stroke-dasharray="8 92" opacity="0.8">
    <animate attributeName="stroke-dashoffset" values="0;100" dur="3.1s" repeatCount="indefinite"/>
  </path>

  <!-- Text (CSS-driven colors) -->
  <text x="22.5" y="14" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600"
        class="lg-text-label" text-anchor="middle">glass</text>
  <text x="67.5" y="14" font-family="ui-monospace,monospace" font-size="11" font-weight="500"
        class="lg-text-value" text-anchor="middle">v2.0.3</text>
</svg>
