    <title id="vt">The Verb Algebra — one artifact: compose it, transform it, read it,
        ship it</title>
    <desc id="vd">Hub-and-spoke verb algebra, blueprint mapping, adaptive light/dark,
        hand-drawn via baked vertex displacement. The artifact is composed from a spec,
        transformed (new id), and read without mutation (extract, verify, diff, query);
        it ships to documents (many into one) and surfaces (via --format). The accent is
        the verb algebra and destinations; one edge in, four out.</desc>
    <metadata>
        <hw:hyperweave xmlns:hw="https://hyperweave.app/hw/v1.0">
            <hw:artifact id="hw-verb-algebra-blueprint" type="diagram"
                         series="genome-gallery" version="0.4.0-alpha.5">
                <hw:provenance>
                    <hw:generator>Claude Opus 4.8 (InnerAura Labs) [claude-opus-4-8]
                    </hw:generator>
                    <hw:created>2026-06-24T00:00:00Z</hw:created>
                    <hw:human-directed>true</hw:human-directed>
                </hw:provenance>
                <hw:spec size="768x424" performance="composite-only" theme="adaptive"
                         a11y="WCAG-AA" />
                <hw:aesthetic>
                    <hw:chromatic system="blueprint" space="oklch" contrast-ratio="AA"
                                  mode="light-dark" />
                    <hw:geometry form-language="organic" proportional-system="grid"
                                 mathematical-basis="hub-and-spoke radial; hand-drawn via displacement field baked into subdivided path vertices (v'=v+D(v)) rather than a pixel-space filter; one inbound, four outbound"
                                 symmetry="bilateral" />
                    <hw:material surface="paper" depth="flat" />
                </hw:aesthetic>
                <hw:reasoning>
                    <hw:intent>Restore the hand-drawn wobble lost when the displacement
                        filter was removed, without reintroducing the mobile blur.
                    </hw:intent>
                    <hw:approach>The wobble is a displacement field D. feDisplacementMap
                        applied D in pixel space (post-rasterization, resolution-bound);
                        here the same field is applied to geometry — each box side and
                        arrow shaft is bowed by D sampled at its vertices, doubled with
                        a second independently re-jittered pass for the sketch feel.
                        Pure vector: crisp at any DPI, computed once at author time.
                    </hw:approach>
                    <hw:tradeoffs>Isomorphic to the filter on the shared structure 'warp
                        by D', differing only in domain (vertices vs pixels) and time
                        (author vs frame); for thin strokes where D's wavelength exceeds
                        stroke width the two coincide. No filter means no linearRGB wash
                        and no high-DPI softening. Labels reflect only what ships; HTML
                        stays off-diagram as that seam raises NotImplementedError.
                        Resting state fully visible; draw-on layered where animation
                        runs.</hw:tradeoffs><hw:spatial-notes>768x424 grid radial;
                        keystone at (384,228). spec left and transform/read on the hub
                        centerline; documents and surfaces share left edge x560 and
                        width 152, symmetric about y228; arrows land on each
                        left-center. One inbound (compose), four
                        outbound.</hw:spatial-notes>
                </hw:reasoning>
            </hw:artifact>
        </hw:hyperweave>
    </metadata>
