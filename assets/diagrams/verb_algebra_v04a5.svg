    <title id="blueprintt">The Verb Algebra — one artifact: compose it, transform it,
        read it, ship it</title>
    <desc id="blueprintd">Hub-and-spoke verb algebra (blueprint mapping). The artifact
        is composed from a spec, transformed (new id), and read without mutation
        (extract, verify, diff, query); it ships to documents (many into one) and
        surfaces (via --target). The accent is the verb algebra and destinations; one
        edge in, four out.</desc>
    <metadata>
        <hw:hyperweave xmlns:hw="https://hyperweave.app/hw/v1.0">
            <hw:artifact id="hw-verb-algebra-blueprint" type="diagram"
                         series="genome-gallery" version="0.4.0-alpha.5">
                <hw:provenance>
                    <hw:generator>Claude Opus 4.8 (InnerAura Labs) [claude-opus-4-8]
                    </hw:generator>
                    <hw:created>2026-06-24T00:00:00Z</hw:created>
                    <hw:human-directed>true</hw:human-directed>
                </hw:provenance>
                <hw:spec size="768x500" performance="paint-ok" theme="light"
                         a11y="WCAG-AA" />
                <hw:aesthetic>
                    <hw:chromatic system="blueprint" space="oklch"
                                  contrast-ratio="AA" />
                    <hw:geometry form-language="organic" proportional-system="grid"
                                 mathematical-basis="hub-and-spoke radial; destinations share x/width, symmetric about hub centerline; one inbound, four outbound"
                                 symmetry="bilateral" />
                    <hw:material surface="paper" depth="flat" />
                </hw:aesthetic>
                <hw:reasoning>
                    <hw:intent>One of five chromatic mappings of the verb algebra; the
                        keystone is the focal block and the diagram stands alone via
                        title and subtitle.</hw:intent>
                    <hw:approach>The accent is carried as a solid fill on the keystone
                        artifact plus the destination titles and the arrows that reach
                        them; every paper box keeps a single dark ink outline. The eye
                        reads ink as the operation scaffold and accent as the artifact
                        and where it ships.</hw:approach>
                    <hw:tradeoffs>No accent outlines on paper — an accent stroke on a
                        tinted fill muddies both, so the accent is a fill or text
                        instead. Labels reflect only what ships (documents 'many into
                        one', surfaces 'via --target'); HTML stays off-diagram as that
                        seam raises NotImplementedError. No background; resting state is
                        fully visible so it renders in any viewer, draw-on layered where
                        supported.</hw:tradeoffs><hw:spatial-notes>768x500 grid radial;
                        keystone at (384,300). spec left and transform/read on the hub
                        centerline; documents and surfaces share left edge x560 and
                        width 152, symmetric about y300; their arrows land on each
                        left-center. One inbound (compose), four
                        outbound.</hw:spatial-notes>
                </hw:reasoning>
            </hw:artifact>
        </hw:hyperweave>
    </metadata>
