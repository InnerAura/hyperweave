<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" 
     xmlns:hw="https://hyperweave.dev/hw/v1.0"
     viewBox="0 0 960 320"
     role="img"
     aria-labelledby="hw-hero-title hw-hero-desc"
     data-hw-variant="hero-banner"
     data-hw-regime="auto"
     data-hw-chromatic="spectrum">
  
  <title id="hw-hero-title">HyperWeave - Living SVG Artifacts</title>
  <desc id="hw-hero-desc">Visual infrastructure for the agentic web. Generate Living SVG Artifacts with zero JavaScript.</desc>
  
  <metadata>
    <hw:artifact type="hero-banner" series="hyperweave" version="2.0">
      <hw:provenance>
        <hw:generator>Claude (Anthropic)</hw:generator>
        <hw:created>2026-01-21</hw:created>
        <hw:protocol>HyperWeave v7.1</hw:protocol>
      </hw:provenance>
      <hw:reasoning>
        <hw:intent>Docs homepage hero - establishes brand identity with full chromasonic experience while supporting both light and dark themes</hw:intent>
        <hw:approach>Preserved all SMIL animations from original (stop-color cycling, stroke breathing, particle orbits, filter modulation); added CSS media queries for regime-responsive text, background, and wire elements; expanded viewBox to 960x320 with geometry centered at (200, 160) ensuring no clipping</hw:approach>
        <hw:tradeoffs>Background transparent by default (works on any surface); gradient colors not regime-switched (chromatic spectrum works on both); φ-ratio timing preserved across all animation layers</hw:tradeoffs>
      </hw:reasoning>
    </hw:artifact>
  </metadata>
  
  <defs>
    <!-- ═══════════════════════════════════════════════════════════
         CHROMASONIC EVOLUTION - TEMPORAL CASCADE HARMONICS
         φ-ratio cascade: 2s, 3.236s, 5.236s, 8.472s, 13.708s
         ═══════════════════════════════════════════════════════════ -->
    <linearGradient id="hw-hero-chroma" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF0A54">
        <animate attributeName="stop-color" 
                 values="#FF0A54;#0AFFEF;#845EF7;#B5179E;#FF477E;#FF0A54" 
                 dur="2s" repeatCount="indefinite"
                 calcMode="spline"
                 keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94"/>
      </stop>
      <stop offset="25%" style="stop-color:#FF477E">
        <animate attributeName="stop-color" 
                 values="#FF477E;#845EF7;#B5179E;#0AFFEF;#FF0A54;#FF477E" 
                 dur="3.236s" repeatCount="indefinite"
                 calcMode="spline"
                 keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94"/>
      </stop>
      <stop offset="50%" style="stop-color:#0AFFEF">
        <animate attributeName="stop-color" 
                 values="#0AFFEF;#B5179E;#FF0A54;#845EF7;#FF477E;#0AFFEF" 
                 dur="5.236s" repeatCount="indefinite"
                 calcMode="spline"
                 keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94"/>
      </stop>
      <stop offset="75%" style="stop-color:#845EF7">
        <animate attributeName="stop-color" 
                 values="#845EF7;#FF0A54;#FF477E;#B5179E;#0AFFEF;#845EF7" 
                 dur="8.472s" repeatCount="indefinite"
                 calcMode="spline"
                 keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94"/>
      </stop>
      <stop offset="100%" style="stop-color:#B5179E">
        <animate attributeName="stop-color" 
                 values="#B5179E;#FF477E;#0AFFEF;#FF0A54;#845EF7;#B5179E" 
                 dur="13.708s" repeatCount="indefinite"
                 calcMode="spline"
                 keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94"/>
      </stop>
    </linearGradient>
    
    <!-- TEXT GRADIENT -->
    <linearGradient id="hw-hero-text-chroma" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B35">
        <animate attributeName="stop-color" 
                 values="#FF6B35;#F72585;#845EF7;#0AFFEF;#FF6B35" 
                 dur="8.472s" repeatCount="indefinite"
                 calcMode="spline"
                 keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94"/>
      </stop>
      <stop offset="100%" style="stop-color:#F72585">
        <animate attributeName="stop-color" 
                 values="#F72585;#845EF7;#0AFFEF;#FF6B35;#F72585" 
                 dur="13.708s" repeatCount="indefinite"
                 calcMode="spline"
                 keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94"/>
      </stop>
    </linearGradient>
    
    <!-- PARTICLE GLOW -->
    <radialGradient id="hw-hero-particle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0AFFEF;stop-opacity:0.9">
        <animate attributeName="stop-color" 
                 values="#0AFFEF;#FF0A54;#845EF7;#B5179E;#FF477E;#0AFFEF" 
                 dur="8.472s" repeatCount="indefinite"
                 calcMode="spline"
                 keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94"/>
        <animate attributeName="stop-opacity" 
                 values="0.9;0.6;1.0;0.7;0.8;0.9" 
                 dur="3.236s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#0AFFEF;stop-opacity:0"/>
    </radialGradient>
    
    <!-- FACE GRADIENTS -->
    <linearGradient id="hw-hero-face1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0AFFEF;stop-opacity:0.3">
        <animate attributeName="stop-opacity" 
                 values="0.3;0.1;0.5;0.2;0.4;0.3" 
                 dur="5.127s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#B5179E;stop-opacity:0.1"/>
    </linearGradient>
    
    <linearGradient id="hw-hero-face2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF0A54;stop-opacity:0.3">
        <animate attributeName="stop-opacity" 
                 values="0.3;0.5;0.1;0.4;0.2;0.3" 
                 dur="3.127s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#0AFFEF;stop-opacity:0.1"/>
    </linearGradient>
    
    <!-- CASCADE GLOW FILTER -->
    <filter id="hw-hero-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2">
        <animate attributeName="stdDeviation" 
                 values="2;2.3;1.7;2.5;1.9;2.1;2" 
                 dur="3.236s" repeatCount="indefinite"
                 calcMode="spline"
                 keySplines="0.23 0.47 0.48 0.93;0.27 0.43 0.52 0.89;0.21 0.49 0.44 0.97;0.29 0.41 0.56 0.87;0.25 0.45 0.50 0.91;0.26 0.46 0.46 0.95"/>
      </feGaussianBlur>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15">
          <animate attributeName="slope" 
                   values="0.15;0.25;0.10;0.30;0.20;0.15" 
                   dur="5.236s" repeatCount="indefinite"/>
        </feFuncA>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="hw-hero-soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <style><![CDATA[
    /* ─── REGIME: PEARL (Light Mode) ─── */
    .hw-text-primary { fill: #1A1A1A; }
    .hw-text-secondary { fill: #555555; }
    .hw-text-tertiary { fill: #888888; }
    .hw-wire { stroke: #DDDDDD; }
    
    /* ─── REGIME: CARBON (Dark Mode) ─── */
    @media (prefers-color-scheme: dark) {
      .hw-text-primary { fill: #F8FAFC; }
      .hw-text-secondary { fill: #A1A1AA; }
      .hw-text-tertiary { fill: #71717A; }
      .hw-wire { stroke: #3F3F46; }
    }
    
    /* ─── ACCESSIBILITY ─── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  ]]></style>
  
  <!-- MAIN GEOMETRY - Centered at (200, 160), scale 1.4x from original -->
  <g data-hw-section="identity" transform="translate(200, 160) scale(1.4)">
    
    <!-- BOUNDING SPHERE -->
    <circle class="hw-wire" cx="0" cy="0" r="75" fill="none" stroke-width="0.5" opacity="0.2">
      <animate attributeName="r" values="75;77;75" dur="2s" repeatCount="indefinite"
               calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
      <animate attributeName="opacity" 
               values="0.2;0.18;0.22;0.19;0.21;0.2" 
               dur="3.236s" repeatCount="indefinite"/>
    </circle>
    
    <!-- OCTAHEDRON VERTICES -->
    <g fill="url(#hw-hero-chroma)" opacity="0.9">
      <circle cx="0" cy="-70" r="2.5">
        <animate attributeName="r" values="2.5;3.0;2.5" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="70" cy="0" r="2.5">
        <animate attributeName="r" values="2.5;3.2;2.5" dur="3.236s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="70" r="2.5">
        <animate attributeName="r" values="2.5;3.5;2.5" dur="5.236s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-70" cy="0" r="2.5">
        <animate attributeName="r" values="2.5;3.8;2.5" dur="8.472s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="2.5">
        <animate attributeName="r" values="2.5;4.0;2.5" dur="13.708s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <!-- OCTAHEDRON EDGES -->
    <g stroke="url(#hw-hero-chroma)" stroke-width="0.5" opacity="0.4">
      <animate attributeName="opacity" 
               values="0.4;0.6;0.3;0.7;0.5;0.4" 
               dur="5.236s" repeatCount="indefinite"/>
      <line x1="0" y1="-70" x2="70" y2="0"/>
      <line x1="0" y1="-70" x2="0" y2="0"/>
      <line x1="0" y1="-70" x2="-70" y2="0"/>
      <line x1="0" y1="70" x2="70" y2="0"/>
      <line x1="0" y1="70" x2="0" y2="0"/>
      <line x1="0" y1="70" x2="-70" y2="0"/>
      <line x1="70" y1="0" x2="0" y2="0"/>
      <line x1="0" y1="0" x2="-70" y2="0"/>
    </g>
    
    <!-- OCTAHEDRON FACES -->
    <g opacity="0.15">
      <animate attributeName="opacity" 
               values="0.15;0.25;0.10;0.30;0.20;0.15" 
               dur="8.472s" repeatCount="indefinite"/>
      <path d="M 0,-70 L 70,0 L 0,0 Z" fill="url(#hw-hero-face1)"/>
      <path d="M 0,-70 L 0,0 L -70,0 Z" fill="url(#hw-hero-face2)"/>
      <path d="M 0,70 L 70,0 L 0,0 Z" fill="url(#hw-hero-face2)"/>
      <path d="M 0,70 L 0,0 L -70,0 Z" fill="url(#hw-hero-face1)"/>
    </g>
    
    <!-- REFERENCE RINGS -->
    <g class="hw-wire" fill="none" stroke-width="0.5" opacity="0.2">
      <circle cx="0" cy="0" r="35">
        <animate attributeName="opacity" values="0.2;0.3;0.2" dur="3.236s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="55">
        <animate attributeName="opacity" values="0.2;0.4;0.2" dur="5.236s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <!-- CORE TRANSMITTER -->
    <path d="M -13,-50 
             L -40,-25 
             C -52,-12 -52,12 -40,25 
             L -13,50 
             L 13,50 
             L 40,25 
             C 52,12 52,-12 40,-25 
             L 13,-50 
             Z" 
          fill="none" 
          stroke="url(#hw-hero-chroma)" 
          stroke-width="4.5" 
          stroke-linejoin="round" 
          stroke-linecap="round"
          filter="url(#hw-hero-glow)">
      <animate attributeName="stroke-width" 
               values="4.5;5.8;4.2;6.1;4.8;4.5" 
               dur="5.236s" repeatCount="indefinite" 
               calcMode="spline"
               keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94"/>
      <animateTransform attributeName="transform"
                       type="rotate"
                       values="0;1.5;-1.2;2.1;-0.8;0"
                       dur="13.708s" repeatCount="indefinite"
                       calcMode="spline"
                       keySplines="0.23 0.47 0.48 0.93;0.27 0.43 0.52 0.89;0.21 0.49 0.44 0.97;0.29 0.41 0.56 0.87;0.25 0.45 0.50 0.91"/>
    </path>
    
    <!-- INTERNAL CONNECTIONS -->
    <g stroke="url(#hw-hero-chroma)" stroke-width="1.5" opacity="0.7" stroke-linecap="round">
      <animate attributeName="opacity" 
               values="0.7;0.4;0.9;0.5;0.8;0.7" 
               dur="3.236s" repeatCount="indefinite"/>
      <line x1="-25" y1="-25" x2="25" y2="-25"/>
      <line x1="-30" y1="-4" x2="30" y2="-4"/>
      <line x1="-25" y1="17" x2="25" y2="17"/>
    </g>
    
    <!-- CORNER NODES -->
    <g fill="url(#hw-hero-chroma)">
      <circle cx="-13" cy="-50" r="2" opacity="0.9">
        <animate attributeName="r" values="2;2.3;2" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="13" cy="-50" r="2" opacity="0.9">
        <animate attributeName="r" values="2;2.4;2" dur="3.236s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-40" cy="-25" r="2" opacity="0.9">
        <animate attributeName="r" values="2;2.6;2" dur="5.236s" repeatCount="indefinite"/>
      </circle>
      <circle cx="40" cy="-25" r="2" opacity="0.9">
        <animate attributeName="r" values="2;2.8;2" dur="8.472s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-40" cy="25" r="2" opacity="0.9">
        <animate attributeName="r" values="2;2.5;2" dur="5.127s" repeatCount="indefinite"/>
      </circle>
      <circle cx="40" cy="25" r="2" opacity="0.9">
        <animate attributeName="r" values="2;2.7;2" dur="3.127s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-13" cy="50" r="2" opacity="0.9">
        <animate attributeName="r" values="2;2.4;2" dur="2.127s" repeatCount="indefinite"/>
      </circle>
      <circle cx="13" cy="50" r="2" opacity="0.9">
        <animate attributeName="r" values="2;2.9;2" dur="4.127s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <!-- NEXUS -->
    <circle cx="0" cy="0" r="3.5" fill="url(#hw-hero-chroma)" filter="url(#hw-hero-glow)">
      <animate attributeName="r" values="3.5;5.0;3.5" dur="13.708s" repeatCount="indefinite" 
               calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    </circle>
    
    <!-- ORBITING PARTICLES -->
    <g>
      <circle r="2.2" fill="url(#hw-hero-particle)" filter="url(#hw-hero-soft)">
        <animateMotion path="M0,-70 L70,0 L0,70 L-70,0 Z" dur="8.472s" repeatCount="indefinite"/>
        <animate attributeName="r" values="2.2;1.8;2.6;1.5;2.4;2.2" dur="8.472s" repeatCount="indefinite"/>
      </circle>
      <circle r="1.8" fill="url(#hw-hero-particle)" filter="url(#hw-hero-soft)">
        <animateMotion path="M0,-70 L0,0 L70,0 L0,70 L0,0 L-70,0 Z" dur="13.708s" repeatCount="indefinite"/>
        <animate attributeName="r" values="1.8;1.4;2.1;1.6;1.9;1.8" dur="13.708s" repeatCount="indefinite"/>
      </circle>
      <circle r="1.5" fill="url(#hw-hero-particle)" filter="url(#hw-hero-soft)">
        <animateMotion path="M35,-35 L35,35 L-35,35 L-35,-35 Z" dur="5.127s" repeatCount="indefinite"/>
        <animate attributeName="r" values="1.5;2.0;1.2;1.8;1.6;1.5" dur="5.127s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>
  
  <!-- TYPOGRAPHY -->
  <g data-hw-section="typography" transform="translate(440, 100)">
    <!-- Brand -->
    <text font-family="'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif" 
          font-size="56" font-weight="700">
      <tspan class="hw-text-primary">Hyper</tspan><tspan fill="url(#hw-hero-text-chroma)">Weave</tspan>
    </text>
    
    <!-- Primary tagline -->
    <text y="45" 
          class="hw-text-secondary"
          font-family="'Inter', -apple-system, sans-serif" 
          font-size="18" font-weight="400" 
          letter-spacing="1.618px">
      <animate attributeName="opacity" values="0.8;0.6;0.9;0.7;0.8" dur="5.236s" repeatCount="indefinite"/>
      WHERE VECTORS MEET VISION
    </text>
    
    <!-- Secondary tagline -->
    <text y="80" 
          class="hw-text-tertiary"
          font-family="'Inter', -apple-system, sans-serif" 
          font-size="14" font-weight="400" 
          font-style="italic"
          letter-spacing="0.05em">
      <animate attributeName="opacity" values="0.6;0.4;0.8;0.5;0.6" dur="8.472s" repeatCount="indefinite"/>
      Design at the intersection of math and mAGIc
    </text>
    
    <!-- Feature list -->
    <text y="130" 
          font-family="'SF Mono', 'JetBrains Mono', monospace" 
          font-size="12" font-weight="500" 
          fill="url(#hw-hero-chroma)" opacity="0.7">
      Living SVG Artifacts · Zero JavaScript · Infinite Compositions
    </text>
  </g>
</svg>
