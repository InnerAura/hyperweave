<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" 
     xmlns:hw="https://hyperweave.dev/hw/v1.0"
     viewBox="0 0 800 24"
     preserveAspectRatio="xMidYMid slice"
     role="separator"
     aria-hidden="true"
     data-hw-variant="divider"
     data-hw-regime="auto">
  
  <metadata>
    <hw:artifact type="divider" series="hyperweave" version="1.0">
      <hw:provenance>
        <hw:generator>Claude (Anthropic)</hw:generator>
        <hw:created>2026-01-21</hw:created>
        <hw:protocol>HyperWeave v7.1</hw:protocol>
      </hw:provenance>
      <hw:reasoning>
        <hw:intent>Section separator for docs - maintains brand continuity between content blocks</hw:intent>
        <hw:approach>Horizontal line with chromatic gradient; central nexus point; energy flows outward from center; preserveAspectRatio="slice" allows flexible width usage</hw:approach>
        <hw:tradeoffs>Kept minimal to not compete with content; no particles (too distracting for inline use); aria-hidden for accessibility (decorative element)</hw:tradeoffs>
      </hw:reasoning>
    </hw:artifact>
  </metadata>
  
  <defs>
    <!-- CHROMASONIC LINE GRADIENT -->
    <linearGradient id="hw-div-chroma" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF0A54;stop-opacity:0">
        <animate attributeName="stop-color" 
                 values="#FF0A54;#845EF7;#0AFFEF;#FF0A54" 
                 dur="5.236s" repeatCount="indefinite"/>
      </stop>
      <stop offset="30%" style="stop-color:#FF0A54;stop-opacity:0.7">
        <animate attributeName="stop-color" 
                 values="#FF0A54;#0AFFEF;#845EF7;#FF0A54" 
                 dur="3.236s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#0AFFEF;stop-opacity:1">
        <animate attributeName="stop-color" 
                 values="#0AFFEF;#845EF7;#FF0A54;#B5179E;#0AFFEF" 
                 dur="2s" repeatCount="indefinite"/>
      </stop>
      <stop offset="70%" style="stop-color:#845EF7;stop-opacity:0.7">
        <animate attributeName="stop-color" 
                 values="#845EF7;#B5179E;#0AFFEF;#845EF7" 
                 dur="3.236s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#B5179E;stop-opacity:0">
        <animate attributeName="stop-color" 
                 values="#B5179E;#FF0A54;#845EF7;#B5179E" 
                 dur="5.236s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    
    <!-- CENTER GLOW -->
    <radialGradient id="hw-div-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0AFFEF;stop-opacity:0.8">
        <animate attributeName="stop-color" 
                 values="#0AFFEF;#845EF7;#FF0A54;#0AFFEF" 
                 dur="2s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#0AFFEF;stop-opacity:0"/>
    </radialGradient>
    
    <filter id="hw-div-blur" x="-50%" y="-200%" width="200%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <style><![CDATA[
    .hw-div-track { stroke: #E5E5E5; }
    @media (prefers-color-scheme: dark) {
      .hw-div-track { stroke: #27272A; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; }
    }
  ]]></style>
  
  <!-- BACKGROUND TRACK (regime-responsive) -->
  <line class="hw-div-track" x1="100" y1="12" x2="700" y2="12" stroke-width="1" opacity="0.5"/>
  
  <!-- CHROMATIC LINE -->
  <line x1="100" y1="12" x2="700" y2="12" 
        stroke="url(#hw-div-chroma)" 
        stroke-width="2" 
        stroke-linecap="round"
        opacity="0.8">
    <animate attributeName="opacity" 
             values="0.8;0.6;0.9;0.7;0.8" 
             dur="5.236s" repeatCount="indefinite"/>
  </line>
  
  <!-- CENTER NEXUS -->
  <circle cx="400" cy="12" r="4" fill="url(#hw-div-glow)" filter="url(#hw-div-blur)">
    <animate attributeName="r" 
             values="4;5;4" 
             dur="2.618s" repeatCount="indefinite"
             calcMode="spline"
             keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
  </circle>
  
  <!-- ENERGY PULSES (outward from center) -->
  <circle cx="400" cy="12" r="4" fill="none" stroke="url(#hw-div-chroma)" stroke-width="1" opacity="0">
    <animate attributeName="r" values="4;50" dur="2.618s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0" dur="2.618s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="12" r="4" fill="none" stroke="url(#hw-div-chroma)" stroke-width="1" opacity="0">
    <animate attributeName="r" values="4;50" dur="2.618s" repeatCount="indefinite" begin="1.309s"/>
    <animate attributeName="opacity" values="0.6;0" dur="2.618s" repeatCount="indefinite" begin="1.309s"/>
  </circle>
</svg>
