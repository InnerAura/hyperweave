<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" 
     xmlns:hw="https://hyperweave.dev/hw/v1.0"
     viewBox="0 0 1200 630"
     role="img"
     aria-labelledby="hw-og-title hw-og-desc"
     data-hw-variant="og-image"
     data-hw-regime="auto"
     data-hw-chromatic="spectrum">
  
  <title id="hw-og-title">HyperWeave - Living SVG Artifacts</title>
  <desc id="hw-og-desc">Visual infrastructure for the agentic web. Generate Living SVG Artifacts with zero JavaScript.</desc>
  
  <metadata>
    <hw:artifact type="og-image" series="hyperweave" version="1.0">
      <hw:provenance>
        <hw:generator>Claude (Anthropic)</hw:generator>
        <hw:created>2026-01-21</hw:created>
        <hw:protocol>HyperWeave v7.1</hw:protocol>
      </hw:provenance>
      <hw:reasoning>
        <hw:intent>Social sharing preview image for docs site - establishes brand at first touch</hw:intent>
        <hw:approach>Centered hero composition; large transmitter with full octahedron scaffold; chromasonic cycling visible in static preview via gradient; tagline hierarchy</hw:approach>
        <hw:tradeoffs>Static platforms (Twitter/LinkedIn) won't show animation - designed to be striking even frozen; dark background default for visual impact</hw:tradeoffs>
      </hw:reasoning>
    </hw:artifact>
  </metadata>
  
  <defs>
    <!-- CHROMASONIC GRADIENT - Full 5-stop cascade -->
    <linearGradient id="hw-og-chroma" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF0A54">
        <animate attributeName="stop-color" 
                 values="#FF0A54;#0AFFEF;#845EF7;#B5179E;#FF477E;#FF0A54" 
                 dur="2s" repeatCount="indefinite"
                 calcMode="spline"
                 keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94"/>
      </stop>
      <stop offset="25%" style="stop-color:#FF477E">
        <animate attributeName="stop-color" 
                 values="#FF477E;#845EF7;#B5179E;#0AFFEF;#FF0A54;#FF477E" 
                 dur="3.236s" repeatCount="indefinite"
                 calcMode="spline"
                 keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94"/>
      </stop>
      <stop offset="50%" style="stop-color:#0AFFEF">
        <animate attributeName="stop-color" 
                 values="#0AFFEF;#B5179E;#FF0A54;#845EF7;#FF477E;#0AFFEF" 
                 dur="5.236s" repeatCount="indefinite"
                 calcMode="spline"
                 keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94"/>
      </stop>
      <stop offset="75%" style="stop-color:#845EF7">
        <animate attributeName="stop-color" 
                 values="#845EF7;#FF0A54;#FF477E;#B5179E;#0AFFEF;#845EF7" 
                 dur="8.472s" repeatCount="indefinite"
                 calcMode="spline"
                 keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94"/>
      </stop>
      <stop offset="100%" style="stop-color:#B5179E">
        <animate attributeName="stop-color" 
                 values="#B5179E;#FF477E;#0AFFEF;#FF0A54;#845EF7;#B5179E" 
                 dur="13.708s" repeatCount="indefinite"
                 calcMode="spline"
                 keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94"/>
      </stop>
    </linearGradient>
    
    <!-- TEXT GRADIENT -->
    <linearGradient id="hw-og-text-chroma" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B35">
        <animate attributeName="stop-color" 
                 values="#FF6B35;#F72585;#845EF7;#0AFFEF;#FF6B35" 
                 dur="8.472s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#F72585">
        <animate attributeName="stop-color" 
                 values="#F72585;#845EF7;#0AFFEF;#FF6B35;#F72585" 
                 dur="13.708s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    
    <!-- PARTICLE GLOW -->
    <radialGradient id="hw-og-particle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0AFFEF;stop-opacity:0.9">
        <animate attributeName="stop-color" 
                 values="#0AFFEF;#FF0A54;#845EF7;#0AFFEF" 
                 dur="8.472s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#0AFFEF;stop-opacity:0"/>
    </radialGradient>
    
    <!-- BACKGROUND GRADIENT -->
    <linearGradient id="hw-og-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F0F12"/>
      <stop offset="100%" style="stop-color:#1A1A22"/>
    </linearGradient>
    
    <!-- GLOW FILTERS -->
    <filter id="hw-og-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4">
        <animate attributeName="stdDeviation" 
                 values="4;6;3;5;4" 
                 dur="5.236s" repeatCount="indefinite"/>
      </feGaussianBlur>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="hw-og-soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- BACKGROUND -->
  <rect width="1200" height="630" fill="url(#hw-og-bg)"/>
  
  <!-- AMBIENT GRID (subtle) -->
  <g opacity="0.05" stroke="#FFFFFF" stroke-width="0.5">
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <circle cx="600" cy="315" r="200" fill="none"/>
    <circle cx="600" cy="315" r="280" fill="none"/>
  </g>
  
  <!-- MAIN GEOMETRY - Left side -->
  <g transform="translate(350, 315)">
    
    <!-- Bounding sphere -->
    <circle cx="0" cy="0" r="180" fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.15">
      <animate attributeName="opacity" 
               values="0.15;0.25;0.15" 
               dur="5.236s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Octahedron scaffold -->
    <g stroke="url(#hw-og-chroma)" stroke-width="1" opacity="0.4">
      <animate attributeName="opacity" 
               values="0.4;0.6;0.4" 
               dur="5.236s" repeatCount="indefinite"/>
      <!-- Upper pyramid -->
      <line x1="0" y1="-160" x2="160" y2="0"/>
      <line x1="0" y1="-160" x2="0" y2="0"/>
      <line x1="0" y1="-160" x2="-160" y2="0"/>
      <!-- Lower pyramid -->
      <line x1="0" y1="160" x2="160" y2="0"/>
      <line x1="0" y1="160" x2="0" y2="0"/>
      <line x1="0" y1="160" x2="-160" y2="0"/>
      <!-- Equator -->
      <line x1="160" y1="0" x2="0" y2="0"/>
      <line x1="0" y1="0" x2="-160" y2="0"/>
    </g>
    
    <!-- Octahedron vertices -->
    <g fill="url(#hw-og-chroma)" opacity="0.9">
      <circle cx="0" cy="-160" r="5"/>
      <circle cx="160" cy="0" r="5"/>
      <circle cx="0" cy="160" r="5"/>
      <circle cx="-160" cy="0" r="5"/>
      <circle cx="0" cy="0" r="7" filter="url(#hw-og-soft)"/>
    </g>
    
    <!-- Reference rings -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.2">
      <animate attributeName="opacity" values="0.2;0.35;0.2" dur="3.236s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="120" fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.15">
      <animate attributeName="opacity" values="0.15;0.3;0.15" dur="5.236s" repeatCount="indefinite"/>
    </circle>
    
    <!-- CORE TRANSMITTER -->
    <path d="M -30,-115 
             L -92,-58 
             C -120,-28 -120,28 -92,58 
             L -30,115 
             L 30,115 
             L 92,58 
             C 120,28 120,-28 92,-58 
             L 30,-115 
             Z" 
          fill="none" 
          stroke="url(#hw-og-chroma)" 
          stroke-width="8" 
          stroke-linejoin="round" 
          stroke-linecap="round"
          filter="url(#hw-og-glow)">
      <animate attributeName="stroke-width" 
               values="8;10;7;11;8" 
               dur="5.236s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform"
                       type="rotate"
                       values="0;1.5;-1.2;2.1;-0.8;0"
                       dur="13.708s" repeatCount="indefinite"/>
    </path>
    
    <!-- Internal connections -->
    <g stroke="url(#hw-og-chroma)" stroke-width="3" opacity="0.7" stroke-linecap="round">
      <animate attributeName="opacity" values="0.7;0.5;0.8;0.7" dur="3.236s" repeatCount="indefinite"/>
      <line x1="-58" y1="-58" x2="58" y2="-58"/>
      <line x1="-70" y1="-9" x2="70" y2="-9"/>
      <line x1="-58" y1="39" x2="58" y2="39"/>
    </g>
    
    <!-- Corner nodes -->
    <g fill="url(#hw-og-chroma)">
      <circle cx="-30" cy="-115" r="4"/>
      <circle cx="30" cy="-115" r="4"/>
      <circle cx="-92" cy="-58" r="4"/>
      <circle cx="92" cy="-58" r="4"/>
      <circle cx="-92" cy="58" r="4"/>
      <circle cx="92" cy="58" r="4"/>
      <circle cx="-30" cy="115" r="4"/>
      <circle cx="30" cy="115" r="4"/>
    </g>
    
    <!-- Nexus -->
    <circle cx="0" cy="0" r="8" fill="url(#hw-og-chroma)" filter="url(#hw-og-glow)">
      <animate attributeName="r" values="8;12;8" dur="2.618s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Orbiting particles -->
    <circle r="5" fill="url(#hw-og-particle)" filter="url(#hw-og-soft)">
      <animateMotion path="M0,-140 L140,0 L0,140 L-140,0 Z" dur="8.472s" repeatCount="indefinite"/>
      <animate attributeName="r" values="5;3;6;4;5" dur="8.472s" repeatCount="indefinite"/>
    </circle>
    <circle r="4" fill="url(#hw-og-particle)" filter="url(#hw-og-soft)">
      <animateMotion path="M0,-140 L0,0 L140,0 L0,140 L0,0 L-140,0 Z" dur="13.708s" repeatCount="indefinite"/>
    </circle>
    <circle r="3.5" fill="url(#hw-og-particle)" filter="url(#hw-og-soft)">
      <animateMotion path="M80,-80 L80,80 L-80,80 L-80,-80 Z" dur="5.127s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- TYPOGRAPHY - Right side -->
  <g transform="translate(620, 260)">
    <!-- Brand -->
    <text font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" 
          font-size="72" font-weight="700">
      <tspan fill="#F8FAFC">Hyper</tspan><tspan fill="url(#hw-og-text-chroma)">Weave</tspan>
    </text>
    
    <!-- Tagline primary -->
    <text y="55" 
          font-family="'Inter', -apple-system, sans-serif" 
          font-size="24" font-weight="400" 
          letter-spacing="3px" fill="#A1A1AA">
      WHERE VECTORS MEET VISION
    </text>
    
    <!-- Tagline secondary -->
    <text y="100" 
          font-family="'Inter', -apple-system, sans-serif" 
          font-size="18" font-weight="400" 
          fill="#71717A">
      Visual infrastructure for the agentic web
    </text>
    
    <!-- Value prop -->
    <text y="145" 
          font-family="'SF Mono', 'JetBrains Mono', monospace" 
          font-size="14" font-weight="500" 
          fill="url(#hw-og-chroma)" opacity="0.8">
      Living SVG Artifacts • Zero JavaScript • Infinite Compositions
    </text>
  </g>
  
  <!-- URL footer -->
  <text x="600" y="590" 
        text-anchor="middle"
        font-family="'SF Mono', monospace" 
        font-size="16" font-weight="500" 
        fill="#52525B">
    hyperweave.dev
  </text>
</svg>
