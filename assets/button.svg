<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 70" width="200" height="70">
  <defs>
    <!-- Complex outer shadow - matches the stacked box-shadow from the original -->
    <filter id="complexOuterShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.5" result="blur1"/>
      <feOffset dx="0" dy="1.7" result="offsetblur1"/>
      <feComponentTransfer result="shadow1">
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2" result="blur2"/>
      <feOffset dx="0" dy="4" result="offsetblur2"/>
      <feComponentTransfer result="shadow2">
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.2" result="blur3"/>
      <feOffset dx="0" dy="7.3" result="offsetblur3"/>
      <feComponentTransfer result="shadow3">
        <feFuncA type="linear" slope="0.24"/>
      </feComponentTransfer>
      
      <feGaussianBlur in="SourceAlpha" stdDeviation="3.6" result="blur4"/>
      <feOffset dx="0" dy="12" result="offsetblur4"/>
      <feComponentTransfer result="shadow4">
        <feFuncA type="linear" slope="0.23"/>
      </feComponentTransfer>
      
      <feGaussianBlur in="SourceAlpha" stdDeviation="5.8" result="blur5"/>
      <feOffset dx="0" dy="19.5" result="offsetblur5"/>
      <feComponentTransfer result="shadow5">
        <feFuncA type="linear" slope="0.21"/>
      </feComponentTransfer>
      
      <feGaussianBlur in="SourceAlpha" stdDeviation="9.5" result="blur6"/>
      <feOffset dx="0" dy="32" result="offsetblur6"/>
      <feComponentTransfer result="shadow6">
        <feFuncA type="linear" slope="0.19"/>
      </feComponentTransfer>
      
      <feGaussianBlur in="SourceAlpha" stdDeviation="16.5" result="blur7"/>
      <feOffset dx="0" dy="55" result="offsetblur7"/>
      <feComponentTransfer result="shadow7">
        <feFuncA type="linear" slope="0.14"/>
      </feComponentTransfer>
      
      <feGaussianBlur in="SourceAlpha" stdDeviation="30" result="blur8"/>
      <feOffset dx="0" dy="100" result="offsetblur8"/>
      <feComponentTransfer result="shadow8">
        <feFuncA type="linear" slope="0.045"/>
      </feComponentTransfer>
      
      <feMerge>
        <feMergeNode in="shadow1"/>
        <feMergeNode in="shadow2"/>
        <feMergeNode in="shadow3"/>
        <feMergeNode in="shadow4"/>
        <feMergeNode in="shadow5"/>
        <feMergeNode in="shadow6"/>
        <feMergeNode in="shadow7"/>
        <feMergeNode in="shadow8"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Inner shadow/glow -->
    <filter id="innerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="0" result="blur"/>
      <feFlood flood-color="white" flood-opacity="0.25"/>
      <feComposite in2="blur" operator="in" result="glow"/>
      <feComposite in="SourceGraphic" in2="glow" operator="over"/>
    </filter>
    
    <!-- Text gradient -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgb(201, 200, 199)"/>
      <stop offset="100%" stop-color="rgb(161, 161, 161)"/>
    </linearGradient>
    
    <!-- Top light gradient -->
    <linearGradient id="topLightGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.67)"/>
      <stop offset="16.6%" stop-color="rgba(225, 230, 235, 0.44)"/>
      <stop offset="60%" stop-color="rgba(225, 230, 235, 0)"/>
    </linearGradient>
    
    <!-- Background gradient -->
    <radialGradient id="bgGradient" cx="51.9%" cy="68.2%" r="67%" fx="51.9%" fy="68.2%">
      <stop offset="0%" stop-color="rgb(26, 24, 23)"/>
      <stop offset="100%" stop-color="rgb(38, 37, 35)"/>
    </radialGradient>
    
    <!-- Mask gradient -->
    <linearGradient id="maskGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(33, 32, 30, 0.15)"/>
      <stop offset="100%" stop-color="rgb(28, 26, 25)"/>
    </linearGradient>
    
    <!-- Inset shadow for inner border -->
    <filter id="innerShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feOffset dx="0" dy="-2"/>
      <feGaussianBlur stdDeviation="2"/>
      <feComposite operator="out" in="SourceGraphic"/>
      <feComposite operator="in" in2="SourceGraphic"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.65"/>
      </feComponentTransfer>
      <feFlood flood-color="white" flood-opacity="0.25" result="white-glow"/>
      <feComposite in="white-glow" in2="SourceGraphic" operator="in"/>
      <feComposite in="SourceGraphic" operator="over"/>
    </filter>
  </defs>
  
  <!-- Button group with hover effect -->
  <g>
    <!-- Main button with complex shadow -->
    <g filter="url(#complexOuterShadow)" class="button-container">
      <!-- Main button shape -->
      <rect x="10" y="10" width="180" height="50" rx="25" fill="rgb(12, 12, 10)" class="button-bg"/>
      
      <!-- Background overlay -->
      <ellipse cx="100" cy="35" rx="90" ry="25" fill="url(#bgGradient)" class="button-overlay"/>
      
      <!-- Inner shadow and border -->
      <rect x="10" y="10" width="180" height="50" rx="25" fill="none" 
            stroke="rgb(84, 82, 82)" stroke-width="1" class="button-border"
            filter="url(#innerShadow)"/>
      
      <!-- Top light highlight -->
      <g opacity="0.6" class="light-highlight">
        <ellipse cx="100" cy="22" rx="75" ry="15" fill="url(#topLightGradient)" filter="url(#innerGlow)"/>
        
        <!-- Mask over bottom of highlight -->
        <ellipse cx="100" cy="33" rx="75" ry="12" fill="url(#maskGradient)"/>
      </g>
      
      <!-- Button text -->
      <text x="100" y="38" font-family="'Inter', sans-serif" font-size="20" font-weight="600" 
            text-anchor="middle" fill="url(#textGradient)" class="button-text"
            style="letter-spacing: -0.01em;">
        Pearl button
      </text>
    </g>
  </g>
  
  <!-- Add hover effects with CSS -->
  <style>
    .button-container {
      cursor: pointer;
      transition: transform 0.2s ease-out;
    }
    .button-container:hover {
      transform: translateY(-2px);
    }
    .button-container:active {
      transform: translateY(1px);
    }
    .button-text {
      pointer-events: none;
    }
    .light-highlight {
      transition: opacity 0.2s ease-out;
    }
    .button-container:hover .light-highlight {
      opacity: 0.8;
    }
    .button-container:active .light-highlight {
      opacity: 0.4;
    }
  </style>
</svg>