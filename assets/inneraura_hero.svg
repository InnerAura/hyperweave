<svg 
  xmlns="http://www.w3.org/2000/svg" 
  xmlns:hw="https://hyperweave.dev/hw/v1.0" 
  viewBox="0 0 1400 400"
  role="img" 
  aria-labelledby="ia-title ia-desc"
>
  <title id="ia-title">InnerAura Labs</title>
  <desc id="ia-desc">Monumental typographic footer - INNERAURA solid, LABS with vertical gradient dissolution to transparency</desc>
  
  <metadata>
    <hw:artifact type="footer-monument" series="brand-typography" version="2.1">
      <hw:provenance>
        <hw:generator>Claude Opus 4.5 (Anthropic) [claude-opus-4-5-20251101]</hw:generator>
        <hw:created>2025-12-19</hw:created>
        <hw:human-directed>true</hw:human-directed>
      </hw:provenance>
      <hw:reasoning>
        <hw:intent>Hero-scale typography matching reference - INNERAURA and LABS at equivalent visual weight, dissolution gradient on LABS suggesting emergence from void</hw:intent>
        <hw:approach>160px font size for maximum impact, tight negative letter-spacing for monolithic presence, gradient calculated for optimal dissolution curve</hw:approach>
        <hw:tradeoffs>No background enables flexible embedding but requires gradient to work across contexts; dissolution stops tuned for both light and dark mode viewing</hw:tradeoffs>
      </hw:reasoning>
      <hw:spec size="1400x400" performance="static" theme="adaptive" a11y="WCAG-AA"/>
    </hw:artifact>
  </metadata>

  <defs>
    <!-- Dissolution gradient - matches reference: solid at top, fading through gray to near-transparent -->
    <linearGradient id="dissolution" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f1f1f"/>
      <stop offset="25%" stop-color="#3d3d3d"/>
      <stop offset="50%" stop-color="#6b6b6b"/>
      <stop offset="75%" stop-color="#9a9a9a"/>
      <stop offset="100%" stop-color="#c4c4c4"/>
    </linearGradient>
  </defs>

  <style>
    .type-solid {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Arial Black', 'Hiragino Kaku Gothic Pro', sans-serif;
      font-weight: 700;
      font-size: 160px;
      letter-spacing: -0.04em;
      fill: #0a0a0a;
    }
    
    .type-dissolve {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Arial Black', 'Hiragino Kaku Gothic Pro', sans-serif;
      font-weight: 700;
      font-size: 160px;
      letter-spacing: -0.04em;
      fill: url(#dissolution);
    }

    @media (prefers-color-scheme: dark) {
      .type-solid { fill: #fafafa; }
    }
  </style>

  <text class="type-solid" x="700" y="160" text-anchor="middle" dominant-baseline="middle">INNERAURA</text>
  <text class="type-dissolve" x="700" y="320" text-anchor="middle" dominant-baseline="middle">LABS</text>
</svg>