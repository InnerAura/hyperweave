<svg xmlns="http://www.w3.org/2000/svg" xmlns:hw="https://hyperweave.dev/hw/v1.0" viewBox="0 0 1400 400" role="img" aria-labelledby="ia-title ia-desc" data-hw-theme="geometric-communion">
  <title id="ia-title">InnerAura Labs</title>
  <desc id="ia-desc">Monumental typographic footer with sapphire refraction dissolution gradient</desc>

  <defs>
    <!-- LABS — cobalt-sapphire refraction dissolution (replaces mystic-dissolution) -->
    <linearGradient id="mystic-dissolution" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8f0ff">
        <animate attributeName="stop-color"
                 values="#e8f0ff;#d0e4ff;#e8f0ff"
                 dur="8.472s" repeatCount="indefinite"
                 calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
      </stop>
      <stop offset="15%" stop-color="#4080ff">
        <animate attributeName="stop-color"
                 values="#4080ff;#60a0ff;#3070f0;#5090ff;#4080ff"
                 dur="5.236s" repeatCount="indefinite"
                 calcMode="spline"
                 keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94"/>
      </stop>
      <stop offset="35%" stop-color="#5848d8">
        <animate attributeName="stop-color"
                 values="#5848d8;#7060f0;#4838c0;#6858e8;#5848d8"
                 dur="3.236s" repeatCount="indefinite"
                 calcMode="spline"
                 keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94"/>
      </stop>
      <stop offset="55%" stop-color="#1838b0">
        <animate attributeName="stop-color"
                 values="#1838b0;#2850d8;#1030a0;#1838b0"
                 dur="8.472s" repeatCount="indefinite"
                 calcMode="spline"
                 keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"/>
      </stop>
      <stop offset="78%" stop-color="#0a0838" stop-opacity=".7">
        <animate attributeName="stop-opacity"
                 values=".7;.5;.8;.6;.7"
                 dur="13.708s" repeatCount="indefinite"
                 calcMode="spline"
                 keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94"/>
      </stop>
      <stop offset="100%" stop-color="#0a0838" stop-opacity="0"/>
    </linearGradient>
    
    <radialGradient id="sigil-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="50%" stop-color="#4080ff" stop-opacity="0.6">
        <animate attributeName="stop-opacity" values="0.4;0.8;0.4" dur="4.236s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#0a0838" stop-opacity="1"/>
    </radialGradient>
    
    <!-- Text glow — sapphire instead of purple -->
    <filter id="text-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feFlood flood-color="#3060e0" flood-opacity="0.4"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .type-solid {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Arial Black', sans-serif;
      font-weight: 700;
      font-size: 160px;
      letter-spacing: -0.04em;
      fill: #0a0a0a;
    }
    
    .type-dissolve {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Arial Black', sans-serif;
      font-weight: 700;
      font-size: 160px;
      letter-spacing: -0.04em;
      fill: url(#mystic-dissolution);
    }
    
    .sigil-breath {
      animation: breathe 4.236s ease-in-out infinite;
    }
    
    @keyframes breathe {
      0%, 100% { transform: scale(1); opacity: 0.85; }
      50% { transform: scale(1.12); opacity: 1; }
    }
    
    @media (prefers-color-scheme: dark) {
      .type-solid { fill: #fafafa; filter: url(#text-glow); }
    }
    
    @media (prefers-reduced-motion: reduce) {
      .sigil-breath { animation: none; opacity: 0.85; }
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>

  <!-- INNERAURA -->
  <text class="type-solid" x="700" y="160" text-anchor="middle" dominant-baseline="middle">INNERAURA</text>  
  <!-- LABS -->
  <text class="type-dissolve" x="700" y="320" text-anchor="middle" dominant-baseline="middle">LABS</text>
</svg>