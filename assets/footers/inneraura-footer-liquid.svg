<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1400 400" role="img" aria-labelledby="ia-title ia-desc">
  <title id="ia-title">InnerAura Labs</title>
  <desc id="ia-desc">INNERAURA solid adaptive. LABS via clipPath with oversized rotating
    gradient rect (1400x1400) — never clips at any rotation angle.</desc>

  <defs>
    <!-- LABS sapphire spectrum — dark -->
    <linearGradient id="lg-dk" x1="0%" y1="0%" x2="100%" y2="20%">
      <stop offset="0%" stop-color="#1838b0"/>
      <stop offset="12%" stop-color="#4080ff"/>
      <stop offset="25%" stop-color="#80c0ff"/>
      <stop offset="37%" stop-color="#d0e8ff"/>
      <stop offset="50%" stop-color="#5848d8"/>
      <stop offset="63%" stop-color="#d0e8ff"/>
      <stop offset="75%" stop-color="#80c0ff"/>
      <stop offset="88%" stop-color="#4080ff"/>
      <stop offset="100%" stop-color="#1838b0"/>
    </linearGradient>
    <!-- LABS sapphire spectrum — light (deeper) -->
    <linearGradient id="lg-lt" x1="0%" y1="0%" x2="100%" y2="20%">
      <stop offset="0%" stop-color="#0c1848"/>
      <stop offset="12%" stop-color="#1838b0"/>
      <stop offset="25%" stop-color="#3060d0"/>
      <stop offset="37%" stop-color="#4080ff"/>
      <stop offset="50%" stop-color="#3040a8"/>
      <stop offset="63%" stop-color="#4080ff"/>
      <stop offset="75%" stop-color="#3060d0"/>
      <stop offset="88%" stop-color="#1838b0"/>
      <stop offset="100%" stop-color="#0c1848"/>
    </linearGradient>

    <!-- LABS text as clip shape -->
    <clipPath id="lc">
      <text x="700" y="320" text-anchor="middle" dominant-baseline="middle"
            font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue','Arial Black',sans-serif"
            font-weight="700" font-size="160" letter-spacing="-0.04em">LABS</text>
    </clipPath>

    <!-- Subtle glow for INNERAURA dark mode — on a RECT behind text, not on text itself -->
    <filter id="ia-bg-glow" x="-5%" y="-20%" width="110%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
      <feColorMatrix type="matrix"
        values="0 0 0.2 0 0.02
                0 0 0.15 0 0.01
                0 0 0.5 0 0.04
                0 0 0 0.12 0"/>
    </filter>
  </defs>

  <style>
    .lt { display: none; }
    .dk { display: inline; }

    @media (prefers-color-scheme: light) {
      .lt { display: inline; }
      .dk { display: none; }
    }

    /* Gradient rect rotation — oversized rect means no clipping at any angle */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .labs-spin {
      transform-origin: 700px 320px;
      animation: spin 25s linear infinite;
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
    }
  </style>

  <!-- INNERAURA glow — applied to a rect BEHIND the text, not on text element -->
  <rect class="dk" x="200" y="100" width="1000" height="100" fill="#3060e0" opacity=".04"
        filter="url(#ia-bg-glow)" rx="50"/>

  <!-- INNERAURA — dark: inline fill, no filter on text -->
  <text class="dk" fill="#fafafa" x="700" y="160" text-anchor="middle" dominant-baseline="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue','Arial Black',sans-serif"
        font-weight="700" font-size="160" letter-spacing="-0.04em">INNERAURA</text>

  <!-- INNERAURA — light: inline fill -->
  <text class="lt" fill="#0a0a0a" x="700" y="160" text-anchor="middle" dominant-baseline="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue','Arial Black',sans-serif"
        font-weight="700" font-size="160" letter-spacing="-0.04em">INNERAURA</text>

  <!-- LABS — dark: gradient on MASSIVE rect (1400x1400), clipped to text shape -->
  <g class="dk" clip-path="url(#lc)">
    <g class="labs-spin">
      <rect x="0" y="-380" width="1400" height="1400" fill="url(#lg-dk)"/>
    </g>
  </g>

  <!-- LABS — light: same technique, deeper spectrum -->
  <g class="lt" clip-path="url(#lc)">
    <g class="labs-spin">
      <rect x="0" y="-380" width="1400" height="1400" fill="url(#lg-lt)"/>
    </g>
  </g>
</svg>