<svg xmlns="http://www.w3.org/2000/svg" xmlns:hw="https://hyperweave.dev/hw/v1.0"
     viewBox="0 0 1400 400" role="img" aria-labelledby="ia-title ia-desc"
     data-hw-theme="liquid-surface">
  <title id="ia-title">InnerAura Labs</title>
  <desc id="ia-desc">INNERAURA in adaptive solid type. LABS filled with rotating
    liquid-surface sapphire spectrum — same 8-stop gradient, same 3s rotation,
    same phi-timed stop-color cycling as the button border. Text IS the material.</desc>

  <defs>
    <!-- ════════════════════════════════════════════════════════ -->
    <!-- LABS FILL — LIQUID SURFACE MATERIAL                     -->
    <!-- Same gradient as the button border. Horizontal.         -->
    <!-- Rotating. The text IS made of this stuff.               -->
    <!-- ════════════════════════════════════════════════════════ -->

    <!-- DARK MODE — bright sapphire spectrum -->
    <linearGradient id="labs-dk" x1="0%" y1="0%" x2="100%" y2="20%">
      <stop offset="0%" stop-color="#1838b0">
        <animate attributeName="stop-color"
                 values="#1838b0;#2850d8;#1030a0;#2048c8;#1838b0"
                 dur="5.236s" repeatCount="indefinite"
                 calcMode="spline"
                 keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94"/>
      </stop>
      <stop offset="15%" stop-color="#4080ff">
        <animate attributeName="stop-color"
                 values="#4080ff;#60a0ff;#3070f0;#5090ff;#4080ff"
                 dur="3.236s" repeatCount="indefinite"
                 calcMode="spline"
                 keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94"/>
      </stop>
      <stop offset="30%" stop-color="#80c0ff">
        <animate attributeName="stop-color"
                 values="#80c0ff;#a0d4ff;#60a0ff;#90c8ff;#80c0ff"
                 dur="5.236s" repeatCount="indefinite"
                 calcMode="spline"
                 keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94"/>
      </stop>
      <stop offset="45%" stop-color="#d0e8ff">
        <animate attributeName="stop-color"
                 values="#d0e8ff;#e8f0ff;#b8d4ff;#dce8ff;#d0e8ff"
                 dur="8.472s" repeatCount="indefinite"
                 calcMode="spline"
                 keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94"/>
      </stop>
      <stop offset="60%" stop-color="#5848d8">
        <animate attributeName="stop-color"
                 values="#5848d8;#7060f0;#4838c0;#6858e8;#5848d8"
                 dur="3.236s" repeatCount="indefinite"
                 calcMode="spline"
                 keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94"/>
      </stop>
      <stop offset="75%" stop-color="#4080ff">
        <animate attributeName="stop-color"
                 values="#4080ff;#5898ff;#3068e8;#4888ff;#4080ff"
                 dur="8.472s" repeatCount="indefinite"
                 calcMode="spline"
                 keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94"/>
      </stop>
      <stop offset="90%" stop-color="#2050e0">
        <animate attributeName="stop-color"
                 values="#2050e0;#3068f0;#1840c8;#2858e8;#2050e0"
                 dur="5.236s" repeatCount="indefinite"
                 calcMode="spline"
                 keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94"/>
      </stop>
      <stop offset="100%" stop-color="#1838b0"/>
      <animateTransform attributeName="gradientTransform" type="rotate"
                        from="0 .5 .5" to="360 .5 .5" dur="3s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- LIGHT MODE — deeper cobalt spectrum, still rotating -->
    <linearGradient id="labs-lt" x1="0%" y1="0%" x2="100%" y2="20%">
      <stop offset="0%" stop-color="#0c1848">
        <animate attributeName="stop-color"
                 values="#0c1848;#142060;#081440;#101c58;#0c1848"
                 dur="5.236s" repeatCount="indefinite"
                 calcMode="spline"
                 keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94"/>
      </stop>
      <stop offset="15%" stop-color="#1838b0">
        <animate attributeName="stop-color"
                 values="#1838b0;#2848c8;#1030a0;#2040b8;#1838b0"
                 dur="3.236s" repeatCount="indefinite"
                 calcMode="spline"
                 keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94"/>
      </stop>
      <stop offset="30%" stop-color="#3060d0">
        <animate attributeName="stop-color"
                 values="#3060d0;#4078e0;#2850c0;#3868d8;#3060d0"
                 dur="5.236s" repeatCount="indefinite"
                 calcMode="spline"
                 keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94"/>
      </stop>
      <stop offset="45%" stop-color="#4080ff">
        <animate attributeName="stop-color"
                 values="#4080ff;#5898ff;#3070f0;#4888ff;#4080ff"
                 dur="8.472s" repeatCount="indefinite"
                 calcMode="spline"
                 keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94"/>
      </stop>
      <stop offset="60%" stop-color="#3040a8">
        <animate attributeName="stop-color"
                 values="#3040a8;#4050c0;#2838a0;#3848b8;#3040a8"
                 dur="3.236s" repeatCount="indefinite"
                 calcMode="spline"
                 keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94"/>
      </stop>
      <stop offset="75%" stop-color="#2040b0">
        <animate attributeName="stop-color"
                 values="#2040b0;#3058c8;#1838a0;#2848b8;#2040b0"
                 dur="8.472s" repeatCount="indefinite"
                 calcMode="spline"
                 keySplines="0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94;0.25 0.46 0.45 0.94"/>
      </stop>
      <stop offset="90%" stop-color="#1030a0"/>
      <stop offset="100%" stop-color="#0c1848"/>
      <animateTransform attributeName="gradientTransform" type="rotate"
                        from="0 .5 .5" to="360 .5 .5" dur="3s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- INNERAURA text glow — dark only, subtle sapphire luminance -->
    <filter id="ft-glow" x="-5%" y="-12%" width="110%" height="124%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#3060e0" flood-opacity="0.2"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    .lt { display: none; }
    .dk { display: inline; }

    @media (prefers-color-scheme: light) {
      .lt { display: inline; }
      .dk { display: none; }
    }

    .ia-type {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Arial Black', sans-serif;
      font-weight: 700;
      font-size: 160px;
      letter-spacing: -0.04em;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
      animate, animateTransform { display: none !important; }
    }
  </style>

  <!-- INNERAURA — dark: white + subtle glow -->
  <text class="ia-type dk" x="700" y="160" text-anchor="middle" dominant-baseline="middle"
        fill="#fafafa" filter="url(#ft-glow)">INNERAURA</text>

  <!-- INNERAURA — light: black, clean -->
  <text class="ia-type lt" x="700" y="160" text-anchor="middle" dominant-baseline="middle"
        fill="#0a0a0a">INNERAURA</text>

  <!-- LABS — dark: liquid surface sapphire material -->
  <text class="ia-type dk" x="700" y="320" text-anchor="middle" dominant-baseline="middle"
        fill="url(#labs-dk)">LABS</text>

  <!-- LABS — light: deeper cobalt spectrum, still rotating -->
  <text class="ia-type lt" x="700" y="320" text-anchor="middle" dominant-baseline="middle"
        fill="url(#labs-lt)">LABS</text>
</svg>