<svg xmlns="http://www.w3.org/2000/svg" xmlns:hw="https://hyperweave.app/hw/v1.0"
     viewBox="0 0 1400 400" width="100%" height="100%"
     role="img" aria-labelledby="ia-title ia-desc"
     data-hw-theme="liquid-surface">
  <title id="ia-title">InnerAura Labs</title>
  <desc id="ia-desc">INNERAURA in adaptive solid type. LABS filled with rotating liquid-surface sapphire spectrum. CIM Doctrine applied: no color interpolation, strictly transform animations for performance.</desc>

  <metadata>
    <hw:artifact id="hw-inneraura-labs-mobile" type="banner" series="hyperweave-brand" version="1.0.0">
      <hw:provenance>
        <hw:generator>Gemini 3.1 Pro</hw:generator>
        <hw:created>2026-03-28</hw:created>
        <hw:human-directed>true</hw:human-directed>
      </hw:provenance>
      <hw:reasoning>
        <hw:intent>Optimize for mobile rendering, ensure crisp typography, enforce pure white contrast in dark mode, and strictly adhere to CIM doctrine.</hw:intent>
        <hw:approach>Implemented 'color-scheme: light dark' and 'display: unset' for Safari WebKit. Consolidated 'INNERAURA' to a single text node using CSS class overriding for pure #ffffff. Stripped all 'stop-color' animations to strictly comply with CIM doctrine (animate transform/opacity only), relying entirely on gradient rotation for the liquid effect.</hw:approach>
        <hw:tradeoffs>Removing 'stop-color' animations sacrifices the phi-timed color cycling, but massively improves mobile CPU/GPU performance and strictly adheres to the established architectural doctrine.</hw:tradeoffs>
      </hw:reasoning>
    </hw:artifact>
  </metadata>

  <defs>
    <linearGradient id="labs-dk" x1="0%" y1="0%" x2="100%" y2="20%">
      <stop offset="0%" stop-color="#1838b0"/>
      <stop offset="15%" stop-color="#4080ff"/>
      <stop offset="30%" stop-color="#80c0ff"/>
      <stop offset="45%" stop-color="#d0e8ff"/>
      <stop offset="60%" stop-color="#5848d8"/>
      <stop offset="75%" stop-color="#4080ff"/>
      <stop offset="90%" stop-color="#2050e0"/>
      <stop offset="100%" stop-color="#1838b0"/>
      <animateTransform attributeName="gradientTransform" type="rotate"
                        from="0 .5 .5" to="360 .5 .5" dur="3s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="labs-lt" x1="0%" y1="0%" x2="100%" y2="20%">
      <stop offset="0%" stop-color="#0c1848"/>
      <stop offset="15%" stop-color="#1838b0"/>
      <stop offset="30%" stop-color="#3060d0"/>
      <stop offset="45%" stop-color="#4080ff"/>
      <stop offset="60%" stop-color="#3040a8"/>
      <stop offset="75%" stop-color="#2040b0"/>
      <stop offset="90%" stop-color="#1030a0"/>
      <stop offset="100%" stop-color="#0c1848"/>
      <animateTransform attributeName="gradientTransform" type="rotate"
                        from="0 .5 .5" to="360 .5 .5" dur="3s" repeatCount="indefinite"/>
    </linearGradient>

    <filter id="ft-glow" x="-5%" y="-12%" width="110%" height="124%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#3060e0" flood-opacity="0.2"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    /* MOBILE-SAFE FIXES */
    svg { color-scheme: light dark; }

    .lt { display: none; }
    .dk { display: unset; }

    /* Single node class for INNERAURA to guarantee override */
    .ia-core-text { fill: #ffffff !important; filter: url(#ft-glow); }

    @media (prefers-color-scheme: light) {
      .lt { display: unset; }
      .dk { display: none; }
      /* Force dark text, remove glow in light mode */
      .ia-core-text { fill: #0a0a0a !important; filter: none !important; }
    }

    .ia-type {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Arial Black', sans-serif;
      font-weight: 700;
      font-size: 160px;
      letter-spacing: -0.04em;
      /* Anti-aliasing for cleaner rendering */
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
      animate, animateTransform { display: none !important; }
    }
  </style>

  <text class="ia-type ia-core-text" x="700" y="160" text-anchor="middle" dominant-baseline="middle">INNERAURA</text>

  <text class="ia-type dk" x="700" y="320" text-anchor="middle" dominant-baseline="middle"
        fill="url(#labs-dk)">LABS</text>
  <text class="ia-type lt" x="700" y="320" text-anchor="middle" dominant-baseline="middle"
        fill="url(#labs-lt)">LABS</text>
</svg>
