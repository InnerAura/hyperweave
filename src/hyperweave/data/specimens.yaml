# Editorial specimen registry
# Maps slug -> file path (relative to specs/ directory).
# hw-compliant/ versions are preferred when available.
#
# v0.2.14: banner-holofoil-v1 and the 10 kinetic typography motion entries
# (bars / broadcast / cascade / converge / drop / rubricate / impact / breach /
# intake / collapse) were removed alongside the banner frame deletion. Surviving
# 16 entries remain registered. The /a/inneraura/{slug} route currently 404s
# on every slug because the specs/ directory it resolves against was relocated;
# the route is preserved as scaffolding for the upcoming golden-200 dataset.

