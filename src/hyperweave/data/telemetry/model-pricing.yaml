# Model pricing per million tokens (USD).
# Source: https://platform.claude.com/docs/en/about-claude/pricing
# Last verified: 2026-04-11
#
# Cache multipliers assume 5-minute TTL (Claude Code default).
# 1-hour TTL uses 2x write instead of 1.25x — not currently supported.
cache_write_multiplier: 1.25
cache_read_multiplier: 0.1

models:
  # Current models (Opus 4.5/4.6 = $5/$25, down from $15/$75 in 4.0/4.1)
  claude-opus-4-6:
    input: 5.0
    output: 25.0
  claude-opus-4-5:
    input: 5.0
    output: 25.0
  claude-sonnet-4-6:
    input: 3.0
    output: 15.0
  claude-sonnet-4-5:
    input: 3.0
    output: 15.0
  claude-sonnet-4-20250514:
    input: 3.0
    output: 15.0
  claude-haiku-4-5:
    input: 1.0
    output: 5.0
  # Legacy models
  claude-opus-4-20250918:
    input: 15.0
    output: 75.0
  claude-3-5-sonnet-20241022:
    input: 3.0
    output: 15.0
  claude-3-5-haiku-20241022:
    input: 0.80
    output: 4.0

default:
  input: 5.0
  output: 25.0
