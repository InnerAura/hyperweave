# Model pricing per million tokens (USD).
# Source: https://platform.claude.com/docs/en/about-claude/models/overview
#         https://learn.chatgpt.com/docs/pricing  (Codex rate card; the old
#         developers.openai.com/codex/pricing URL now 308-redirects here)
# Last verified: 2026-07-15 (Anthropic: Fable 5 $10/$50, Opus 4.x $5/$25,
# Sonnet 5/4.x $3/$15, Haiku 4.5 $1/$5; Codex card at $0.04/credit)
#
# Cache-write multipliers are TTL-specific: 1.25x for 5-minute entries, 2x for
# 1-hour entries. Claude Code emits the split in usage.cache_creation
# ({ephemeral_5m_input_tokens, ephemeral_1h_input_tokens}) and currently writes
# 1h-TTL exclusively; cost.py prices each bucket at its own multiplier and
# falls back to the flat cache_creation_input_tokens field (at the 5m rate)
# for transcripts that predate the split.
# Codex uses cache_read_multiplier (0.1×) too: cached_input is 12.5/125 of
# base = 0.1× match. Codex has no cache_create concept; codex_parser.py forces
# cache_create_tokens=0 so the write multipliers never fire for Codex.
cache_write_multiplier: 1.25
cache_write_multiplier_1h: 2.0
cache_read_multiplier: 0.1

models:
  # Current Claude models. Fable 5 / Mythos 5 carry a distinct published rate
  # ($10/$50); Opus 4.5-4.8 are $5/$25 (down from $15/$75 in 4.0/4.1).
  claude-fable-5:
    input: 10.0
    output: 50.0
  claude-mythos-5:
    input: 10.0
    output: 50.0
  claude-opus-4-8-1m:
    input: 5.0
    output: 25.0
  claude-opus-4-8:
    input: 5.0
    output: 25.0
  claude-opus-4-7-1m:
    input: 5.0
    output: 25.0
  claude-opus-4-7:
    input: 5.0
    output: 25.0
  claude-opus-4-6:
    input: 5.0
    output: 25.0
  claude-opus-4-5:
    input: 5.0
    output: 25.0
  # Sticker rate. Introductory pricing of $2/$10 applies through 2026-08-31;
  # the schema has no dated-rate support, so the stable sticker is encoded.
  claude-sonnet-5:
    input: 3.0
    output: 15.0
  claude-sonnet-4-6:
    input: 3.0
    output: 15.0
  claude-sonnet-4-5:
    input: 3.0
    output: 15.0
  claude-sonnet-4-20250514:
    input: 3.0
    output: 15.0
  claude-haiku-4-5:
    input: 1.0
    output: 5.0
  # Legacy models
  claude-opus-4-1:
    input: 15.0
    output: 75.0
  claude-opus-4-20250514:
    input: 15.0
    output: 75.0
  claude-3-5-sonnet-20241022:
    input: 3.0
    output: 15.0
  claude-3-5-haiku-20241022:
    input: 0.80
    output: 4.0
  # OpenAI models — dollar-equivalent rates per the Codex rate card at
  # $0.04/credit (gpt-5.5: 125 cr/MTok input = $5, 750 cr output = $30).
  # The shared cache_read_multiplier applies cleanly; see header note for
  # cache_write rationale.
  # IMPORTANT key format: Codex JSONL stores the model identifier with DOTS
  # ("gpt-5.5"), unlike Claude's all-hyphen convention ("claude-opus-4-8"). Keys
  # must match the parser-emitted string verbatim for the prefix-match lookup
  # at cost.py:34-36 to fire. Confirmed via grep against ~/.codex/sessions/*.jsonl.
  # Longest key first within a family — the prefix loop takes the first hit.
  #
  # GPT-5.6 tiers (Sol/Terra/Luna) are on the rate card but no local session
  # has emitted one yet — the exact JSONL identifier is UNVERIFIED. Re-check
  # these keys against the parser-emitted string on first real 5.6 session.
  gpt-5.6-sol:
    input: 5.0
    output: 30.0
  gpt-5.6-terra:
    input: 2.50
    output: 15.0
  gpt-5.6-luna:
    input: 1.0
    output: 6.0
  gpt-5.5:
    input: 5.0
    output: 30.0
  gpt-5.4-mini:
    input: 0.75
    output: 4.50
  gpt-5.4:
    input: 2.50
    output: 15.0
  # Dropped from the current rate card; kept for historical session receipts.
  gpt-5.3-codex:
    input: 1.75
    output: 14.0
  gpt-5.2-codex:
    input: 1.75
    output: 14.0

default:
  input: 5.0
  output: 25.0
