# Model pricing per million tokens (USD).
# Source: https://platform.claude.com/docs/en/about-claude/pricing
#         https://developers.openai.com/codex/pricing
# Last verified: 2026-06-19 (Anthropic docs: Opus 4.x $5/$25, Sonnet 4.x $3/$15, Haiku 4.5 $1/$5)
#
# Cache multipliers assume 5-minute TTL (Claude Code default).
# 1-hour TTL uses 2x write instead of 1.25x — not currently supported.
# Codex uses cache_read_multiplier (0.1×) too: cached_input is 4.375/43.75 of
# base = 0.1× match. Codex has no cache_create concept; codex_parser.py forces
# cache_create_tokens=0 so cache_write_multiplier never fires for Codex.
cache_write_multiplier: 1.25
cache_read_multiplier: 0.1

models:
  # Current Claude models (Opus 4.5/4.6/4.7/4.8 = $5/$25, down from $15/$75 in 4.0/4.1)
  # Fable 5 is the current flagship; priced at the same line as Opus 4.x until
  # a distinct published rate lands — estimate based on public per-token rates.
  claude-fable-5:
    input: 5.0
    output: 25.0
  claude-opus-4-8:
    input: 5.0
    output: 25.0
  claude-opus-4-8-1m:
    input: 5.0
    output: 25.0
  claude-opus-4-7:
    input: 5.0
    output: 25.0
  claude-opus-4-7-1m:
    input: 5.0
    output: 25.0
  claude-opus-4-6:
    input: 5.0
    output: 25.0
  claude-opus-4-5:
    input: 5.0
    output: 25.0
  claude-sonnet-4-6:
    input: 3.0
    output: 15.0
  claude-sonnet-4-5:
    input: 3.0
    output: 15.0
  claude-sonnet-4-20250514:
    input: 3.0
    output: 15.0
  claude-haiku-4-5:
    input: 1.0
    output: 5.0
  # Legacy models
  claude-opus-4-20250918:
    input: 15.0
    output: 75.0
  claude-3-5-sonnet-20241022:
    input: 3.0
    output: 15.0
  claude-3-5-haiku-20241022:
    input: 0.80
    output: 4.0
  # OpenAI models — dollar-equivalent rates per developers.openai.com/codex/pricing.
  # Credits-to-dollars factor derived from rate-card (gpt-5.3-codex: 43.75 cr/MTok
  # input = $1.75/MTok; output 350 cr = $14). The shared cache_read_multiplier
  # applies cleanly; see header note for cache_write rationale.
  # IMPORTANT key format: Codex JSONL stores the model identifier with DOTS
  # ("gpt-5.4"), unlike Claude's all-hyphen convention ("claude-opus-4-7"). Keys
  # must match the parser-emitted string verbatim for the prefix-match lookup
  # at cost.py:34-36 to fire. Confirmed via grep against ~/.codex/sessions/*.jsonl.
  gpt-5.3-codex:
    input: 1.75
    output: 14.0
  gpt-5.2-codex:
    input: 1.75
    output: 14.0
  gpt-5.4:
    input: 2.50
    output: 15.0
  gpt-5.4-mini:
    input: 0.30
    output: 2.40
  gpt-5.5:
    input: 5.0
    output: 30.0

default:
  input: 5.0
  output: 25.0
