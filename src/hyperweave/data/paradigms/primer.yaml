id: primer
name: Primer
description: >
  Minimal editorial substrate. Inter display + JetBrains Mono numerals, thin
  hairline rules, pill/circle status indicators, glassmorphic shallow-depth
  cards with a three-layer drop-shadow. Substrate-aware (dark / light) on the
  flat profile. No material-envelope requirements.
requires_genome_fields: []

badge:
  # Shields-anatomy two-plate badge (v04alpha2 specimen): a tinted label plate
  # (12px brand glyph + mono label) and a clear value plate split by a paired
  # 1px groove + 1px shine seam, inside a 20px rx4 chip with an inner white
  # highlight, a 1px border, and a hair drop-shadow. Width is EXACT from mono
  # advance — rail: 7 | glyph 12 | 6 | label | 7 | seam 2 | 8 | value | 8 —
  # so the canonical PYPI/0.3.14 badge closes at 112.1 x 20. No compact form.
  default_size: default
  frame_height: 20
  frame_height_compact: 20
  badge_corner: 4
  # The rail starts at the badge edge — no accent column.
  accent_w: 0
  # Mono throughout: JBM 600 label (muted ink_secondary voice) + JBM 700 value
  # (neutral ink). No textLength — mono advance is exact, and the camo bound
  # would squeeze real JetBrains Mono (exact-rail paradigms suppress it).
  label_font_family: JetBrains Mono
  value_font_family: JetBrains Mono
  label_font_size: 9.5
  value_font_size: 10.5
  label_font_weight: 600
  value_font_weight: 700
  # 0.5px tracking at 9.5px = 0.052632em; the value runs untracked.
  label_letter_spacing_em: 0.052632
  value_letter_spacing_em: 0.0
  # Specimen baselines: value y=13.4 (= 10 + 10.5*0.324), label y=13.3
  # (= 10 + 9.5*0.347) — each text optically centred in the 20px frame.
  center_text_factor: 0.324
  label_center_text_factor: 0.347
  # 12px brand glyph (20 * 0.6), midline-centred at y=4 — the family-standard
  # badge glyph weight (brutalist / chrome / cellular all run ratio 0.6 capped
  # at 12). The specimen drew 13, but the solid silhouette blooms on the dark
  # substrates (bright-on-dark reads larger); 12 restores the family weight.
  glyph_size_ratio: 0.6
  glyph_size_max: 12
  content_center_geometric: true
  # Explicit rail pads; pad 7 covers the remaining interior rhythm (the
  # leading state-mark gap on stateful badges).
  pad: 7
  rail_start_pad: 7
  glyph_label_gap: 6
  rail_end_pad: 8
  # Paired groove+shine seam rides the etched-seam slot: 2px total, the shine
  # hairline offset 1px from the groove. Asymmetric gaps per the specimen:
  # 7 label-side, 8 value-side.
  seam_render_w: 2.0
  seam_specular_offset: 1.0
  seam_gap_left: 7
  seam_gap_right: 8
  text_anchor: middle
  # Status-glyph state marks (ping / spin / shake / throb) lead the value as a
  # pill [mark] value — the locked v04alpha1 state architecture, re-tuned into
  # the 20px frame. Status light = value cap height (10.5 * 0.75 ≈ 8px).
  indicator_cap_ratio: 0.75
  indicator_shape: status-glyph
  indicator_leads_value: true
  light_indicator_inner_ratio: 0.5

strip:
  # Telemetry rail (v04alpha2 specimen): display-face identity (Inter 800
  # 14.5) | paired groove/shine dividers | mono metric columns (JBM 600 8
  # muted labels over JBM 700 16 neutral-ink values) | green pulse pinned
  # 18px off the right edge — on a full-bleed 46px rx10 card. NO canvas
  # inset: an embedded artifact has no page for a shadow to fade into, so an
  # inset margin renders as a hard-clipped shadow box on the README ground.
  # The card spans the viewBox (alpha.1 posture); the shadow filter clips
  # behind it and the inner highlight + border carry the edge.
  strip_height: 46
  plate_corner: 10
  # Identity: 18px glyph at x=18, 11px gap, Inter 800 14.5 untracked,
  # baseline 28 (card-space).
  strip_glyph_ratio: 0.391
  glyph_inset: 18
  glyph_text_gap: 11
  identity_font_family: Inter
  identity_font_size: 14.5
  identity_font_weight: 800
  identity_letter_spacing_em: 0.0
  identity_baseline_y: 28
  # Metric columns: muted mono labels (1px tracking at 8px = 0.125em) over
  # neutral-ink mono values, middle-anchored, baselines 16.5 / 33 (card-space).
  label_font_family: JetBrains Mono
  label_font_size: 8
  label_font_weight: 600
  label_letter_spacing_em: 0.125
  value_font_family: JetBrains Mono
  value_font_size: 16
  value_font_weight: 700
  value_letter_spacing_em: 0.0
  metric_label_baseline_y: 16.5
  metric_value_baseline_y: 33
  # Paired groove+shine dividers: 24px tall, 10px below the card top —
  # neutral hairlines that invert per substrate, never coloured seams.
  divider_render_mode: paired-rect
  divider_y: 10
  divider_h: 24
  # Status pulse: housing r 5.3 (ping core r 3.4 / ring stroke 1.6), pinned at
  # content_width - 18. The editorial ACTIVE live dot rides every strip.
  status_always: true
  status_right_inset: 18
  status_glyph_r: 5.3
  status_shape_rendering: geometricPrecision
  # Shared zone pipeline (NOT brutalist's owns_strip custom layout). Width is
  # CONTENT-ADAPTIVE via compute_strip_zones; constant inter-cell gutter =
  # cell_pad (explicit gutter separates metrics — adjacent values would
  # otherwise collide, e.g. "12.4k1.2k").
  owns_strip: false
  strip_pad: 16
  cell_pad: 32
  cell_min_width: 12
  strip_min_width: 0
  stretch_cells_to_min_width: false

chart:
  chart_width: 1100
  chart_height: 660
  viewport_x: 100
  viewport_y: 140
  viewport_w: 880
  viewport_h: 340
  # CIM motion (transform/opacity only): the line draws on, the area + markers
  # fade in, the endpoint pings — like the chart specimens. Reduced-motion stills.
  line_animate: true
  # Blue axis details (top Y-tick + current X-tick accent) and vertical gridlines
  # at every X-tick, per the porcelain chart specimen.
  axis_accent: true
  y_tick_target: 4
  label_collision_font_family: JetBrains Mono
  label_collision_font_size: 9
  label_collision_font_weight: 700
  label_collision_letter_spacing_em: 0.06
  axis_y_label_x_offset: -12
  axis_y_label_y_offset: 4
  x_axis_label_y: 500
  milestone_label_y_offset: -18
  identity_font_family: Inter
  identity_font_size: 11
  identity_font_weight: 700
  identity_letter_spacing_em: 0.12

stats:
  card_width: 480
  card_height: 210
  embeds_chart: false
  metric_layout_mode: primer_editorial
  metric_value_font_family: Inter
  metric_value_font_size: 18
  metric_value_font_weight: 700
  metric_value_letter_spacing_em: -0.02
  metric_label_font_family: JetBrains Mono
  # Unified primer label voice (8px / 700 / 0.12em, matching badge/strip/chart).
  metric_label_font_size: 8
  metric_label_font_weight: 700
  metric_label_letter_spacing_em: 0.12
  activity_bar_baseline_y: 180
  activity_bar_max_h: 24
  activity_bar_min_h: 2
  activity_bar_w: 7
  activity_bar_start_x: 22
  activity_bar_stride: 8.4
  activity_bar_opacity_min: 0.34
  activity_bar_opacity_max: 0.77
  activity_bar_opacity_min_light: 0.4
  activity_bar_opacity_max_light: 0.95
  language_segment_opacities_light: [1.0, 0.66, 0.42, 0.26]
  identity_x: 37
  bio_x: 95
  identity_padding: 8
  identity_breathing_margin: 8
  identity_font_family: Inter
  identity_font_size: 11
  identity_font_weight: 700
  identity_letter_spacing_em: 0.12
  identity_text_transform: uppercase

icon:
  supported_shapes: [circle, square]
  default_shape: circle

marquee:
  width: 800
  height: 44
  # Identity cap (glyph + scope + LIVE pulse) leads the left; stacked
  # label-over-value modules (the stat-card cell grammar in motion) with cobalt
  # hairline dividers scroll under the cap seam — not an inline label/value ribbon.
  item_layout: module
  cap_kind: identity
  # Hero (STARS) is the one cobalt value; state values use the deeper CORE stop
  # (forest/sienna/red), readable on the light band.
  hero_color_role: signal
  state_value_stop: core
  # Module column labels resolve to the genome chromatic label value (same as the
  # badge label, stats card label, strip column header) — one label system.
  module_label_color: "var(--dna-label-text)"
  font_size: 12
  font_weight: "700"
  letter_spacing: "-0.02em"
  font_family: "Inter, -apple-system, system-ui, sans-serif"
  label_font_size: 6
  module_value_font_family: "Inter, -apple-system, system-ui, sans-serif"
  module_label_font_family: "var(--dna-font-mono, 'JetBrains Mono', ui-monospace, monospace)"
  module_label_font_size: 6
  module_label_letter_spacing: "0.18em"
  module_text_inset: 16
  module_label_y: 16
  module_value_y: 32
  # Low-opacity cobalt hairline divider (not a hard full-opacity bar).
  module_divider_w: 1
  module_divider_y: 9
  module_divider_h: 26
  module_divider_opacity: 0.12
  module_min_width: 60
  separator_kind: glyph
  separator_glyph: "·"
  separator_size: 7
  separator_color: "var(--dna-signal)"
  # Reserve the 0..100 identity cap; modules clip to the readout window past it.
  clip_inset_left: 108
  clip_inset_right: 16
  clip_inset_top: 0
  clip_inset_bottom: 0
  clip_rx: 0

matrix:
  # Comparison-table chassis (porcelain-final specimens, all 900 wide).
  # Values restate the load-bearing ParadigmMatrixConfig defaults so the
  # chassis numbers live in data/, not only in code; cell-kind geometry and
  # the semantic palette are frame-generic and live in data/matrix.yaml.
  width: 900
  card_radius: 14
  margin_x: 34
  # Rail 20 below the descriptor baseline (g-specimen rhythm: 54/73/93).
  masthead_h: 93
  colheader_h: 33
  row_pitch: 40
  row_pitch_compact: 34
  content_row_base: 46
  # Masthead scan rail: 4 x phi x rhythm-second; transform-only animation.
  scan_duration: "6.472s"
  scan_w: 220
  scan_h: 1.4
  hero_lane_opacity: 0.055
  title_voice: { family: Inter, size: 29, weight: 800, tracking_em: -0.02 }
  desc_voice: { family: JetBrains Mono, size: 10.5, weight: 400 }
  colhead_voice: { family: JetBrains Mono, size: 8.5, weight: 700, tracking_em: 0.12 }
