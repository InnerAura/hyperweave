id: primer
name: Primer
description: >
  Minimal editorial substrate. Inter display + JetBrains Mono numerals, thin
  hairline rules, pill/circle status indicators, glassmorphic shallow-depth
  cards with a three-layer drop-shadow. Substrate-aware (dark / light) on the
  flat profile. No material-envelope requirements.
requires_genome_fields: []

badge:
  # Shields-anatomy two-plate badge (the badge specimen): a tinted label plate
  # (12px brand glyph + mono label) and a clear value plate split by a paired
  # 1px groove + 1px shine seam, inside a 20px rx4 chip with an inner white
  # highlight, a 1px border, and a hair drop-shadow. Width is EXACT from mono
  # advance — rail: 7 | glyph 12 | 6 | label | 7 | seam 2 | 8 | value | 8 —
  # so the canonical PYPI/0.3.14 badge closes at 112.1 x 20. No compact form.
  default_size: default
  frame_height: 20
  frame_height_compact: 20
  badge_corner: 4
  # The rail starts at the badge edge — no accent column.
  accent_w: 0
  # Mono throughout: JBM 600 label (muted ink_secondary voice) + JBM 700 value
  # (neutral ink). No textLength — mono advance is exact, and the camo bound
  # would squeeze real JetBrains Mono (exact-rail paradigms suppress it).
  label_font_family: JetBrains Mono
  value_font_family: JetBrains Mono
  label_font_size: 9.5
  value_font_size: 10.5
  label_font_weight: 600
  value_font_weight: 700
  # 0.5px tracking at 9.5px = 0.052632em; the value runs untracked.
  label_letter_spacing_em: 0.052632
  value_letter_spacing_em: 0.0
  # Specimen baselines: value y=13.4 (= 10 + 10.5*0.324), label y=13.3
  # (= 10 + 9.5*0.347) — each text optically centred in the 20px frame.
  center_text_factor: 0.324
  label_center_text_factor: 0.347
  # 12px brand glyph (20 * 0.6), midline-centred at y=4 — the family-standard
  # badge glyph weight (brutalist / chrome / cellular all run ratio 0.6 capped
  # at 12). The specimen drew 13, but the solid silhouette blooms on the dark
  # substrates (bright-on-dark reads larger); 12 restores the family weight.
  glyph_size_ratio: 0.6
  glyph_size_max: 12
  content_center_geometric: true
  # Explicit rail pads; pad 7 covers the remaining interior rhythm (the
  # leading state-mark gap on stateful badges).
  pad: 7
  rail_start_pad: 7
  glyph_label_gap: 6
  rail_end_pad: 8
  # Paired groove+shine seam rides the etched-seam slot: 2px total, the shine
  # hairline offset 1px from the groove. Asymmetric gaps per the specimen:
  # 7 label-side, 8 value-side.
  seam_render_w: 2.0
  seam_specular_offset: 1.0
  seam_gap_left: 7
  seam_gap_right: 8
  text_anchor: middle
  # Status-glyph state marks (ping / spin / shake / throb) lead the value as a
  # pill [mark] value — the locked state architecture, re-tuned into
  # the 20px frame. Status light = value cap height (10.5 * 0.75 ≈ 8px).
  indicator_cap_ratio: 0.75
  indicator_shape: status-glyph
  indicator_leads_value: true
  light_indicator_inner_ratio: 0.5

strip:
  # Telemetry rail (the strip specimen): display-face identity (Inter 800
  # 14.5) | paired groove/shine dividers | mono metric columns (JBM 600 8
  # muted labels over JBM 700 16 neutral-ink values) | green pulse pinned
  # 18px off the right edge — on a full-bleed 46px rx10 card. NO canvas
  # inset: an embedded artifact has no page for a shadow to fade into, so an
  # inset margin renders as a hard-clipped shadow box on the README ground.
  # The card spans the viewBox (the original plate posture); the shadow filter clips
  # behind it and the inner highlight + border carry the edge.
  strip_height: 46
  plate_corner: 10
  # Identity: 18px glyph at x=18, 11px gap, Inter 800 14.5 untracked,
  # baseline 28 (card-space).
  strip_glyph_ratio: 0.391
  glyph_inset: 18
  glyph_text_gap: 11
  identity_font_family: Inter
  identity_font_size: 14.5
  identity_font_weight: 800
  identity_letter_spacing_em: 0.0
  identity_baseline_y: 28
  # Metric columns: muted mono labels (1px tracking at 8px = 0.125em) over
  # neutral-ink mono values, middle-anchored, baselines 16.5 / 33 (card-space).
  label_font_family: JetBrains Mono
  label_font_size: 8
  label_font_weight: 600
  label_letter_spacing_em: 0.125
  value_font_family: JetBrains Mono
  value_font_size: 16
  value_font_weight: 700
  value_letter_spacing_em: 0.0
  metric_label_baseline_y: 16.5
  metric_value_baseline_y: 33
  # Paired groove+shine dividers: 24px tall, 10px below the card top —
  # neutral hairlines that invert per substrate, never coloured seams.
  divider_render_mode: paired-rect
  divider_y: 10
  divider_h: 24
  # Status pulse: housing r 5.3 (ping core r 3.4 / ring stroke 1.6), pinned at
  # content_width - 18. The editorial ACTIVE live dot rides every strip.
  status_always: true
  status_right_inset: 18
  status_glyph_r: 5.3
  status_shape_rendering: geometricPrecision
  # Shared zone pipeline (NOT brutalist's owns_strip custom layout). Width is
  # CONTENT-ADAPTIVE via compute_strip_zones; constant inter-cell gutter =
  # cell_pad (explicit gutter separates metrics — adjacent values would
  # otherwise collide, e.g. "12.4k1.2k").
  owns_strip: false
  strip_pad: 16
  cell_pad: 32
  cell_min_width: 12
  strip_min_width: 0
  stretch_cells_to_min_width: false

chart:
  chart_width: 1100
  chart_height: 660
  viewport_x: 100
  viewport_y: 140
  viewport_w: 880
  viewport_h: 340
  # CIM motion (transform/opacity only): the line draws on, the area + markers
  # fade in, the endpoint pings — like the chart specimens. Reduced-motion stills.
  line_animate: true
  # Blue axis details (top Y-tick + current X-tick accent) and vertical gridlines
  # at every X-tick, per the porcelain chart specimen.
  axis_accent: true
  y_tick_target: 4
  label_collision_font_family: JetBrains Mono
  label_collision_font_size: 9
  label_collision_font_weight: 700
  label_collision_letter_spacing_em: 0.06
  axis_y_label_x_offset: -12
  axis_y_label_y_offset: 4
  x_axis_label_y: 500
  milestone_label_y_offset: -18
  identity_font_family: Inter
  identity_font_size: 11
  identity_font_weight: 700
  identity_letter_spacing_em: 0.12

stats:
  card_width: 480
  card_height: 210
  embeds_chart: false
  metric_layout_mode: primer_editorial
  metric_value_font_family: Inter
  metric_value_font_size: 18
  metric_value_font_weight: 700
  metric_value_letter_spacing_em: -0.02
  metric_label_font_family: JetBrains Mono
  # Unified primer label voice (8px / 700 / 0.12em, matching badge/strip/chart).
  metric_label_font_size: 8
  metric_label_font_weight: 700
  metric_label_letter_spacing_em: 0.12
  activity_bar_baseline_y: 180
  activity_bar_max_h: 24
  activity_bar_min_h: 2
  activity_bar_w: 7
  activity_bar_start_x: 22
  activity_bar_stride: 8.4
  activity_bar_opacity_min: 0.34
  activity_bar_opacity_max: 0.77
  activity_bar_opacity_min_light: 0.4
  activity_bar_opacity_max_light: 0.95
  language_segment_opacities_light: [1.0, 0.66, 0.42, 0.26]
  identity_x: 37
  bio_x: 95
  identity_padding: 8
  identity_breathing_margin: 8
  identity_font_family: Inter
  identity_font_size: 11
  identity_font_weight: 700
  identity_letter_spacing_em: 0.12
  identity_text_transform: uppercase

icon:
  supported_shapes: [circle, square]
  default_shape: circle

marquee:
  width: 800
  height: 44
  # Identity cap (glyph + scope + LIVE pulse) leads the left; stacked
  # label-over-value modules (the stat-card cell grammar in motion) with cobalt
  # hairline dividers scroll under the cap seam — not an inline label/value ribbon.
  item_layout: module
  cap_kind: identity
  # Hero (STARS) is the one cobalt value; state values use the deeper CORE stop
  # (forest/sienna/red), readable on the light band.
  hero_color_role: signal
  state_value_stop: core
  # Module column labels resolve to the genome chromatic label value (same as the
  # badge label, stats card label, strip column header) — one label system.
  module_label_color: "var(--dna-label-text)"
  font_size: 12
  font_weight: "700"
  letter_spacing: "-0.02em"
  font_family: "Inter, -apple-system, system-ui, sans-serif"
  label_font_size: 6
  module_value_font_family: "Inter, -apple-system, system-ui, sans-serif"
  module_label_font_family: "var(--dna-font-mono, 'JetBrains Mono', ui-monospace, monospace)"
  module_label_font_size: 6
  module_label_letter_spacing: "0.18em"
  module_text_inset: 16
  module_label_y: 16
  module_value_y: 32
  # Low-opacity cobalt hairline divider (not a hard full-opacity bar).
  module_divider_w: 1
  module_divider_y: 9
  module_divider_h: 26
  module_divider_opacity: 0.12
  module_min_width: 60
  separator_kind: glyph
  separator_glyph: "·"
  separator_size: 7
  separator_color: "var(--dna-signal)"
  # Reserve the 0..100 identity cap; modules clip to the readout window past it.
  clip_inset_left: 108
  clip_inset_right: 16
  clip_inset_top: 0
  clip_inset_bottom: 0
  clip_rx: 0

matrix:
  # Comparison-table chassis (porcelain-final specimens, all 900 wide).
  # Values restate the load-bearing ParadigmMatrixConfig defaults so the
  # chassis numbers live in data/, not only in code; cell-kind geometry and
  # the semantic palette are frame-generic and live in data/matrix.yaml.
  width: 900
  card_radius: 14
  margin_x: 34
  # Rail 20 below the descriptor baseline (g-specimen rhythm: 54/73/93).
  masthead_h: 93
  colheader_h: 33
  row_pitch: 40
  row_pitch_compact: 34
  content_row_base: 46
  # Masthead scan rail: 4 x phi x rhythm-second; transform-only animation.
  scan_duration: "6.472s"
  scan_w: 220
  scan_h: 1.4
  hero_lane_opacity: 0.055
  title_voice: { family: Inter, size: 29, weight: 800, tracking_em: -0.02 }
  desc_voice: { family: JetBrains Mono, size: 10.5, weight: 400 }
  colhead_voice: { family: JetBrains Mono, size: 8.5, weight: 700, tracking_em: 0.12 }

diagram:
  # One speed of light (K1): constant-velocity transit for particles and
  # beam comets — per-edge dur = clamp(length / v_target, dur_min, dur_max);
  # marching tracks add the overtake cap. Phi-family values, calibrated to
  # the fanout renders (radial holds its 2.618s exactly; horizontal drifts
  # 2.4 -> 2.68s).
  motion_v_target: 144
  motion_dur_min: 2.618
  motion_dur_max: 4.236
  track_overtake_floor: 2.5
  # Topology-diagram chassis + kinetic channel (canon: hw-diagram-alpha3-canon
  # + the ten topology specimens). Values restate the load-bearing
  # ParadigmDiagramConfig defaults so the chassis numbers live in data/;
  # flow-grammar constants (caps, beam/flow anatomy, choreography) are
  # frame-generic and live in data/diagram.yaml.
  #
  # Kinetic channel: primer's default is the DOTTED-DRIFT (dash over a
  # dash-march track — the diagrams-v3 kit's quiet flow line). Particle is
  # the opt-in accent rider; beam/flow run over a static tube;
  # reduced-motion kills the march. The allowlist carries the closed 2x2.
  edge_motion_default: dash
  edge_motion_allowlist: [dash, particle, beam]
  track_default_by_motion:
    dash: dash-march
    particle: static # riders never dash their rail (specimens: solid rails WITH particles)
    beam: static # the gradient window animates OVER a static tube; the stroke never marches
  # Entrance channel: fade | none wired; draw-on is the vellum
  # genome session's choreography (rejected at config load until it lands).
  entrance: fade
  direction_device: motion
  title_voice: { family: Inter, size: 16, weight: 700 }
  subtitle_voice: { family: Inter, size: 11, weight: 400 }
  # Card typography is the diagrams-v3 kit hierarchy: name Inter 600 15,
  # hero Inter 700 17, sub JetBrains Mono 400 11 (.01em), micro-label mono
  # 400 10 (.08em air).
  label_voice: { family: Inter, size: 15, weight: 600 }
  desc_voice: { family: JetBrains Mono, size: 11, weight: 400, tracking_em: 0.01 }
  hero_name_voice: { family: Inter, size: 17, weight: 700 }
  hero_desc_voice: { family: JetBrains Mono, size: 11, weight: 500, tracking_em: 0.01 }
  muted_name_voice: { family: Inter, size: 15, weight: 600 }
  op_voice: { family: Inter, size: 13, weight: 600 }
  # Rendered edge labels (the kit micro-label) carry -> and check marks:
  # the slot is mono structurally, never a mono_triggers special case.
  edge_label_voice: { family: JetBrains Mono, size: 10, weight: 400, tracking_em: 0.08 }
  legend_voice: { family: JetBrains Mono, size: 9.5, weight: 400, tracking_em: 0.04 }
  tag_voice: { family: JetBrains Mono, size: 11, weight: 400, tracking_em: 0.06 }
  short_voice: { family: JetBrains Mono, size: 12, weight: 700 }
  hub_short_voice: { family: JetBrains Mono, size: 16, weight: 700 }
  circle_label_voice: { family: JetBrains Mono, size: 9.5, weight: 400 }
  foot_voice: { family: JetBrains Mono, size: 7, weight: 400, tracking_em: 0.1 }
  # Annotation overlays + lanes furniture. annotation_voice: mono chrome, a
  # step below a card desc. lane_header_voice: display, tracked band title.
  # count_voice: small mono member-count numeral. region_label_voice:
  # compound-region band header (pp-gateway-balanced.svg .gw-cnt: 9px mono,
  # 400 weight, .14em tracking) — wider-tracked and lighter than count_voice,
  # a chip label rather than a numeral badge.
  annotation_voice: { family: JetBrains Mono, size: 9.5, weight: 500 }
  lane_header_voice: { family: Inter, size: 12.5, weight: 700, tracking_em: 0.08 }
  count_voice: { family: JetBrains Mono, size: 8, weight: 700, tracking_em: 0.04 }
  region_label_voice: { family: JetBrains Mono, size: 9, weight: 400, tracking_em: 0.14 }
  # ── Root rhythm law ───────────────────────────────────────────────────
  # System-wide vertical rhythm + glyph-circle radii EVERY topology family
  # inherits when its own block below doesn't cite an override
  # (ParadigmDiagramConfig._resolve_topology_rhythm, core/paradigm.py — a
  # model_validator that resolves family-then-root onto every topology
  # immediately after this file loads, so a solver never reads an unresolved
  # field). These are not invented numbers — they ARE the
  # primer_diagram_language sheet's own measured law, hoisted from where
  # they were already cited per-family:
  #   node: the uniform 165x76 satellite (model-router's own preset
  #     citation: pad_y 22, label_desc_gap 7.5; desc_line_pitch/
  #     max_desc_lines from the satellite's own single-line demonstration).
  #   hero: the 206x104 router hero (fanout-horizontal's own topology
  #     citation: pad_y 25.5, label_desc_gap 8.5, desc_line_pitch 18,
  #     max_desc_lines 2 — the hero's own two-line demonstration).
  #   circle_r/hero_circle_r: the bilateral canon (hw-diagram-alpha3-
  #     canon.html "Integration Hub v2": satellites r=30, hub r=44),
  #     previously duplicated identically across four fanout orientations.
  # A family whose own hand specimen measures a different rhythm (dag/
  # state-machine's 62-tall two-row cards, flywheel-circles' r56 medallion)
  # cites its own override below; every other family — including any
  # topology added in the future without its own rhythm keys — inherits
  # this without ever touching a number.
  node: { pad_y: 22, label_desc_gap: 7.5, desc_line_pitch: 19, max_desc_lines: 1 }
  hero: { pad_y: 25.5, label_desc_gap: 8.5, desc_line_pitch: 18, max_desc_lines: 2 }
  circle_r: 30
  hero_circle_r: 44
  topologies:
    pipeline: # 896x216 banner: cards on one baseline, 60px gaps
      width_policy: aligned
      channel_run_min: 144 # K3: all-reciprocal compositions are wire-major (12 dash periods)
      width: 1000
      height: 216
      display_w: 740
      margin_x: 40
      gap: 120 # equal runs; label-row stages widened the banner — 120 keeps the 0.51 scale governor
      # Chassis default anatomy is the LABEL-ROW card (glyph LEFT of the text
      # block), two-line unified h60, ink-derived widths (the axial 144/184
      # family) — the anatomy for the lifecycle pipelines (artifact-roundtrip/
      # gateway) and bare topology="pipeline". rag-pipeline opts into the
      # portrait HEAD anatomy per its own specimen (the rag-pipeline prototype) at the preset
      # level (node_anatomy: head + a portrait chassis override).
      card_min_w: 120
      h_max: 200
      node: { w: 144, h: 60, rx: 13, label_dy: 25, desc_dy: 44, desc_line_pitch: 19, pad_y: 13.5, max_desc_lines: 2, label_gap: 22 }
      hero: { w: 176, h: 72, rx: 16, max_desc_lines: 2, pad_y: 16, desc_line_pitch: 19 }
    fanout-horizontal: # source left, dest column right, midpoint S-curves
      width_floor: true # content-fit audit: fan solvers proportionally split WITHIN the fixed frame
      width_policy: aligned # dest column shares one solved width (group-uniform)
      depart_trunk: 133 # model-router: mouth 317 -> knot 450, one drift wire then the spread; route chip (60) + 2*36.5 stubs
      # Chipless trunk departs FLUSH (depart_trunk_bare unset, 0 = mouth):
      # primer-fanout-refined.html — the spread bursts off the card face
      # through a bezel AT the mouth, no stub, no floating knot.
      width: 920
      display_w: 740
      margin_x: 30
      header_h: 92
      footer_h: 78
      # The language specimen (router): providers uniform
      # 165x76 at pitch 118 (gap ≈ card height — the balance law); hub
      # 206x104 with the 32 glyph and centered block.
      pitch: 118
      h_max: 120 # card-anatomy: dest cards grow to hold a wrapped desc
      # Kit column default (144); the model-router preset pins its specimen's 165 doors.
      # NOTE: pad_y/label_desc_gap stay UNCITED at this shared topology level —
      # parity-beam shares this chassis with its OWN uniform 160x60 doors
      # (no desc-driven growth wanted); the 165x76 satellite's generous rhythm
      # is a model-router SPECIMEN fact, cited on that preset's own chassis
      # override in diagram.yaml, never leaked onto every fanout-horizontal user.
      node: { w: 144, h: 76, dot_dy: 24, label_dy: 28, desc_dy: 47, desc_line_pitch: 19, max_desc_lines: 4, label_gap: 22 }
      # Vertical rhythm (primer_diagram_language, name 38.6 desc-gap 21 pitch
      # 18 on the 206x104 router hero): pad_y/label_desc_gap/desc_line_pitch
      # content-solve to 104 on the sheet's own 3-row content instead of
      # relying solely on the w/h citation as a floor.
      hero: { w: 206, h: 104, rx: 16, max_desc_lines: 4, pad_x: 24, pad_y: 25.5, label_desc_gap: 8.5, desc_line_pitch: 18 }
      # circle_r/hero_circle_r: the bilateral canon (hw-diagram-alpha3-
      # canon.html, "Integration Hub v2": glyph circles r=30, hub r=44) —
      # hoisted to the paradigm root (this file's own node:/hero: block
      # above `topologies:`), inherited here without restating the pair.
    fanout-bilateral: # source centered, dests split left/right
      width_floor: true # content-fit audit: fan solvers proportionally split WITHIN the fixed frame
      width_policy: aligned # both dest columns share one solved width
      width: 960
      display_w: 740
      margin_x: 40
      pitch: 120
      h_max: 120
      # Generous source-to-sink cards (reverse-etl 168x76): floor the width
      # and height so the dest columns read as full plates, not shrink-wrapped.
      card_min_w: 120 # kit column floor; reverse-etl pins its specimen's 168 doors
      node: { w: 144, h: 76, dot_dy: 24, label_dy: 28, desc_dy: 44, max_desc_lines: 4, label_gap: 22 }
      hero: { w: 210, h: 96, rx: 16, max_desc_lines: 4 }
      # circle_r/hero_circle_r: the same bilateral canon (hw-diagram-alpha3-
      # canon.html, "Integration Hub v2", hw:spatial-notes: 820x420,
      # bilateral about x=410, hub r=44 (410,225), glyph circles r=30 at
      # x=110/710 y=105/225/345: center-to-center / satellite_r = 10.0,
      # boundary-gap / satellite_r = 7.53) — hoisted to the paradigm root,
      # inherited here without restating the pair.
    fanout-upward: # headerless inverted pyramid, source at the bottom (display_w bumped below)
      width_floor: true # content-fit audit: fan solvers proportionally split WITHIN the fixed frame
      width_policy: aligned # dest row shares one solved width
      width: 920
      display_w: 740 # inverted pyramid fills the page width like the other banners
      header_mode: none
      header_h: 0
      footer_h: 0
      margin_x: 20
      margin_top: 40
      bottom_m: 20
      row_cap: 3
      row_gap: 62
      src_gap: 48
      node: { w: 150, h: 56, dot_dy: 24, label_dy: 28, desc_dy: 44 }
      # sibling parity: fanout-downward/convergence/tree/hub heroes all
      # declare max_desc_lines: 2 — this hero had none, defaulting to the
      # class floor of 1 (the latent trap: a 2-paragraph authored hero desc
      # silently lost its second paragraph before wrap_text_lines's
      # paragraph-floor guard existed).
      # pad_y/label_desc_gap: no fanout-upward hand specimen exists in
      # GEOMETRY_SPECIMENS to cite directly, so this inherits state-
      # machine's own hero citation (pad_y 21 / label_desc_gap 9.1) — the
      # nearest sibling by both role (single/double-line hero crown) and
      # absolute scale (176x78 vs this hero's 220x80). Same failure mode as
      # dag/state-machine's uncited heroes: fan.py also gates its height
      # floor on hero_declared (empty for a preset with no chassis.hero
      # override), so integration-roster's "webhooks" hero — a gallery-only
      # story with zero chassis override — content-solved to a ~47-tall
      # oval against the paradigm's tight 7/6 defaults before this citation.
      hero: { w: 220, h: 80, rx: 16, pad_y: 21, label_desc_gap: 9.1, max_desc_lines: 2 }
      # circle_r/hero_circle_r: same bilateral-canon citation as fanout-
      # bilateral/fanout-horizontal (hw-diagram-alpha3-canon.html,
      # "Integration Hub v2") — hoisted to the paradigm root, inherited
      # here without restating the pair.
    fanout-downward: # source top-center, dest ROW at the bottom, S-curves fan DOWN (router-descent)
      width_floor: true # content-fit audit: fixed banner (hero top, provider row bottom, generous fan reach)
      width_policy: aligned # the provider row shares one solved width
      depart_trunk: 66 # hero bottom -> knot, one wire carrying the route chip then the spread; CHIP_H (26) + 2*20 stubs
      # Chipless trunk departs FLUSH (depart_trunk_bare unset, 0 = mouth) —
      # the same law as fanout-horizontal (primer-fanout-refined.html).
      width: 1240
      display_w: 740
      height: 740 # fixed banner: hero top, provider row bottom, generous fan reach
      margin_x: 30
      margin_top: 60
      header_mode: none
      header_h: 0
      footer_h: 40
      bottom_m: 102
      pitch: 188 # provider cards pitch (119w + gap)
      node_anatomy: head # portrait provider cards: brand glyph ABOVE the name
      node: { w: 119, h: 96, dot_dy: 24, label_dy: 28, desc_dy: 44, max_desc_lines: 1 }
      hero: { w: 206, h: 104, rx: 16, max_desc_lines: 2 }
      # circle_r/hero_circle_r: bilateral-canon citation (hw-diagram-
      # alpha3-canon.html, "Integration Hub v2": satellites r=30, hub r=44)
      # — hoisted to the paradigm root, inherited here without restating
      # the pair.
    fanout-radial: # square hub: dests on a ring, rays masked by the hub
      width_floor: true # content-fit audit: square ring frame — the ring solves within it
      aspect: square
      width_policy: aligned # ring card dests share one solved width
      width: 920
      display_w: 740 # square ring renders at the shared page width, not a small 480
      margin_x: 24
      header_h: 0
      footer_h: 0
      ring_r: 250
      ring_gap: 80
      # Ring cards seat at a uniform 165 (model-router), floored so short
      # provider labels don't shrink the ring dest below its siblings.
      card_min_w: 120 # kit column floor (no rect-radial specimen pins a wider one)
      node: { w: 144, h: 76, dot_dy: 24, label_dy: 28, desc_dy: 44 }
      # pad_y/label_desc_gap/desc_line_pitch match the paradigm root exactly
      # (the same router-hero rhythm fanout-horizontal cites) — inherited,
      # not restated. max_desc_lines DOES diverge from the root's 2: it was
      # uncited here before (default 1), and the ring hero silently dropped
      # the sheet's second desc row before it could content-solve past ~86
