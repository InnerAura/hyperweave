id: brutalist
name: Brutalist
description: >
  Flat plate, class-based separators, sharp geometric typography.
  Used by brutalist-emerald's stats/chart frames (and by any future
  flat-matte genome). No chrome-material requirements.
requires_genome_fields: []

badge:
  label_font_family: JetBrains Mono
  value_font_family: JetBrains Mono
  label_font_size: 11
  value_font_size: 11
  value_font_weight: 700

strip:
  value_font_size: 18
  value_font_family: Inter
  label_font_size: 7
  label_font_family: JetBrains Mono
  divider_render_mode: class
  status_shape_rendering: crispEdges
  # Cell-layout measurement params — must mirror brutalist-defs.j2:19-28.
  # If the CSS class changes (font-weight, letter-spacing), update here so
  # compute_cell_layout sizes cells to render-truth.
  label_font_weight: 700
  label_letter_spacing_em: 0.2
  value_font_weight: 900
  value_letter_spacing_em: -0.01
  cell_pad: 20
  cell_min_width: 106

banner:
  hero_font_family: Inter
  hero_font_weight: 900
  hero_skew_deg: 0.0
  hero_italic: false

chart:
  viewport_x: 80
  viewport_y: 150
  viewport_w: 760
  viewport_h: 245

stats:
  card_height: 280
  embeds_chart: false

icon:
  supported_shapes: [circle, square]
  default_shape: square
