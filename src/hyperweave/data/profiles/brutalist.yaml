id: brutalist
name: Brutalist
fonts:
  title: "'Inter', -apple-system, system-ui, sans-serif"
  value: "'Inter', -apple-system, system-ui, sans-serif"
  mono: "'SF Mono', 'JetBrains Mono', monospace"
identity_size: 14
identity_weight: 700
identity_letter_spacing: "0em"
value_size: 18
value_weight: 900
label_size: 8
label_weight: 500
label_letter_spacing: "0.08em"
badge_value_size: 11
badge_value_weight: 700
strip_corner: 0
badge_corner: 0
strip_accent_width: 6
strip_metric_pitch: 106
strip_divider_mode: minimal
badge_frame_height: 20
glyph_backing: square
glyph_backing_rx: 2
status_shape: square
easing: "cubic-bezier(0.4, 0, 0.2, 1)"

# ── Badge layout (parametric, from Tier 1A audit) ──
badge_sep_width: 2
badge_seam_width: 3
badge_inset: 0
badge_indicator_size: 8
badge_indicator_pad_r: 8
badge_label_uppercase: true
badge_use_mono: true
badge_text_y_factor: 0.69

# ── Strip parametric (Tier 1A) ──
strip_glyph_size: 20
strip_glyph_fill: "var(--dna-signal)"
strip_identity_weight: 900
strip_identity_fill: "var(--dna-brand-text)"
strip_identity_letter_spacing: "0.18em"
strip_metric_label_size: 7
strip_metric_label_fill: "var(--dna-ink-muted)"
strip_metric_label_letter_spacing: "0.2em"
strip_metric_label_y: 18
strip_metric_value_weight: 900
strip_metric_value_fill: "var(--dna-ink-primary)"
strip_metric_value_y: 36
strip_metric_value_skew: 0
strip_identity_font: "var(--dna-font-mono, 'SF Mono', monospace)"
strip_metric_label_font: "var(--dna-font-mono, 'SF Mono', monospace)"
strip_divider_color: "var(--dna-border-tint)"
strip_divider_opacity: 0.4

# ── Marquee parametric (Tier 1A) ──
marquee_separator: "■"
marquee_separator_color: "var(--dna-border)"
marquee_separator_opacity: ""
marquee_divider_width: 1.5
marquee_dot_shape: rect
marquee_clip_x: 6
marquee_clip_w: 788
marquee_font_family: "var(--dna-font-mono, ui-monospace, monospace)"

# ── Horizontal marquee (Tier 1A closure) ──
marquee_horizontal_clip_inset_y: 4
marquee_horizontal_clip_inset_x: 4
marquee_horizontal_show_accent_lines: true
marquee_horizontal_bold_pattern: "even"
