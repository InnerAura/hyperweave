id: converge
name: Converge
category: css
specimen: specs/motion/motion-kinetic-typography/banner_convergence.svg
cim_compliant: false
cim_waiver: "Animates clip-path (layout/paint) for split-screen convergence reveal. clip-path changes trigger compositing layer recalculation."
animated_properties:
  - transform
  - opacity
  - clip-path
applies_to:
  - banner
timing:
  convergence_duration: "0.8s"
  convergence_easing: "cubic-bezier(.33,1,.68,1)"
  ring_delay: "0.6s"
  ring_duration: "0.5s"
  flash_delay: "0.7s"
  label_delay: "1.0s"
structure:
  layers:
    - name: left_half
      description: "Text approaching from left with clip-path"
    - name: right_half
      description: "Text approaching from right with clip-path"
    - name: ring
      description: "Expanding ring at convergence point"
    - name: flash
      description: "Brief opacity flash at convergence"
    - name: label
      description: "Subtitle label fade-up"
keyframes:
  converge_left:
    "0%": "transform: translateX(-50%); clip-path: inset(0 50% 0 0); opacity: 0"
    "100%": "transform: translateX(0); clip-path: inset(0 0 0 0); opacity: 1"
  converge_right:
    "0%": "transform: translateX(50%); clip-path: inset(0 0 0 50%); opacity: 0"
    "100%": "transform: translateX(0); clip-path: inset(0 0 0 0); opacity: 1"
  ring_expand:
    "0%": "transform: scale(0); opacity: 1"
    "100%": "transform: scale(3); opacity: 0"
  flash_pulse:
    "0%": "opacity: 0"
    "50%": "opacity: 0.8"
    "100%": "opacity: 0"
css: |
  .hw-motion-converge-left {
    will-change: transform;
    animation: hw-motion-converge-from-left 0.8s cubic-bezier(.16,1,.3,1) 0.2s both;
  }
  @keyframes hw-motion-converge-from-left {
    from { transform: translateX(-500px); }
    to   { transform: translateX(0); }
  }
  .hw-motion-converge-right {
    will-change: transform;
    animation: hw-motion-converge-from-right 0.8s cubic-bezier(.16,1,.3,1) 0.2s both;
  }
  @keyframes hw-motion-converge-from-right {
    from { transform: translateX(500px); }
    to   { transform: translateX(0); }
  }
  .hw-motion-converge-ring {
    will-change: transform, opacity; transform: scale(0);
    animation: hw-motion-converge-ring-expand 0.6s cubic-bezier(.33,1,.68,1) 0.85s forwards;
  }
  @keyframes hw-motion-converge-ring-expand {
    0%   { transform: scale(0); opacity: 0.6; }
    60%  { opacity: 0.3; }
    100% { transform: scale(1); opacity: 0; }
  }
  .hw-motion-converge-flash {
    will-change: opacity; opacity: 0;
    animation: hw-motion-converge-flash-pulse 0.25s ease-out 0.9s forwards;
  }
  @keyframes hw-motion-converge-flash-pulse {
    0%   { opacity: 0; } 30%  { opacity: .1; } 100% { opacity: 0; }
  }
  .hw-motion-converge-center {
    will-change: opacity; opacity: 0;
    animation: hw-motion-converge-center-in 0.3s ease-out 0.95s forwards;
  }
  @keyframes hw-motion-converge-center-in { to { opacity: 0.4; } }
  .hw-motion-converge-label {
    will-change: opacity, transform; opacity: 0; transform: translateY(6px);
    animation: hw-motion-converge-label-in 0.5s cubic-bezier(.33,1,.68,1) 1.3s forwards;
  }
  @keyframes hw-motion-converge-label-in { to { opacity: 1; transform: translateY(0); } }
  .hw-motion-converge-indicator {
    will-change: opacity; opacity: 0;
    animation: hw-motion-converge-fade-in 0.3s ease-out 1.4s both, hw-motion-converge-pulse 2.5s ease-in-out 1.7s infinite;
  }
  @keyframes hw-motion-converge-fade-in { to { opacity: 1; } }
  @keyframes hw-motion-converge-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.15; } }
  @media (prefers-reduced-motion: reduce) {
    .hw-motion-converge-left, .hw-motion-converge-right { animation: none; transform: none; }
    .hw-motion-converge-ring { animation: none; transform: scale(0); opacity: 0; }
    .hw-motion-converge-flash { animation: none; opacity: 0; }
    .hw-motion-converge-center { animation: none; opacity: 0.4; }
    .hw-motion-converge-label { animation: none; opacity: 1; transform: none; }
    .hw-motion-converge-indicator { animation: none; opacity: 1; }
  }
description: "Split-screen convergence: text halves approach from L/R with clip-path reveals, ring expansion at convergence point, flash pulse, then label fade-up. Non-CIM due to clip-path animation."
