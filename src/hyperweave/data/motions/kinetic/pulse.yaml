id: pulse
name: Pulse
category: smil
specimen: specs/motion/motion-kinetic-typography/pulse.svg
cim_compliant: false
cim_waiver: "Animates letter-spacing (layout) via SMIL. letter-spacing changes trigger text layout recalculation, which is non-CIM."
animated_properties:
  - letter-spacing
applies_to:
  - banner
timing:
  breathing_duration: "4s"
  breathing_easing: "linear"
  repeat: "indefinite"
structure:
  layers:
    - name: headline
      description: "Primary headline with animated letter-spacing breathing"
    - name: subtitle
      description: "Monospace subtitle below headline"
  typography:
    headline_weight: 800
    headline_letter_spacing_range: "4-8"
    subtitle_font: "monospace"
    subtitle_size: "16px"
keyframes:
  letter_spacing_breathe:
    values: "4;8;4"
    dur: "4s"
smil: |
  <animate attributeName="letter-spacing"
           values="4;8;4" dur="4s" repeatCount="indefinite"/>
css: |
  .hw-motion-pulse-headline {
    font-weight: 800;
    fill: var(--dna-ink-primary, #fff);
  }
  @media (prefers-reduced-motion: reduce) {
    .hw-motion-pulse-headline { letter-spacing: 4px; }
  }
description: "Typographic pulse: headline letter-spacing breathes 4-8px over 4s via SMIL animate. Monospace subtitle anchored below. Clean, minimal kinetic effect. Non-CIM due to letter-spacing animation."
