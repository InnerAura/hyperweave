id: breach
name: Breach
category: hybrid
specimen: specs/motion/motion-kinetic-typography/quantum_tunneling_breach.svg
cim_compliant: false
cim_waiver: "Animates linearGradient coordinates x1/x2 (paint) via SMIL for scan-line mask reveal, and animateTransform scale (compositor) for glitch artifacts. Gradient coordinate animation is non-CIM."
animated_properties:
  - x1
  - x2
  - transform
applies_to:
  - banner
  - divider
timing:
  scan_duration: "2s"
  scan_easing: "linear"
  scan_repeat: "indefinite"
  glitch_duration: "0.1s"
  glitch_repeat: "indefinite"
  glitch_begin: "0.5s"
structure:
  layers:
    - name: ghost
      description: "Dim text (always visible, fill #333)"
    - name: materialized
      description: "Bright text (masked by scan gradient, fill #fff, drop-shadow)"
    - name: glitch
      description: "Cyan rect artifact, scale-pulsing"
  scan_gradient:
    type: "linear"
    stops: ["black", "black", "white", "black", "black"]
    offsets: ["0%", "45%", "50%", "55%", "100%"]
  mask: true
  filter: "drop-shadow(0 0 10px white)"
keyframes:
  scan_x1:
    values: "-1;1"
    dur: "2s"
  scan_x2:
    values: "0;2"
    dur: "2s"
  glitch_scale:
    values: "1 1; 1 5; 1 1"
    dur: "0.1s"
    begin: "0.5s"
smil: |
  <!-- Scan gradient: moving reveal window -->
  <linearGradient id="{{uid}}-scan-grad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="black"/>
    <stop offset="45%" stop-color="black"/>
    <stop offset="50%" stop-color="white"/>
    <stop offset="55%" stop-color="black"/>
    <stop offset="100%" stop-color="black"/>
    <animate attributeName="x1" from="-1" to="1" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="x2" from="0" to="2" dur="2s" repeatCount="indefinite"/>
  </linearGradient>
  <mask id="{{uid}}-scan-mask">
    <rect x="0" y="0" width="100%" height="100%" fill="url(#{{uid}}-scan-grad)"/>
  </mask>
  <!-- Glitch artifact: rapid scale pulse -->
  <animateTransform attributeName="transform" type="scale"
                    values="1 1; 1 5; 1 1" dur="0.1s"
                    repeatCount="indefinite" begin="0.5s"/>
css: |
  .hw-motion-breach-ghost { fill: var(--dna-ink-muted, #666); }
  .hw-motion-breach-materialized {
    fill: var(--dna-ink-primary, #fff);
    filter: drop-shadow(0 0 10px var(--dna-ink-primary, white));
  }
  .hw-motion-breach-glitch { fill: var(--dna-accent, cyan); opacity: 0.3; }
  @media (prefers-reduced-motion: reduce) {
    .hw-motion-breach-ghost { display: none; }
    .hw-motion-breach-materialized { mask: none; filter: none; }
    .hw-motion-breach-glitch { display: none; }
  }
description: "Quantum tunneling breach: SMIL-driven scan gradient sweeps L-R, revealing materialized text through a mask. Ghost text (dim) visible underneath. Glitch artifact rect pulses scale(1,5) at 0.1s intervals. Hybrid SMIL+CSS. Non-CIM due to gradient coordinate animation."
