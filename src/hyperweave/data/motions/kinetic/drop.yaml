id: drop
name: Drop
category: css
specimen: specs/motion/motion-kinetic-typography/banner_drop.svg
cim_compliant: true
animated_properties:
  - transform
  - opacity
applies_to:
  - banner
timing:
  fall_easing: "cubic-bezier(.34,1.2,.64,1)"
  per_letter_stagger: "0.06s"
  rule_delay: "0.85s"
  label_delay: "0.95s"
  layers:
    back:
      duration: "0.55s"
      peak_opacity: 0.3
      end_opacity: 0.15
    mid:
      duration: "0.52s"
      peak_opacity: 0.7
      end_opacity: 0.4
    front:
      duration: "0.55s"
      peak_opacity: 1.0
      end_opacity: 1.0
structure:
  layers: 3
  layer_names: ["back", "mid", "front"]
  per_letter: true
  fall_distance: "-180px"
  rule_scaleX: true
  label_fade_up: "5px"
  custom_properties:
    - "--d"
    - "--dur"
    - "--dr-peak"
    - "--dr-end"
keyframes:
  fall:
    "0%": "transform: translateY(-180px); opacity: 0"
    "40%": "opacity: var(--dr-peak, 1)"
    "100%": "transform: translateY(0); opacity: var(--dr-end, 1)"
  rule_in:
    "0%": "transform: scaleX(0)"
    "100%": "transform: scaleX(1)"
  label_up:
    "0%": "opacity: 0; transform: translateY(5px)"
    "100%": "opacity: 1; transform: translateY(0)"
css: |
  .hw-motion-drop-back  { fill: var(--dna-ink-muted); will-change: transform, opacity; opacity: 0; }
  .hw-motion-drop-mid   { fill: var(--dna-signal); will-change: transform, opacity; opacity: 0; }
  .hw-motion-drop-front { fill: var(--dna-ink-primary); will-change: transform, opacity; opacity: 0; }
  .hw-motion-drop-c {
    animation: hw-motion-drop-fall var(--dur, 0.6s) cubic-bezier(.34,1.2,.64,1) var(--d, 0s) 1 forwards;
  }
  @keyframes hw-motion-drop-fall {
    0%   { transform: translateY(-180px); opacity: 0; }
    40%  { opacity: var(--dr-peak, 1); }
    100% { transform: translateY(0); opacity: var(--dr-end, 1); }
  }
  .hw-motion-drop-rule {
    will-change: transform; transform: scaleX(0); transform-origin: left;
    animation: hw-motion-drop-rule-in 0.4s cubic-bezier(.33,1,.68,1) 0.85s 1 forwards;
  }
  @keyframes hw-motion-drop-rule-in { to { transform: scaleX(1); } }
  .hw-motion-drop-label {
    will-change: opacity, transform; opacity: 0; transform: translateY(5px);
    animation: hw-motion-drop-label-up 0.4s cubic-bezier(.33,1,.68,1) 0.95s 1 forwards;
  }
  @keyframes hw-motion-drop-label-up { to { opacity: 1; transform: translateY(0); } }
  @media (prefers-reduced-motion: reduce) {
    .hw-motion-drop-c { animation: none; opacity: 1; transform: none; }
    .hw-motion-drop-rule { animation: none; transform: scaleX(1); }
    .hw-motion-drop-label { animation: none; opacity: 1; transform: none; }
  }
description: "Per-letter vertical drop: 3 chromatic layers (back/mid/front) per character fall from -180px with staggered delays (0.06s/letter). Each layer has distinct opacity curves via CSS custom properties (--d, --dur, --dr-peak, --dr-end). Rule scaleX reveal at 0.85s, label at 0.95s. CIM-compliant."
