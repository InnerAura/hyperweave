id: collapse
name: Collapse
category: hybrid
specimen: specs/motion/motion-kinetic-typography/z_axis_illusion_via_exponential_scale_blur_convergence.svg
cim_compliant: false
cim_waiver: "Animates feGaussianBlur stdDeviation (paint/composite) via SMIL for depth-of-field parallax. Filter animation triggers full repaint on each frame."
animated_properties:
  - transform
  - opacity
  - stdDeviation
applies_to:
  - banner
timing:
  tunnel_duration: "4s"
  tunnel_easing: "cubic-bezier(0.7, 0, 0.3, 1)"
  repeat: "indefinite"
  blur_duration: "4s"
  parallax_stagger:
    back: "0.3s"
    mid: "0.15s"
    front: "0s"
structure:
  layers: 3
  layer_names: ["back", "mid", "front"]
  layer_colors:
    back: "#444"
    mid: "#888"
    front: "#fff"
  depth_blur_filter: true
keyframes:
  tunnel_zoom:
    "0%": "transform: scale(0.01); opacity: 0"
    "30%": "transform: scale(1); opacity: 1"
    "60%": "transform: scale(1); opacity: 1"
    "90%": "transform: scale(5); opacity: 0"
    "100%": "transform: scale(0.01); opacity: 0"
  depth_blur:
    values: "50; 0; 0; 80"
    dur: "4s"
css: |
  .hw-motion-collapse-text {
    font-weight: 900; text-anchor: middle;
    dominant-baseline: middle; text-transform: uppercase;
    filter: url(#hw-motion-collapse-blur);
    animation: hw-motion-collapse-zoom 4s cubic-bezier(0.7, 0, 0.3, 1) infinite;
  }
  @keyframes hw-motion-collapse-zoom {
    0%   { transform: scale(0.5); opacity: 0; }
    30%  { transform: scale(1); opacity: 1; }
    60%  { transform: scale(1); opacity: 1; }
    90%  { transform: scale(3); opacity: 0; }
    100% { transform: scale(0.5); opacity: 0; }
  }
  .hw-motion-collapse-back { fill: #444; animation-delay: 0.3s; }
  .hw-motion-collapse-mid  { fill: #888; animation-delay: 0.15s; }
  .hw-motion-collapse-front { fill: var(--dna-ink-primary, #fff); }
  @media (prefers-reduced-motion: reduce) {
    .hw-motion-collapse-text { animation: none; opacity: 1; transform: scale(1); filter: none; }
    .hw-motion-collapse-back, .hw-motion-collapse-mid { display: none; }
  }
smil: |
  <!-- Depth-of-field blur: synced with tunnel-zoom -->
  <filter id="hw-motion-collapse-blur">
    <feGaussianBlur in="SourceGraphic" stdDeviation="0">
      <animate attributeName="stdDeviation"
               values="50; 0; 0; 80" dur="4s" repeatCount="indefinite"/>
    </feGaussianBlur>
  </filter>
description: "Z-axis tunnel collapse: 3 parallax text layers (back/mid/front) cycle scale(0.01)->1->5 with staggered delays, creating z-axis depth illusion. SMIL-driven Gaussian blur syncs with zoom for depth-of-field. 4s cycle. Non-CIM due to filter animation."
