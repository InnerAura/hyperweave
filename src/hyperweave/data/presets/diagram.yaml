# Server-known diagram presets — the kit prototype recreations, one per
# prototype (DIAGRAM_KIT_BRIEF: "Presets are the prototypes — nothing
# else."). Each preset's content is the prototype's hw:payload spec where the
# payload carries nodes; where the prototype shipped a title-only payload the
# node/edge content is the prototype's rendered figure (labels/roles/chips read
# off the specimen), and the census fixture (tests/fixtures/specimens/*.json)
# is the geometric ground truth every preset is tuned against.
#
# Identity rule: a node naming a BRANDED system carries its registry glyph
# (data/registries/glyphs.json) in `glyph`; a semantic archetype carries a core
# glyph (data/registries/glyphs-core.json) in `kind`. Icon-or-nothing — a slug
# resolving in neither registry stays off. No node renders as a glyph-circle
# coin (every prototype census declares coins: 0).
#
# A second combinatorial tier (owner-review candidates) lives OUT of the
# bundled library, in v04/alpha/v04a6/preset-candidates.yaml.

presets:
  # ── Pipeline ────────────────────────────────────────────────────────────
  rag-pipeline:
    topology: pipeline
    zones: ["retrieval-augmented generation"] # specimen -zone runs, verbatim
    title: A RAG pipeline, stage by stage
    subtitle: Pipeline · a query is encoded, searched, augmented with retrieved context, and grounded into a cited answer
    notes: rag pipeline
    node_style: card+glyph
    glyph_tint: full
    node_anatomy: head # the rag-pipeline specimen's stages are portrait (glyph ABOVE the name); the chassis default is label-row for lifecycle pipelines (artifact-roundtrip/gateway)
    chassis: { margin_x: 92, gap: 150, width: 1430, height: 440, card_min_w: 111, node: { w: 111, h: 128 }, hero: { w: 138, h: 128, rx: 16 } , zone_content_gap: 84, caption_gap: 100, caption_pad: 33} # the rag-pipeline specimen's portrait canvas: 111x128 stages, 138x128 answer crown, four equal 150px runs
    nodes: # labels/descs/glyphs verbatim from the rag-pipeline specimen (parity content)
      - { id: corpus, label: Query, desc: user ask, kind: search }
      - { id: embed, label: Embed, desc: → vector, glyph: huggingface }
      - { id: index, label: Retrieve, desc: vector search, glyph: postgresql, glyph_tint: ink, chips: ["top-k 5", cosine] }
      - { id: rerank, label: Generate, desc: grounded, glyph: anthropic }
      - { id: answer, label: Answer, desc: cited response, kind: file-text, role: hero } # specimen draws the folded document, not a speech bubble
    edges:
      - { source: corpus, target: embed, label: encode, label_style: chip, edge_motion: particle, relation: assert }
      - { source: embed, target: index, label: search, label_style: chip, relation: assert }
      - { source: index, target: rerank, label: augment, label_style: chip, relation: assert }
      - { source: rerank, target: answer, label: ground, label_style: chip, relation: assert }

  artifact-roundtrip:
    topology: pipeline
    title: The round trip
    subtitle: The round trip · pixels for humans, hw:payload for agents
    notes: artifact lifecycle roundtrip
    node_style: card+glyph
    node_anatomy: row # artifact-roundtrip: landscape lifecycle cards, not portrait heads
    # hero label_desc_gap 5.1: this preset's OWN hero (pp-roundtrip.svg "the
    # artifact", name baseline 26, gap 19 on a 228x64 rx16 crown) is tighter
    # than the paradigm root's generic hero rhythm (label_desc_gap 8.5,
    # calibrated for the taller 206x104 router hero) — inheriting root
    # without this citation overshoots this hero's own 64 to ~67.4.
    chassis: { card_min_w: 228, node: { w: 228, h: 64 }, hero: { w: 228, h: 64, label_desc_gap: 5.1 }, hero_ratio: 1.0 , caption_gap: 124, caption_pad: 33.1} # hero_ratio 1.0: specimen hero == std width (the pipeline default 1.175 inflated 228 to 267.9)
    edge_motion: particle
    marker: dot
    nodes:
      - { id: spec, label: the spec, desc: "diagram/1 · json", kind: file-text }
      - { id: artifact, label: the artifact, desc: "hw:payload · hwz/1", role: hero, glyph: hyperweave } # the crown's own diamond (pp-roundtrip draws ring+core at the hero; census amended 3→4)
      - { id: surface, label: the surface, desc: "camo · img tag", kind: image } # specimen: framed-window mark
      - { id: agent, label: the agent, desc: "read · transform", kind: terminal } # specimen: >_ prompt mark
    edges:
      - { source: spec, target: artifact, label: compose, relation: drift }
      - { source: artifact, target: surface, label: "publish --format", relation: drift }
      - { source: surface, target: agent, label: re-read, relation: drift }
      - { source: agent, target: artifact, label: "transform → artifact′", relation: bypass }

  gateway:
    topology: pipeline
    title: MCP gateway
    subtitle: host → gateway → server · request and response as two lanes
    notes: mcp gateway
    node_style: card+glyph
    node_anatomy: row # gateway: landscape request/response cards
    chassis: { card_min_w: 142, node: { w: 142, h: 54, rx: 12 }, hero: { w: 167, h: 54, rx: 12 } , caption_gap: 4, caption_pad: 11.4}
    nodes:
      - { id: client, label: Claude Code, desc: MCP host, glyph: anthropic }
      - { id: hw, label: MCP gateway, role: hero, glyph: hyperweave }
      - { id: server, label: hyperweave, desc: MCP server, kind: server }
    edges: # per-lane request/response labels (gateway)
      - { source: client, target: hw, relation: drift, marker: none, label: "request →" }
      - { source: hw, target: client, relation: drift, marker: none, label: "← response" }
      - { source: hw, target: server, direction: both, relation: drift, marker: none }

  # frontier-handoff: the beam relay reference specimen. Four lab
  # medallions on one straight relay — a beam reference, not a kit-prototype
  # recreation; r 32/38(hero), runs locked 232 between
  # silhouettes (node:run 1:3.6), three sequential beam windows on the
  # shared 5.236s clock. The comet is the payload; direction is motion —
  # no arrowheads.
  frontier-handoff:
    topology: pipeline
    zones: ["frontier handoff"] # specimen zone header, accent voice
    title: Frontier Handoff
    subtitle: Frontier handoff · one task relayed across four labs — the comet is the payload
    notes: frontier handoff beam relay
    node_style: glyph-circle
    glyph_tint: full
    edge_motion: beam
    chassis: { circle_r: 32, hero_circle_r: 38, gap: 232 , zone_content_gap: 92, caption_gap: 38, caption_pad: 41}
    nodes:
      - { id: gpt, label: GPT, glyph: openai }
      - { id: claude, label: Claude, glyph: anthropic, role: hero }
      - { id: gemini, label: Gemini, glyph: gemini }
      - { id: ollama, label: Ollama, glyph: ollama }
    edges:
      - { source: gpt, target: claude }
      - { source: claude, target: gemini }
      - { source: gemini, target: ollama }

  # ── Fanout ──────────────────────────────────────────────────────────────
  reverse-etl:
    topology: fanout
    zones: ["sources", "destinations"] # specimen -zone runs, verbatim
    orientation: bilateral
    chassis: { card_min_w: 168, hero: { w: 236.3, h: 104 } , zone_content_gap: 118, caption_gap: 128, caption_pad: 37} # specimen doors are 168x76 verbatim (pp-integration); hero 236.3x104 verbatim (pp-integration sync engine)
    title: Sync sources to destinations
    subtitle: Fan-out (bilateral) · pull from sources on the left, sync, push to destinations on the right
    notes: reverse etl sync
    glyph_tint: full
    node_style: card+glyph
    nodes:
      - { id: sync, label: sync engine, desc: "pull → transform → push\n3 in · 3 out", role: hero, kind: refresh-cw }
      - { id: postgres, label: Postgres, desc: app database, glyph: postgresql }
      - { id: stripe, label: Stripe, desc: payments, glyph: stripe }
      - { id: salesforce, label: Salesforce, desc: CRM records, glyph: salesforce }
      - { id: slack, label: Slack, desc: alerts, glyph: slack }
      - { id: notion, label: Notion, desc: team docs, glyph: notion }
      - { id: drive, label: Drive, desc: exports, glyph: googledrive }
    edges:
      - { source: postgres, target: sync, edge_motion: particle, relation: assert }
      - { source: stripe, target: sync, edge_motion: particle, relation: assert }
      - { source: salesforce, target: sync, edge_motion: particle, relation: assert }
      - { source: sync, target: slack, relation: assert }
      - { source: sync, target: notion, relation: assert }
      - { source: sync, target: drive, relation: assert }

  model-router:
    topology: fanout
    zones: ["router", "providers"] # specimen -zone runs, verbatim
    orientation: horizontal # model-router DRAWS a horizontal fan (hero→knot→column), not radial
    # node.pad_y/label_desc_gap: primer_diagram_language's uniform 165x76
    # satellite (name 33.9, desc-gap 19) — a THIS-SPECIMEN citation, not a
    # fanout-horizontal-topology default (parity-beam shares that chassis
    # with its own uniform 160x60 doors and must not inherit the growth).
    chassis: { card_min_w: 165, node: { pad_y: 22, label_desc_gap: 7.5 }, hero: { w: 206, h: 104, max_desc_lines: 2 } , zone_content_gap: 45, caption_gap: 59, caption_pad: 41}
    title: One call, best model
    subtitle: Fan-out · a live accent current routes each call to the right model
    notes: model router
    glyph_tint: full
    node_style: card+glyph
    nodes:
      # gather: true — the specimen's depart trunk (gather_knots: 1) needs the
      # fanout gather-gate now that it matches join/dag instead of firing
      # unconditionally on >=2 spokes.
      - { id: router, label: model router, desc: "1 call, best model\ncapability-routed", role: hero, kind: router, gather: true }
      - { id: claude, label: Claude, desc: long-context, glyph: anthropic }
      - { id: gemini, label: Gemini, desc: multimodal, glyph: gemini }
      - { id: mistral, label: Mistral, desc: low-latency, glyph: mistral }
      - { id: cohere, label: Cohere, desc: retrieval, glyph: cohere }
      - { id: perplexity, label: Perplexity, desc: web-grounded, glyph: perplexity }
      - { id: openai, label: OpenAI, desc: tool-use, glyph: openai }
    edges:
      - { source: router, target: claude, label: route, label_style: chip, relation: drift, marker: arrow }
      - { source: router, target: gemini, relation: drift, marker: arrow }
      - { source: router, target: mistral, relation: drift, marker: arrow }
      - { source: router, target: cohere, relation: drift, marker: arrow }
      - { source: router, target: perplexity, relation: drift, marker: arrow }
      - { source: router, target: openai, relation: drift, marker: arrow }

  # router-descent: the same router, drawn as a DOWNWARD fan — hero top-center,
  # a depart trunk dropping to a knot, then six provider cards fanning down into a
  # bottom row (solid arrowed spokes, route chip on the trunk, single ROUTER zone).
  router-descent:
    topology: fanout
    orientation: downward
    chassis: { width_floor: true , zone_content_gap: 14, caption_gap: 42} # the hand file's fixed frame — a preset fact, not topology law
    zones: ["router"]
    title: Route one call to the best model
    subtitle: Fan-out · one call routes down to the right frontier model by capability
    notes: model router downward
    glyph_tint: full
    node_style: card+glyph
    nodes:
      # gather: true — the specimen's depart trunk (gather_knots: 1) needs the
      # fanout gather-gate now that it matches join/dag instead of firing
      # unconditionally on >=2 spokes.
      - { id: router, label: model router, desc: "1 call, best model\ncapability-routed", role: hero, kind: router, gather: true }
      - { id: claude, label: Claude, desc: long-context, glyph: anthropic }
      - { id: gemini, label: Gemini, desc: multimodal, glyph: gemini }
      - { id: mistral, label: Mistral, desc: low-latency, glyph: mistral }
      - { id: cohere, label: Cohere, desc: retrieval, glyph: cohere }
      - { id: perplexity, label: Perplexity, desc: web-grounded, glyph: perplexity }
      - { id: openai, label: OpenAI, desc: tool-use, glyph: openai }
    edges:
      - { source: router, target: claude, label: route, label_style: chip, relation: assert }
      - { source: router, target: gemini, relation: assert }
      - { source: router, target: mistral, relation: assert }
      - { source: router, target: cohere, relation: assert }
      - { source: router, target: perplexity, relation: assert }
      - { source: router, target: openai, relation: assert }

  # parity-beam: the beam fanout reference specimen. One spec travels a
  # trunk beam to the knot,
  # then relays as three SIMULTANEOUS beams down the door lanes —
  # simultaneity IS the byte-identical claim (trunk window .02-.30, lanes
  # .32-.62 on the shared 5.236s clock). Compose chip rides the trunk at
  # even thread; the beam sweeps beneath it — paint order is the law.
  parity-beam:
    topology: fanout
    orientation: horizontal
    zones: ["one spec", "three doors"]
    title: The parity harness — one spec, three doors
    subtitle: The parity harness · CLI, HTTP, and MCP ship byte-identical artifacts — the beam is the payload
    notes: parity beam fanout
    node_style: card+glyph
    edge_motion: beam
    # Doors 160x60 per the specimen; drift relations put the compose chip on
    # the trunk (trunk_wins) — the beam replaces the wire entirely, so the
    # dress never draws; markers off (direction is motion, no chevrons).
    # node pad_y 13.7/label_desc_gap 7.6: this preset's OWN doors
    # (diagram-parity-beam-pp.svg, name baseline 25, gap 19 on 160x60 rx13)
    # are a compact door, not the paradigm root's taller 165x76 satellite
    # rhythm (pad_y 22) — inheriting root without this citation overshoots
    # this door's own 60 to ~76.
    chassis: { card_min_w: 160, node: { w: 160, h: 60, pad_y: 13.7, label_desc_gap: 7.6 }, hero: { w: 206, h: 104, max_desc_lines: 2 } , zone_content_gap: 130, caption_gap: 128, caption_pad: 97}
    nodes:
      # gather: true — the specimen's depart trunk (gather_knots: 1) needs the
      # fanout gather-gate now that it matches join/dag instead of firing
      # unconditionally on >=2 spokes.
      - { id: spec, label: one spec, desc: "diagram/1 · json", role: hero, kind: file-text, gather: true }
      - { id: cli, label: CLI, desc: the binary, kind: terminal }
      - { id: http, label: HTTP API, desc: POST /compose, kind: globe }
      - { id: mcp, label: MCP server, desc: hw_compose, kind: plug } # specimen draws the plug
    edges:
      - { source: spec, target: cli, label: compose, label_style: chip, relation: drift, marker: none }
      - { source: spec, target: http, relation: drift, marker: none }
      - { source: spec, target: mcp, relation: drift, marker: none }

  # ── Convergence ─────────────────────────────────────────────────────────
  convergence:
    topology: convergence
    zones: ["inputs"] # specimen -zone runs, verbatim
    title: Four inputs, one artifact
    subtitle: The composition formula · four inputs meet at a single mouth
    notes: four inputs
    node_style: card+glyph
    chassis: { card_min_w: 210, hero: { w: 280, h: 120 }, pitch: 148, margin_x: 86, zone_content_gap: 42, caption_gap: 116, caption_pad: 37} # convergence: fixed 210-wide input cards; short descs never shrink them; hero 280x120 specimen (never-clip content alone solved 262 — floored to the hand rect). Pair-consistency ruling (2026-07-14, supersedes the per-file approach-angle pins 110/125): the TWO convergence entries are one family and share one compositional envelope — the gathered-seed composition (pitch 148, margin_x 86) is canonical, so adjacent gallery renders align instead of reading as an inconsistency; pp-convergence.svg's own 20.6deg approach is the superseded dress
    # Solid convergent inputs meeting at one gather mouth — no terminals (the
    # ring+core knot is the terminus); two inputs carry particle riders.
    wire: solid
    marker: none
    nodes:
      - { id: frame, label: FRAME, desc: spatial contract, kind: layout-grid }
      - { id: genome, label: GENOME, desc: chromatic DNA, kind: droplet }
      - { id: data, label: DATA, desc: live connectors, kind: database }
      - { id: paradigm, label: PARADIGM, desc: template variant, kind: layers }
      - { id: artifact, label: the artifact, desc: one self-contained SVG, role: hero, glyph: hyperweave }
    edges:
      # The prototype's two riders leave FRAME and DATA (measured: particle
      # paths start y=190 and y=410) — authored per edge, never inferred.
      - { source: frame, target: artifact, edge_motion: particle }
      - { source: genome, target: artifact }
      - { source: data, target: artifact, edge_motion: particle }
      - { source: paradigm, target: artifact }

  convergence-arrivals:
    topology: convergence
    zones: ["sources", "artifact"] # specimen -zone runs, verbatim
    # Distinct title from the plain convergence preset: the two are different
    # hand compositions (meet-at-a-mouth vs gather-into-a-knot with arrival
    # dots) — one shared gallery heading read as a duplicated, inconsistent
    # render.
    title: Four sources, one gathered seed
    subtitle: Convergence · four inputs gather into one re-renderable seed
    notes: convergence arrivals
    node_style: card+glyph
    chassis: { card_min_w: 210, hero: { w: 280, h: 120, max_desc_lines: 2 }, pitch: 148, margin_x: 86, zone_content_gap: 56, caption_gap: 80, caption_pad: 31} # convergence-arrivals: wide arrival cards, two-line crown; hero 280x120 specimen (content alone solved 270 — floored to the hand rect); pitch 148 + margin_x 86 together reproduce pp-convergence-flow.svg's own outer/inner approach angle to the KNOT (27.9/10.0deg, half-spread 222 over run 418) — pitch alone (the shared 118 default) undershot because the shared margin_x (60) left a longer run than the specimen's own composition
    nodes:
      - { id: payload, label: payload, desc: the seed data, kind: braces } # specimen: { } braces
      - { id: genome, label: genome, desc: aesthetic dna, kind: dna } # specimen: double-helix (the shuffle stand-in retired once lucide dna landed)
      - { id: frame, label: frame, desc: the skeleton, kind: frame } # specimen: corner-bracket frame (the box stand-in retired once lucide frame landed)
      - { id: spec, label: spec, desc: "size · platform", kind: file-text }
      - { id: artifact, label: the artifact, desc: "payload + envelope\none seed, every surface", role: hero, glyph: hyperweave, gather: true }
    # Four ember spokes drain into the seed; the gather-join collapses them to
    # one mouth + a solid+arrow trunk (spokes lose their dots, keep riders).
    edges:
      - { source: payload, target: artifact, relation: drift, edge_motion: particle, label: compose, label_style: chip }
      - { source: genome, target: artifact, relation: drift, edge_motion: particle }
      - { source: frame, target: artifact, relation: drift, edge_motion: particle }
      - { source: spec, target: artifact, relation: drift, edge_motion: particle }

  # ── Flywheel ────────────────────────────────────────────────────────────
  # flywheel-circles: the medallion-face reference specimen. Four r44
  # glyph medallions seated ON the
  # R=250 ring at the cardinals, congruent solid arc-arrows in the gaps
  # (trim = node half-width + 4°), the r56 accent axis medallion at centre;
  # names + subs leave the ring outward by seat. Static — direction survives
  # as geometry.
  flywheel-circles:
    topology: flywheel
    zones: ["data flywheel"]
    title: The data flywheel — circle face
    subtitle: Flywheel · each artifact ships, is captured as corpus, trains the model, and returns as better generation
    notes: flywheel circle face
    node_style: glyph-circle
    chassis: { width: 1000, ring_r: 250, arc_r: 250, arc_clear_deg: 4, circle_r: 44, hero_circle_r: 56, circle_label_dy: 18, node: { max_desc_lines: 2 } , zone_content_gap: 70, caption_gap: 70, caption_pad: 41}
    nodes:
      - { id: generate, label: Generate, desc: agents create, kind: zap }
      - { id: distribute, label: Distribute, desc: ship anywhere, kind: send }
      - { id: capture, label: Capture, desc: corpus grows, kind: database }
      - { id: improve, label: Improve, desc: model learns, kind: cpu }
      - { id: axis, label: the flywheel, desc: compounds each turn, role: hero, kind: refresh-cw }

  flywheel-orbit:
    topology: flywheel
    chassis: { zone_content_gap: 90, caption_gap: 100, caption_pad: 31 }
    zones: ["data flywheel"] # specimen -zone runs, verbatim
    title: The data flywheel
    subtitle: Flywheel · each artifact ships, is captured as corpus, trains the model, and returns as better generation
    notes: flywheel orbit
    edge_motion: particle
    marker: arrow # flywheel-orbit: four discrete arrowed turns
    node_style: card+glyph
    nodes:
      - { label: Generate, desc: agents create, kind: zap }
      - { label: Distribute, desc: ship anywhere, kind: external-link }
      - { label: Capture, desc: corpus grows, kind: database }
      - { label: Improve, desc: model learns, kind: refresh-cw }
      - { label: the flywheel, desc: compounds each turn, role: hero, kind: repeat }

  flywheel-flow:
    topology: flywheel
    chassis: { zone_content_gap: 90, caption_gap: 100, caption_pad: 31 }
    zones: ["data flywheel"] # specimen -zone runs, verbatim
    title: The data flywheel
    subtitle: Flywheel · each artifact ships, is captured as corpus, trains the model, and returns as better generation
    notes: flywheel flow
    node_style: card+glyph
    nodes:
      - { id: generate, label: Generate, desc: agents create, kind: zap }
      - { id: distribute, label: Distribute, desc: ship anywhere, kind: external-link }
      - { id: capture, label: Capture, desc: corpus grows, kind: database }
      - { id: improve, label: Improve, desc: model learns, kind: refresh-cw }
      - { id: flywheel, label: the flywheel, desc: compounds each turn, role: hero, kind: repeat }
    # One continuous current around the rim: dashed marching arcs, no terminals.
    # The ring is furniture (tree-family census-skip) — it animates, nothing counts.
    edges:
      - { source: generate, target: distribute, relation: drift, marker: none }
      - { source: distribute, target: capture, relation: drift, marker: none }
      - { source: capture, target: improve, relation: drift, marker: none }
      - { source: improve, target: generate, relation: drift, marker: none }

  # ── Ring ────────────────────────────────────────────────────────────────
  # agent-loop-ring: the equal-stage loop reference specimen. Six numbered
  # medallions at even 60° pitch
  # on R=270, EMPTY centre — no hero, no accent stage (the loop argues every
  # stage is equal; accent spends only on the zone mark). Congruent arc
  # arrows carry the circulation; every annotation stacks below its node
  # (upper text falls inside the ring) and the side arcs start beneath the
  # upper text so the arrowhead emerges under the ink.
  agent-loop-ring:
    topology: ring
    chassis: { zone_content_gap: 188, caption_gap: 50, caption_pad: 41 }
    zones: ["agent delivery loop"]
    title: The agent delivery loop
    subtitle: The loop · pair, understand, identify, build, validate, ship — then pair again
    notes: agent delivery loop ring
    node_style: glyph-circle
    nodes:
      - { id: pair, label: "1. Pair", desc: "engineers and domain experts work together", kind: users }
      - { id: understand, label: "2. Understand", desc: "shadow the work to deeply understand real workflows", kind: eye }
      - { id: identify, label: "3. Identify", desc: "find and prioritize high-impact automation opportunities", kind: search }
      - { id: build, label: "4. Build", desc: "build agents and workflows against real systems", kind: code }
      - { id: validate, label: "5. Validate", desc: "validate with users, measure impact, iterate fast", kind: circle-check } # specimen draws circle+check, not the shield
      - { id: ship, label: "6. Ship", desc: "ship solutions that save time, improve decisions, scale value", kind: rocket } # specimen draws the rocket

  # ── Stack ───────────────────────────────────────────────────────────────
  stack:
    topology: stack
    zones: ["layers", "composite"] # the stack band pair, preset words (Invariant 5)
    title: The artifact composes up
    subtitle: Composition · geometry × structure × chromatic × motion resolve to one artifact
    notes: composed stack
    operator: "×"
    wire: solid
    node_style: card+glyph
    # hero.w/.h 194x104: pp-stack-v2.svg's own crown, verbatim — the stack
    # hero-floor migration (JOB2) content-solves an uncited crown pure
    # (layer-column dominance on width, no floor on height), and this
    # one's own content never earns the crown on its own.
    chassis: { card_min_w: 163, hero: { max_desc_lines: 2, w: 194, h: 104 } , zone_content_gap: 14, caption_gap: 50, caption_pad: 35} # stack: fixed 163-wide layers + two-line crown subtitle
    nodes:
      - { id: artifact, label: the artifact, desc: "payload + envelope\nthe composite seed", role: hero, glyph: hyperweave }
      - { id: motion, label: motion, desc: the animation, kind: waves } # specimen: sine-wave squiggle (census amended: the hand marks were uncounted bare paths)
      - { id: chromatic, label: chromatic, desc: the palette, kind: blend } # specimen: overlapping colour-cluster (droplet stand-in retired for lucide blend)
      - { id: structure, label: structure, desc: the skeleton, kind: hash } # specimen: crosshatch grid
      - { id: geometry, label: geometry, desc: the form, kind: triangle } # specimen: plain outline triangle
    edges:
      - { source: motion, target: artifact, edge_motion: particle, marker: arrow, label: compose, label_style: chip, relation: assert }
      - { source: chromatic, target: motion, state: inert, marker: none }
      - { source: structure, target: chromatic, state: inert, marker: none }
      - { source: geometry, target: structure, state: inert, marker: none }

  # ── Comparison ──────────────────────────────────────────────────────────
  comparison:
    topology: comparison
    chassis: { zone_content_gap: 148, caption_gap: 166, caption_pad: 37 }
    zones: ["before", "after"] # specimen -zone runs, verbatim
    title: Portable replaces per-surface code
    subtitle: Comparison · one self-contained artifact replaces per-surface code
    notes: brittle to portable
    node_style: card+glyph
    nodes:
