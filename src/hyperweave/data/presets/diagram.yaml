  # rank to four and sets the specimen's nucleus prominence.
  verb-reads:
    topology: hub
    hub_policy: axial
    title: Six verbs, one object
    subtitle: Six verbs, one object · write mints, read observes
    notes: radial verb object
    node_style: card+glyph
    # hero 280×92 is pp-radial verbatim (rect x=480 w=280 h=92) — the hub
    # topology chassis carries the verb-ONTOLOGY language nucleus (232×112),
    # whose 112 height floor squared this sheet's wide-short crown into
    # 240×112. node h 58: verb-reads satellites are 58-tall (below the hub
    # 64 floor).
