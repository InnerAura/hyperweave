    # ring_r_hub 397: the hand file holds its block centers at dx≈340,
    # dy≈205 from the hub center — √(340²+205²) ≈ 397, air beyond the
    # kissing base (the wide throw is the delegation read).
    # head_pad_y/head_glyph_gap: hand file measures icon [380,401] (22px,
    # box top 352 → 28px top air) and name baseline y=440 (box-relative 88).
    # Solving 88 = head_pad_y + 22 + head_glyph_gap + 17*.74 (hero name
    # ascent) at head_pad_y=27 gives head_glyph_gap=26.42 — content then
    # solves to 135.3, 0.7px under the 136 pin (the pin still wins as the
