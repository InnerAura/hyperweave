    # satellite 200x58 is pp-radial verbatim — radial uniform mass, every satellite one width
    # S-rank reach: pp-radial's own read row sits at cy=700 against a hero
    # bottom of 426 (hero y 334 + h 92 / 2... 334+92=426) = a 245 boundary
    # gap, hero_seam.md style, matching axis_gap's own citation method.
    # Pitch/tilt are NOT a raw specimen citation: hub_seats() grades each
    # member's rendered NAME-TEXT anchor, and each of the four read verbs
    # carries a DIFFERENT glyph (download/none/layers/search) whose
    # incidental left-pad offset varies per member — no single uniform
    # pitch reproduces all four card centers exactly (the specimen's own
    # 300/513/727/940 answer only fits ITS hand-drawn, evenly-offset icons).
    # Recalibrated instead against the four RENDERED text anchors: each
    # member's needed shift is a rigid translation of its own card (same
    # method as n_tilt_dx/s_tilt_dx), fit to one shared pitch + one shared
    # rank-wide lean (never a per-node value — Invariant 12) that clears
    # every member within the law's +/-4deg/+/-6% band. Pitch floors at
    # card width (200) + min_clearance (18, G7) — a tighter fit satisfies
    # the seat band but crowds adjacent cards under the clearance law; 220
    # (a 20px card gap, 2px above the floor) keeps both green (worst case:
    # diff at 3.3deg, verify at 3.4%).
    # Edge-run law, polar case (2026-07-14): the S fan cites its ANGLE
    # FAMILY — the hand file's spread-to-drop construction (row pitch
    # 213.25 over the 245 face-to-face gap = 0.87, symmetric about the
    # south port) — never absolute seats. The retired pitch/tilt pins
    # (220/-40) were fitted to one render's 200-wide cards and skewed the
    # fan the moment widths changed; prominence/satellite floors retired
    # with the snug-width ruling.
    axial: { satellite_min_h: 58, max_per_axis: 4, s_rank_axis_gap: 245, s_rank_spread_ratio: 0.87 }
