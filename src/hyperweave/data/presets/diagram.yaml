      - { id: extract, label: extract, desc: payload out, kind: download } # specimen: down-arrow-to-tray
      - { id: verify, label: verify, desc: hash check, kind: check } # the hand card's own bare checkmark, now a counted mark
      - { id: diff, label: diff, desc: a vs b, kind: layers } # specimen: two-offset-squares
      - { id: query, label: query, desc: field read, kind: search } # specimen: magnifier
    edges:
      - { source: compose, target: artifact, role: in, label: "write · mints", edge_motion: particle, marker: dot, relation: drift }
      - { source: artifact, target: transform, role: out, label: "write · mints", edge_motion: particle, marker: dot, relation: drift }
      - { source: extract, target: artifact, role: read, label: "read · observes", edge_motion: particle, marker: dot, relation: drift }
      - { source: verify, target: artifact, role: read, edge_motion: particle, marker: dot, relation: drift }
