name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get version from git
        id: version
        run: |
          # git describe: v0.1.0-3-gabcdef → PEP 440: 0.1.0.dev3+gabcdef
          RAW=$(git describe --tags --always)
          if echo "$RAW" | grep -qE '^v?[0-9]+\.[0-9]+\.[0-9]+$'; then
            # Exact tag match: v0.1.0 → 0.1.0
            VERSION=$(echo "$RAW" | sed 's/^v//')
          elif echo "$RAW" | grep -qE '^v?[0-9]+\.[0-9]+\.[0-9]+-'; then
            # Tag + commits: v0.1.0-3-gabcdef → 0.1.0.dev3+gabcdef
            VERSION=$(echo "$RAW" | sed 's/^v//; s/-\([0-9]*\)-g\(.*\)/.dev\1+g\2/')
          else
            VERSION="0.0.0.dev0+g${RAW}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --build-arg SETUPTOOLS_SCM_PRETEND_VERSION=${{ steps.version.outputs.version }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
